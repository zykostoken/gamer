<style>
:root{--bg:#0a0a0f;--surface:#12121a;--card:#1a1a27;--card2:#22222f;--border:rgba(255,255,255,.06);--text:#e8e8ed;--dim:rgba(255,255,255,.4);--accent:#6366f1;--ok:#22c55e;--err:#ef4444;--warn:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

.hdr{background:linear-gradient(180deg,rgba(99,102,241,.08) 0%,transparent 100%);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}

.calc-card{background:var(--surface);border-radius:16px;padding:32px;border:1px solid var(--border);max-width:600px;margin:0 auto}

.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}.shake{animation:shake .4s ease}
.toast-wrap{position:fixed;top:80px;right:16px;z-index:9998;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:10px 18px;border-radius:10px;font-size:.8rem;font-weight:600;color:#fff;backdrop-filter:blur(12px);pointer-events:auto;animation:tIn .3s ease,tOut .3s ease 2s forwards;box-shadow:0 4px 15px rgba(0,0,0,.3);max-width:320px}
.toast-ok{background:rgba(34,197,94,.85)}.toast-err{background:rgba(239,68,68,.75)}.toast-info{background:rgba(99,102,241,.8)}
@keyframes tIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
.diff-select{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.diff-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'Space Mono',monospace;font-size:.75rem;cursor:pointer;transition:all .2s}

@media(max-width:768px){.estantes{grid-template-columns:1fr 1fr}.item{width:80px;height:85px}.item .item-em{font-size:1.3rem}.hdr-title{font-size:1rem}.kit-store{grid-template-columns:1fr}.sim-pair{grid-template-columns:1fr}}

/* === TAP-TO-PICK/PLACE — reemplaza drag === */
.item{cursor:pointer;touch-action:manipulation}
.item.selected{border-color:var(--accent);background:rgba(99,102,241,.18);box-shadow:0 0 0 3px rgba(99,102,241,.5),0 12px 28px rgba(99,102,241,.35);transform:translateY(-3px) scale(1.06);z-index:20}
.item.selected::after{content:'TOMADO';position:absolute;top:-8px;right:-6px;background:var(--accent);color:#fff;font-size:.55rem;font-weight:700;padding:2px 6px;border-radius:8px;letter-spacing:.04em}
.estante.tap-target{cursor:pointer}
.estante.tap-target:hover,.estante.tap-target.armed{border-color:var(--accent);background:rgba(99,102,241,.06);box-shadow:0 0 16px rgba(99,102,241,.18)}
.ser-item{cursor:pointer;touch-action:manipulation}
.ser-item.selected{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(99,102,241,.5),0 8px 22px rgba(99,102,241,.3);transform:translateX(6px)}
.ser-item.selected::after{content:'';position:absolute;top:50%;right:14px;width:8px;height:8px;border-radius:50%;background:var(--accent);transform:translateY(-50%);box-shadow:0 0 12px var(--accent)}
.tap-hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(99,102,241,.95);color:#fff;padding:10px 22px;border-radius:24px;font-size:.85rem;font-weight:600;z-index:9000;box-shadow:0 6px 24px rgba(99,102,241,.4);pointer-events:none;animation:tHintIn .25s ease-out}
@keyframes tHintIn{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
/* === KIT CART STICKY === */
.kit-cart{position:sticky;top:60px;z-index:30;background:rgba(18,18,26,.96);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;padding:10px 14px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.kit-cart-title{font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.kit-cart-title .cart-toggle{margin-left:auto;cursor:pointer;background:none;border:1px solid var(--border);color:var(--dim);font-size:.65rem;padding:2px 8px;border-radius:6px;font-family:'Space Mono',monospace}

</style>

<body>
<div class="grain"></div>
<div class="toast-wrap" id="toasts"></div>
<header class="hdr"><div class="hdr-inner">
  <div class="hdr-left"><a href="/games/portal/">← ZYKOS GAMER</a><div class="hdr-title"><span id="h-em"></span> <span id="h-nm"></span></div></div>
  <div class="hdr-right"><span class="level-badge" id="h-level">Nivel 1</span><div class="hdr-stat"><div class="hdr-stat-v score-v" id="h-score">0</div><div class="hdr-stat-l">Puntos</div></div><div class="hdr-stat"><div class="hdr-stat-v timer" id="h-timer">--:--</div><div class="hdr-stat-l">Tiempo</div></div></div>
</div></header>
<main class="game" id="game"><div class="loading"><div class="spinner"></div><p style="color:var(--dim);font-size:.85rem">Cargando pack...</p></div></main>
<script>
const PACK_MAP={
  'ferreteria':      '/packs/classify-and-place/ferreteria/pack.json',
  'almacen':         '/packs/classify-and-place/almacen-general/pack.json',
  'almacen-general': '/packs/classify-and-place/almacen-general/pack.json',
  'electrodomesticos':'/packs/classify-and-place/electrodomesticos/pack.json',
  'libreria':        '/packs/classify-and-place/libreria-escolar/pack.json',
  'libreria-escolar':'/packs/classify-and-place/libreria-escolar/pack.json',
  'supermarket':     '/packs/classify-and-place/supermarket/pack.json',
  'carniceria':      '/packs/classify-and-place/carniceria/pack.json',
  'merceria':        '/packs/classify-and-place/merceria/pack.json',
  'futbol-camisetas-numeros': '/packs/classify-and-place/futbol-camisetas-numeros/pack.json',
  'futbol-botines-tamano':    '/packs/classify-and-place/futbol-botines-tamano/pack.json',
  'futbol-medias-mugre':      '/packs/classify-and-place/futbol-medias-mugre/pack.json'
};
let PACK=null,STATE={phase:'intro',mode:'classify',level:1,score:0,correct:0,errors:0,totalItems:0,placedItems:0,startTime:0,timerInterval:null,currentItems:[],moves:[],mouseData:[],lastMoveTime:0,kitCart:{},kitMissionIdx:0,calcIdx:0,simIdx:0,kitBudget:0,kitSpent:0,kitScenario:null,seriationIdx:0,groupIdx:0,reasonIdx:0,reasonScenIdx:0,
// Kit telemetry
kitLog:[],       // every add/remove action timestamped
kitRemovals:0,   // how many times removed item from cart
kitFirstAction:0,// ms from start to first add
kitBudgetExceededAt:0, // ms when first exceeded budget (0=never)
kitSectionClicks:{}, // which category sections were scrolled to / clicked
kitLastActionTime:0,
kitDeliberationPauses:0, // pauses >5s between actions
};

async function loadPack(){const p=new URLSearchParams(location.search),id=p.get('pack')||'ferreteria',url=PACK_MAP[id];if(!url){document.getElementById('game').innerHTML='<div class="loading"><p style="color:var(--err)">Pack no encontrado</p></div>';return}try{const r=await fetch(url);if(!r.ok)throw new Error(r.status);PACK=await r.json()}catch(e){document.getElementById('game').innerHTML='<div class="loading"><p style="color:var(--err)">Error: '+e.message+'</p></div>';return}document.title=PACK.meta.name+' · ZYKOS GAMER';document.getElementById('h-em').textContent=PACK.meta.emoji;document.getElementById('h-nm').textContent=PACK.meta.name;if(PACK.meta.colors)document.documentElement.style.setProperty('--accent',PACK.meta.colors.accent);
// Init telemetry with patient ID (from URL param or localStorage)
const pid=new URLSearchParams(location.search).get('pid')||localStorage.getItem('zykos_patient_dni')||null;
if(pid&&typeof ZYKOS!=='undefined'){var _packSlug='classify-'+(new URLSearchParams(location.search).get('pack')||'unknown');setTimeout(function(){ZYKOS.startSession(_packSlug,pid,null);},150);}
// Rutina Diaria bypass: si la URL trae ?mode= valido O el pack declara scenario_slug, saltar la intro
const _urlMode=new URLSearchParams(location.search).get('mode');
const _validModes=['classify','kit','calc','sim','seriation','grouping','reasoning'];
const _isRutinaDiaria=PACK.meta&&PACK.meta.scenario_slug;
if(_urlMode&&_validModes.indexOf(_urlMode)>=0){
  STATE.mode=_urlMode;
  // Para Rutina Diaria, ir directo al modo. Para otros packs, igual respetar el mode pero pasar por intro liviana.
  if(_isRutinaDiaria){
    return startMode();
  }
}
showIntro()}

function showIntro(){STATE.phase='intro';const ml=Object.keys(PACK.difficulty_scaling||{}).length||4,g=document.getElementById('game'),hm=PACK.missions&&(PACK.missions.grouping||PACK.missions.calculation||PACK.missions.similarity_discrimination);

function getDiff(){const dk='level_'+STATE.level;return Object.assign({items_per_round:15,categories_visible:5,time_limit:null,hints_available:true,distractors:false,similarity_pairs:false,calculations:false,reasoning_missions:false},(PACK.difficulty_scaling||{})[dk]||(PACK.difficulty_scaling||{})['level_'+Math.max(1,...Object.keys(PACK.difficulty_scaling||{}).map(k=>parseInt(k.replace('level_',''))))]||{});}

function getItemsForLevel(diff){
  // Filtrar items por difficulty maxima segun nivel
  const maxDiff=STATE.level<=2?2:STATE.level<=4?3:STATE.level<=6?4:5;
  let pool=PACK.items.filter(i=>(i.difficulty||1)<=maxDiff);
  // Limitar categorias visibles
  let cats=[...PACK.categories];
  if(diff.categories_visible&&diff.categories_visible<cats.length)cats=shuffle(cats).slice(0,diff.categories_visible);
  const catIds=new Set(cats.map(c=>c.id));
  pool=pool.filter(i=>catIds.has(i.category));
  // Agregar distractores (items confusables de otras categorias) en niveles altos
  if(diff.distractors){
    const confusables=PACK.items.filter(i=>i.confusable_with&&(i.difficulty||1)<=maxDiff&&!pool.find(p=>p.id===i.id));
    pool=[...pool,...shuffle(confusables).slice(0,Math.min(4,confusables.length))];
  }
  return {items:shuffle(pool).slice(0,Math.min(diff.items_per_round||15,pool.length)),cats:cats};
}

function startClassify(){STATE.phase='playing';const diff=getDiff();const {items,cats}=getItemsForLevel(diff);STATE.currentItems=items;STATE.totalItems=items.length;
// ALL items in one shuffled block — no zones, no grouping, no hints
const _diff=getDiff();
const allItems=shuffle([...items]).map(it=>{
  const pr=it.price?'$'+it.price.toLocaleString('es-AR'):(it.price_range?'$'+it.price_range[0].toLocaleString('es-AR'):'');
  const hint=(_diff.hints_available&&it.hint)?`<span class="item-hint" style="display:block;font-size:.65rem;color:var(--dim);margin-top:2px">${it.hint}</span>`:'';
  const confNote=(_diff.similarity_pairs&&it.similarity_note)?`<span class="item-hint" style="display:block;font-size:.62rem;color:var(--warn);margin-top:2px">${it.similarity_note}</span>`:'';
  return`<div class="item" data-id="${it.id}" data-cat="${it.category}"><span class="item-em">${it.emoji}</span><span class="item-nm">${it.name}</span>${pr?'<span class="item-price">'+pr+'</span>':''}${hint}${confNote}</div>`;
}).join('');
// Timer por nivel
if(_diff.time_limit){
  let tLeft=_diff.time_limit;
  STATE._levelTimer=setInterval(function(){
    tLeft--;
    const pct=tLeft/_diff.time_limit*100;
    const bar=document.getElementById('level-timer-bar');
    if(bar){bar.style.width=pct+'%';bar.style.background=pct<25?'var(--err)':pct<50?'var(--warn)':'var(--ok)';}
    if(tLeft<=0){clearInterval(STATE._levelTimer);toast('Tiempo!','err');setTimeout(showResults,800);}
  },1000);
}
const _timerBar=getDiff().time_limit?'<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:12px"><div id="level-timer-bar" style="height:100%;width:100%;background:var(--ok);transition:width 1s linear"></div></div>':'';
document.getElementById('game').innerHTML=_timerBar+`<div class="mostrador"><div class="mostrador-title"> Mostrador — todo mezclado — <span class="count"><span id="remaining">${items.length}</span> por ubicar</span></div><div class="items-row">${allItems}</div></div><div class="estantes" id="estantes"></div>`;
const ed=document.getElementById('estantes');shuffle([...cats]).forEach(cat=>{const el=document.createElement('div');el.className='estante tap-target';el.dataset.cat=cat.id;el.innerHTML=`<div class="estante-hdr"><span class="estante-em">${cat.emoji}</span><span class="estante-nm">${cat.label}</span><span class="estante-count" id="cnt-${cat.id}">0</span></div><div class="estante-items" id="placed-${cat.id}"></div>`;el.addEventListener('click',function(e){e.preventDefault();const heldId=STATE._heldItemId;if(!heldId)return;const itemEl=document.querySelector('.item[data-id="'+heldId+'"]');tapClearSelection();handleDrop(heldId,cat.id,itemEl)});ed.appendChild(el)});
// Tap-to-pickup / tap-to-place — reemplaza drag&drop. Permite scroll nativo.
STATE._heldItemId=null;
document.querySelectorAll('.item').forEach(function(el){
  el.addEventListener('click',function(e){
    e.preventDefault();e.stopPropagation();
    const id=el.dataset.id;
    if(STATE._heldItemId===id){tapClearSelection();return}
    tapClearSelection();
    STATE._heldItemId=id;
    el.classList.add('selected');
    showTapHint('Tocá la categoria donde va');
    document.querySelectorAll('.estante').forEach(function(s){s.classList.add('armed')});

// Click fuera = cancelar seleccion

function tapClearSelection(){

else{STATE.errors++;STATE.score=Math.max(0,STATE.score-30);const est=document.querySelector('.estante[data-cat="'+tcat+'"]');est.classList.add('wrong-flash');setTimeout(()=>est.classList.remove('wrong-flash'),500);iel.classList.add('shake');setTimeout(()=>iel.classList.remove('shake'),500);const cc=PACK.categories.find(c=>c.id===it.category);toast(' '+it.name+' → '+(it.similarity_note||'Va en '+(cc?cc.label:it.category)),'err')}

function kitToggle(id,pr){const now=performance.now(),elapsed=now-STATE.startTime,sinceLastAction=now-STATE.kitLastActionTime;
// Track deliberation pauses (>5s between actions)
if(STATE.kitLastActionTime>0&&sinceLastAction>5000)STATE.kitDeliberationPauses++;
STATE.kitLastActionTime=now;
// Track first action latency
if(!STATE.kitFirstAction)STATE.kitFirstAction=elapsed;
const item=PACK.items.find(i=>i.id===id);
if(STATE.kitCart[id]){
  delete STATE.kitCart[id];STATE.kitSpent-=pr;STATE.kitRemovals++;
  STATE.kitLog.push({action:'remove',itemId:id,name:item?.name||id,category:item?.category||'?',price:pr,time:elapsed,spent:STATE.kitSpent,sinceLastMs:sinceLastAction});
  document.querySelector('.kit-product[data-id="'+id+'"]')?.classList.remove('in-cart');toast('Quitado','info');
}else{
  STATE.kitCart[id]=pr;STATE.kitSpent+=pr;
  STATE.kitLog.push({action:'add',itemId:id,name:item?.name||id,category:item?.category||'?',price:pr,time:elapsed,spent:STATE.kitSpent,sinceLastMs:sinceLastAction});
  // Track when budget first exceeded
  if(STATE.kitSpent>STATE.kitBudget&&!STATE.kitBudgetExceededAt)STATE.kitBudgetExceededAt=elapsed;
  document.querySelector('.kit-product[data-id="'+id+'"]')?.classList.add('in-cart');toast('Agregado','ok');
}
// Track section engagement
if(item)STATE.kitSectionClicks[item.category]=(STATE.kitSectionClicks[item.category]||0)+1;
kitUI()}

function checkCalc(){const cs=PACK.missions.calculation,c=cs[STATE.calcIdx%cs.length],v=parseFloat(document.getElementById('calc-a').value);if(isNaN(v))return;const exp=typeof c.correct_answer==='object'?Object.values(c.correct_answer)[0]:c.correct_answer;let ok=c.accept_range?v>=c.accept_range[0]&&v<=c.accept_range[1]:Math.abs(v-exp)<Math.max(1,exp*.05);if(ok){STATE.correct++;STATE.score+=150;toast('[ok] Correcto','ok')}else{STATE.errors++;toast('[x] Era '+exp.toLocaleString('es-AR'),'err')}document.getElementById('h-score').textContent=STATE.score;const r=document.getElementById('calc-res');r.className='calc-res '+(ok?'ok':'bad');r.innerHTML=`<strong>${ok?'[ok] Correcto':'[x] Incorrecto'}</strong><br>${c.explanation}<br><br><button class="btn btn-ghost btn-sm" onclick="STATE.calcIdx++;startCalc()">Siguiente →</button>`;document.getElementById('calc-a').disabled=true}

/* ===== SERIATION VISUAL RENDERERS =====
 * Reemplazan emoji+texto por dibujos SVG en los ejes donde la pista
 * debe ser PERCEPTUAL, no textual. Mismo emoji/texto delataría el orden.
 *
 * - medias: tonalidad de gris (1=limpia, 8=sucia) determina el fill
 * - camisetas: numero dorsal grande sobre fondo de equipo
 * - botines: tamano fisico del SVG escalado por talle (38..46)
 */
function renderSeriationVisual(it,axis){
  if(axis==='medias'&&it.tonality)return svgMedia(it.tonality);
  if(axis==='camisetas'&&(it.dorsal||it.numeric))return svgCamiseta(it.dorsal||it.numeric);
  if(axis==='botines'&&it.size)return svgBotin(it.size);
  // Ferreteria: parsear tamano del name si no esta como atributo
  const sz=parseSizeFromName(it.name||'');
  if(axis==='tarugos'&&sz!=null)return svgTarugo(sz);
  if(axis==='candados'&&sz!=null)return svgCandado(sz);
  if(axis==='cables'&&sz!=null)return svgCable(sz);
  if(axis==='lijas'){
    const g=parseLijaGrit(it.name||'');
    if(g!=null)return svgLija(g);
  }
  return '';
}
function parseSizeFromName(name){
  // "Tarugo nylon 6mm" -> 6; "Cable 1.5mm²" -> 1.5; "Candado 40mm" -> 40
  const m=name.match(/(\d+(?:\.\d+)?)\s*mm/i);
  return m?parseFloat(m[1]):null;
}
function parseLijaGrit(name){
  // "Lija al agua N°220" -> 220; "Lija para madera N°80" -> 80
  const m=name.match(/N[°º]?\s*(\d+)/i);
  return m?parseInt(m[1],10):null;
}
function inferAxisFromMission(mission){
  if(mission.axis_slug)return mission.axis_slug;
  const id=(mission.id||'').toLowerCase();
  if(/lijas?/.test(id))return 'lijas';
  if(/cables?/.test(id))return 'cables';
  if(/tarugos?/.test(id))return 'tarugos';
  if(/candados?/.test(id))return 'candados';
  return '';
}

function svgCable(mm2){
  // corte transversal; mm² 1..6 -> escala visible (rango ~1.6x)
  const coreD=Math.max(8,8+Math.sqrt(Math.max(0.5,mm2))*15);
  const outerD=coreD+14;
  const W=Math.round(outerD+18);
  return `<svg viewBox="0 0 ${W} ${W}" width="${Math.min(76,W)}" height="${Math.min(76,W)}" style="flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))">
    <circle cx="${W/2}" cy="${W/2}" r="${outerD/2}" fill="#d83a3a" stroke="#5a1010" stroke-width="1.6"/>
    <circle cx="${W/2}" cy="${W/2}" r="${outerD/2 - 1.5}" fill="none" stroke="rgba(0,0,0,.25)" stroke-width="1"/>
    <circle cx="${W/2}" cy="${W/2}" r="${coreD/2}" fill="#c97a1a" stroke="#4a2a0a" stroke-width="1.2"/>
    <circle cx="${W/2}" cy="${W/2}" r="${coreD/2 - 1.5}" fill="none" stroke="rgba(255,255,255,.18)" stroke-width=".8"/>
    <ellipse cx="${W/2 - coreD/5}" cy="${W/2 - coreD/5}" rx="${coreD/5}" ry="${coreD/8}" fill="rgba(255,255,255,.55)"/>
    <ellipse cx="${W/2 - outerD/3}" cy="${W/2 - outerD/3}" rx="${outerD/8}" ry="${outerD/14}" fill="rgba(255,255,255,.3)"/>
  </svg>`;
}
function svgLija(grit){
  // hoja cuadrada con grano. Grit BAJO = grano GRUESO (pocos puntos GRANDES).
  //                          Grit ALTO = grano FINO (muchos puntos CHICOS).
  // Interp grit 60..600 → count 22..280, size 4.0..0.6
  const t=Math.max(0,Math.min(1,(grit-60)/540));
  const dotCount=Math.round(22+t*258);
  const dotSize=Math.max(0.55,4.0-t*3.4);
  const dotColor='#3a1f0a';
  let dots='';
  let s=grit*9176+5;
  for(let i=0;i<dotCount;i++){
    s=(s*1103515245+12345)&0x7fffffff;
    const x=4+(s%82);
    s=(s*1103515245+12345)&0x7fffffff;
    const y=4+(s%82);
    s=(s*1103515245+12345)&0x7fffffff;
    const jitter=((s%30)-15)/100;
    const r=dotSize*(1+jitter);
    dots+=`<circle cx="${x}" cy="${y}" r="${r.toFixed(2)}" fill="${dotColor}"/>`;
  }
  return `<svg viewBox="0 0 90 90" width="64" height="64" style="flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))">
    <rect x="2" y="2" width="86" height="86" rx="3" fill="#c89360" stroke="#2a1808" stroke-width="1.6"/>
    <rect x="2" y="2" width="86" height="86" rx="3" fill="url(#lijaGrad${grit})"/>
    <defs>
      <radialGradient id="lijaGrad${grit}" cx=".4" cy=".4" r=".7">
        <stop offset="0%" stop-color="rgba(255,220,180,.15)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,.12)"/>
      </radialGradient>
    </defs>
    ${dots}
  </svg>`;
}
function svgMedia(tonality){

  const t=Math.max(0,Math.min(1,(tonality-1)/7));

  const r=Math.round(245-t*180);
  const g=Math.round(243-t*195);
  const b=Math.round(235-t*205);
  const fill=`rgb(${r},${g},${b})`;
  const stainOpacity=0.05+t*0.25;
  return `<svg viewBox="0 0 90 120" width="50" height="68" style="flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))">

    <ellipse cx="50" cy="113" rx="32" ry="3" fill="rgba(255,255,255,${0.5-t*0.4})"/>

    <path d="M64,15 L64,72" stroke="rgba(0,0,0,.18)" stroke-width=".7" fill="none"/>
  </svg>`;
}

/* ===== SERIATION — ordenar items en secuencia ===== */
/* ===== SERIATION — Rutina Diaria, blueprint v1.0 =====
 * Drag-and-drop con pointer events (mousedown/move/up + touch).
 * Esto SÍ activa agent-motor (jitter, vel_cv, eficiencia_trayectoria, etc.)
 * a diferencia del HTML5 drag nativo viejo que NO lo hacía.
 *
 * Captura métricas canónicas V4.2 dominio SERIACION:
 *   seriation_strategy_detected, seriation_dimension_used,
 *   seriation_completeness_pct, seriation_inversion_count,
 *   seriation_dimension_switches, seriation_first_pickup_dimension,
 *   seriation_completion_time_ms
 * Y al terminar llama RPC zykos_complete_exercise para gestionar progreso.
 */
function startSeriation(){
  STATE.phase='playing';
  const missions=(PACK.missions?.seriation||[]).filter(function(m){return !m.min_difficulty||m.min_difficulty<=STATE.level;});
  if(!missions||!missions.length){document.getElementById('game').innerHTML='<div class="loading"><p style="color:var(--dim)">Sin misiones de orden en este pack</p></div>';return;}
  if(!STATE.seriationIdx)STATE.seriationIdx=0;
  const mission=missions[STATE.seriationIdx%missions.length];
  const items=mission.items_to_order.map(id=>PACK.items.find(i=>i.id===id)).filter(Boolean);
  const shuffled=shuffle([...items]);
  STATE._serMission=mission;
  STATE._serItems=items;
  STATE._serOrder=shuffled.map(i=>i.id);
  STATE._serStart=performance.now();
  STATE._serMoves=[]; // path por cada drag para análisis post-hoc
  STATE._serFirstPickupDim=null; // dimensión del primer pickup (proxy de "qué miró primero")

  const axis=mission.axis_slug||inferAxisFromMission(mission)||PACK.meta?.axis_slug||'';
  const useVisual=['medias','camisetas','botines','tarugos','candados','cables','lijas'].indexOf(axis)>=0;
  const itemsHTML=shuffled.map((it,idx)=>{
    const visual=useVisual?renderSeriationVisual(it,axis):'';
    const labelHtml=useVisual
      ? '' // sin texto delator: la pista esta en el dibujo
      : `<span style="font-size:1.2rem">${it.emoji}</span><span>${it.name}</span>`;
    return `<div class="ser-item" data-id="${it.id}" data-pos="${idx}"
      style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:${useVisual?'10px 14px':'12px 16px'};margin:6px 0;cursor:pointer;display:flex;align-items:center;gap:14px;font-size:.9rem;user-select:none;touch-action:manipulation;position:relative;min-height:${useVisual?'78px':'auto'}"
      data-size="${it.size||''}" data-tonality="${it.tonality||''}" data-color="${it.color||''}" data-numeric="${it.numeric||it.dorsal||''}">
      <span class="ser-pos" style="color:var(--dim);font-family:monospace;min-width:20px;font-size:.85rem">${idx+1}</span>
      ${visual}${labelHtml}
    </div>`;
  }).join('');

  document.getElementById('game').innerHTML=`
    <div style="max-width:600px;margin:0 auto;padding:16px">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:2rem">${mission.emoji||''}</div>
        <div style="font-size:1.1rem;font-weight:700;margin:8px 0">${mission.name}</div>
        <div style="color:var(--dim);font-size:.85rem;line-height:1.5">${mission.description}</div>
      </div>
      <div style="color:var(--muted);font-size:.75rem;text-align:center;margin-bottom:12px">Tocá una, despues toca otra para intercambiar</div>
      <div id="ser-list" style="min-height:200px;position:relative">${itemsHTML}</div>
      <div style="text-align:center;margin-top:20px">
        <button class="btn btn-primary" onclick="checkSeriation()">Listo</button>
        <button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="STATE.seriationIdx++;startSeriation()">Otra</button>
      </div>
    </div>`;

  // ===== TAP-A then TAP-B = swap =====
  // Permite scroll nativo. Sin drag. Cada swap se loggea con timestamp.
  const list=document.getElementById('ser-list');
  let selectedItem=null;
  let firstTapAt=0;

  function inferDimFromItem(item){
    if(item.dataset.numeric)return 'numeric';
    if(item.dataset.size)return 'size';
    if(item.dataset.tonality)return 'tonality';
    if(item.dataset.color)return 'color';
    return 'unknown';
  }

  function refreshPositions(){
    const items=Array.from(list.children);
    items.forEach(function(it,i){
      it.dataset.pos=i;
      const posLabel=it.querySelector('.ser-pos');
      if(posLabel)posLabel.textContent=(i+1);
    });
  }

  function clearSelection(){
    if(selectedItem){selectedItem.classList.remove('selected');selectedItem=null;}
  }

  list.addEventListener('click',function(e){
    const item=e.target.closest('.ser-item');
    if(!item)return;
    e.preventDefault();
    e.stopPropagation();
    const now=performance.now();
    if(STATE._serFirstPickupDim===null){
      STATE._serFirstPickupDim=inferDimFromItem(item);
      firstTapAt=now;
    }
    if(!selectedItem){
      selectedItem=item;
      item.classList.add('selected');
      return;
    }
    if(selectedItem===item){clearSelection();return;}
    // SWAP: intercambia A y B en el DOM
    const a=selectedItem,b=item;
    const aNext=a.nextSibling===b?a:a.nextSibling;
    list.insertBefore(a,b);
    if(aNext===a){list.insertBefore(b,a);}else{list.insertBefore(b,aNext);}
    refreshPositions();
    STATE._serMoves.push({
      type:'swap',
      itemA:a.dataset.id,
      itemB:b.dataset.id,
      newPosA:Array.from(list.children).indexOf(a),
      newPosB:Array.from(list.children).indexOf(b),
      tMs:Math.round(now-STATE._serStart),
      sinceFirstTapMs:Math.round(now-firstTapAt)
    });
    clearSelection();
  });
  // Click fuera = deseleccionar
  document.addEventListener('click',function(e){
    if(!selectedItem)return;
    if(e.target.closest('.ser-item'))return;
    clearSelection();
  });
}

/* ===== Detección post-hoc de estrategia de seriación =====
 * No se le dice al paciente cuál es el orden "correcto". Captura qué dimensión privilegió.
 * Devuelve métricas canónicas V4.2 dominio SERIACION.
 */
function detectSeriationStrategy(actualOrder, items, mission){
  // actualOrder: array de item_id en el orden final del paciente
  // items: array de objetos item completos
  // mission: la mission con items_to_order (orden "objetivo" si lo declara)

  const itemMap={};items.forEach(it=>{itemMap[it.id]=it});
  const n=actualOrder.length;

  // Helper: calcular qué tan ordenado está actualOrder por una dimensión
  function correlationByKey(key){
    // Extraer valores y sortearlos
    const values=actualOrder.map(id=>itemMap[id]&&itemMap[id][key]);
    if(values.some(v=>v===undefined||v===null||v===''))return null;
    // Para cada par adyacente, ¿está en orden ascendente?
    let asc=0,desc=0;
    for(let i=1;i<n;i++){
      const a=isNaN(values[i-1])?values[i-1]:Number(values[i-1]);
      const b=isNaN(values[i])?values[i]:Number(values[i]);
      if(a<b)asc++;else if(a>b)desc++;
    }
    const total=n-1;
    return {asc:asc/total,desc:desc/total,total:total};
  }

  // Probar múltiples dimensiones
  const dims={
    numeric:correlationByKey('numeric')||correlationByKey('dorsal'),
    size:correlationByKey('size'),
    tonality:correlationByKey('tonality'),
    color:correlationByKey('color')
  };

  // Encontrar la dimensión dominante (mayor asc o desc)
  let bestDim=null,bestScore=0,bestDir='';
  for(const [k,v] of Object.entries(dims)){
    if(!v)continue;
    if(v.asc>bestScore){bestScore=v.asc;bestDim=k;bestDir='asc';}
    if(v.desc>bestScore){bestScore=v.desc;bestDim=k;bestDir='desc';}
  }

  // Strategy enum (alineado con METRIC_DICTIONARY V4.2)
  let strategy='no_pattern';
  if(bestScore>=0.8){
    strategy=bestDir+'_'+bestDim;
  }else if(bestScore>=0.5){
    strategy='partial_'+bestDim;
  }else{
    strategy='no_pattern';
  }
  // Mission incompleta? (si el motor devuelve sin cambios, items en posición original)
  if(STATE._serMoves.length===0)strategy='incomplete';

  // Inversiones respecto al orden detectado (pares adyacentes desalineados)
  let inversions=0;
  if(bestDim){
    const refValues=actualOrder.map(id=>{
      const v=itemMap[id]&&itemMap[id][bestDim]||itemMap[id]&&itemMap[id]['dorsal'];
      return isNaN(v)?v:Number(v);
    });
    for(let i=1;i<refValues.length;i++){
      if(bestDir==='asc'&&refValues[i]<refValues[i-1])inversions++;
      if(bestDir==='desc'&&refValues[i]>refValues[i-1])inversions++;
    }
  }

  // Dimension switches (cuántas veces cambió de dimensión durante drags consecutivos)
  // Proxy: contar cambios en first-touched dimension across moves
  let switches=0;
  for(let i=1;i<STATE._serMoves.length;i++){
    const prev=itemMap[STATE._serMoves[i-1].itemId];
    const curr=itemMap[STATE._serMoves[i].itemId];
    // Si el item previo y actual difieren significativamente en una dimensión, registrar switch
    if(prev&&curr&&bestDim){
      const dPrev=prev[bestDim],dCurr=curr[bestDim];
      if(dPrev!==undefined&&dCurr!==undefined&&Math.abs(Number(dPrev)-Number(dCurr))>2)switches++;
    }
  }

  return {
    seriation_strategy_detected:strategy,
    seriation_dimension_used:bestDim||'none',
    seriation_completeness_pct:Math.round(bestScore*100),
    seriation_inversion_count:inversions,
    seriation_dimension_switches:switches,
    seriation_first_pickup_dimension:STATE._serFirstPickupDim||'unknown',
    seriation_completion_time_ms:Math.round(performance.now()-STATE._serStart)
  };
}

function checkSeriation(){
  const mission=STATE._serMission;
  const actualOrder=Array.from(document.querySelectorAll('.ser-item')).map(el=>el.dataset.id);
  const items=STATE._serItems;
  const rt=Math.round(performance.now()-STATE._serStart);

  // Métricas canónicas V4.2 (post-hoc)
  const seriationMetrics=detectSeriationStrategy(actualOrder, items, mission);

  // Registrar move legacy para compatibilidad
  STATE.moves.push({mode:'seriation',mission:mission.id,rt_ms:rt,pct_correct:seriationMetrics.seriation_completeness_pct,correct:seriationMetrics.seriation_completeness_pct>=80});

  // Enviar al motor canónico — agent-motor ya capturó jitter/vel/etc en background
  if(typeof ZYKOS!=='undefined'&&ZYKOS.isActive()){
    ZYKOS.endSession(Object.assign({
      session_duration_ms:rt,
      _raw_seriation:{
        pack_id:PACK.meta.id,
        mode:'seriation',
        mission_id:mission.id,
        actual_order:actualOrder,
        target_order:mission.items_to_order,
        moves_count:STATE._serMoves.length,
        moves_summary:STATE._serMoves.slice(-20).map(m=>({itemId:m.itemId,duration:m.durationMs,pathLen:m.path.length}))
      }
    }, seriationMetrics));
  }

  // Llamar RPC zykos_complete_exercise (gestión de progreso Rutina Diaria)
  // Solo si tenemos DNI y supabase client
  try{
    const dni=new URLSearchParams(location.search).get('dni')||localStorage.getItem('zykos_patient_dni');
    if(dni&&typeof getSupabaseClient==='function'){
      const sb=getSupabaseClient();
      if(sb){
        const scenarioSlug=PACK.meta.scenario_slug||'futbol';
        const axisSlug=PACK.meta.axis_slug||mission.axis_slug||'unknown';
        const exerciseSlug=PACK.meta.id;
        const nextExercise=mission.next_exercise||null;
        sb.rpc('zykos_complete_exercise',{
          p_dni:dni,
          p_scenario:scenarioSlug,
          p_axis:axisSlug,
          p_exercise_slug:exerciseSlug,
          p_next_exercise:nextExercise
        }).then(r=>{
          if(r.error)console.warn('[seriation] complete_exercise RPC:',r.error.message);
          else console.log('[seriation] progress updated:',r.data);
        }).catch(e=>console.warn('[seriation] RPC exception:',e.message));
      }
    }
  }catch(e){console.warn('[seriation] progress save error:',e.message);}

  // Pantalla de cierre — neutra, sin "ganaste/perdiste"
  document.getElementById('game').innerHTML=`
    <div style="max-width:600px;margin:0 auto;padding:32px 16px;text-align:center">
      <div style="font-size:1.3rem;font-weight:700;margin-bottom:12px">Listo</div>
      <div style="color:var(--dim);font-size:.95rem;margin-bottom:8px">Buen trabajo</div>
      <div style="color:var(--dim);font-size:.8rem;margin-bottom:32px">Mañana hay otro</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-ghost btn-sm" onclick="showIntro()">Volver</button>
      </div>
    </div>`;
}

/* ===== GROUPING — armar kit funcional ===== */
function startGrouping(){
  STATE.phase='playing';
  const missions=(PACK.missions?.grouping||[]).filter(function(m){return !m.min_difficulty||m.min_difficulty<=STATE.level;});
  if(!missions||!missions.length){document.getElementById('game').innerHTML='<div class="loading"><p style="color:var(--dim)">Sin misiones de agrupamiento en este pack</p></div>';return;}
  if(!STATE.groupIdx)STATE.groupIdx=0;
  const mission=missions[STATE.groupIdx%missions.length];
  STATE._grpMission=mission;
  STATE._grpSelected=new Set();
  STATE._grpStart=performance.now();

  // Mezclar correctos + parciales + trampas + algunos random
  const allIds=new Set([
    ...(mission.correct_items||[]),
    ...(mission.partial_credit||[]),
    ...(mission.trap_items||[])
  ]);
  // Agregar items random de relleno hasta 12
  shuffle(PACK.items.filter(i=>!allIds.has(i.id))).slice(0,Math.max(0,12-allIds.size)).forEach(i=>allIds.add(i.id));
  const pool=shuffle([...allIds]).map(id=>PACK.items.find(i=>i.id===id)).filter(Boolean);

  const itemsHTML=pool.map(it=>
    `<div class="grp-item" data-id="${it.id}"
      style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:.85rem;transition:all .15s;"
      onclick="toggleGrp(this,'${it.id}')">
      <span style="font-size:1.2rem">${it.emoji}</span>
      <span>${it.name}</span>
      ${it.price?`<span style="color:var(--dim);font-size:.75rem;margin-left:auto">$${it.price.toLocaleString('es-AR')}</span>`:''}
    </div>`
  ).join('');

  document.getElementById('game').innerHTML=`
    <div style="max-width:640px;margin:0 auto;padding:16px">
      <div style="background:var(--surface);border-radius:14px;padding:16px;margin-bottom:16px;border:1px solid var(--border)">
        <div style="font-size:1.5rem;margin-bottom:8px">${mission.emoji||'🛠️'}</div>
        <div style="font-size:1rem;font-weight:700;margin-bottom:6px">${mission.name}</div>
        <div style="color:var(--dim);font-size:.85rem;line-height:1.5">${mission.description}</div>
      </div>
      <div style="color:var(--muted);font-size:.75rem;margin-bottom:10px">Tocá los productos que necesitás</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px" id="grp-pool">${itemsHTML}</div>
      <div style="text-align:center;margin-top:16px">
        <button class="btn btn-primary" onclick="checkGrouping()">Confirmar selección</button>
        <button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="STATE.groupIdx++;startGrouping()">Otra misión</button>
      </div>
    </div>`;
}

function toggleGrp(el,id){
  if(STATE._grpSelected.has(id)){
    STATE._grpSelected.delete(id);
    el.style.borderColor='var(--border)';
    el.style.background='var(--card)';
  }else{
    STATE._grpSelected.add(id);
    el.style.borderColor='var(--accent)';
    el.style.background='rgba(99,102,241,.1)';
  }
}

function checkGrouping(){
  const m=STATE._grpMission;
  const sel=[...STATE._grpSelected];
  const rt=Math.round(performance.now()-STATE._grpStart);
  const correct=m.correct_items||[];
  const partial=m.partial_credit||[];
  const traps=m.trap_items||[];

  let pts=0,hits=0,missed=0,trapsHit=0,partialHit=0;
  correct.forEach(id=>{if(sel.includes(id))hits++;else missed++;});
  traps.forEach(id=>{if(sel.includes(id))trapsHit++;});
  partial.forEach(id=>{if(sel.includes(id))partialHit++;});
  pts=hits*3+partialHit-trapsHit*2;
  const maxPts=correct.length*3;
  const pct=maxPts>0?Math.round(Math.max(0,pts)/maxPts*100):0;
  const isOk=pct>=60;

  if(isOk){STATE.correct++;STATE.score+=Math.round(pct*2);}else{STATE.errors++;}
  document.getElementById('h-score').textContent=STATE.score;
  STATE.moves.push({mode:'grouping',mission:m.id,pct_correct:pct,rt_ms:rt,hits,missed,traps_hit:trapsHit,correct:isOk});

  const feedHTML=[
    ...correct.map(id=>{const it=PACK.items.find(x=>x.id===id);const ok=sel.includes(id);return`<div style="padding:6px 10px;border-radius:6px;background:${ok?'rgba(34,197,94,.1)':'rgba(239,68,68,.05)'};border:1px solid ${ok?'var(--ok)':'var(--err)'};font-size:.8rem;margin:3px 0;display:flex;align-items:center;gap:8px"><span>${it?.emoji||''}</span><span>${it?.name||id}</span><span style="margin-left:auto;color:${ok?'var(--ok)':'var(--err)'}">${ok?'[ok]':'[faltó]'}</span></div>`;}),
    ...traps.filter(id=>sel.includes(id)).map(id=>{const it=PACK.items.find(x=>x.id===id);return`<div style="padding:6px 10px;border-radius:6px;background:rgba(239,68,68,.1);border:1px solid var(--err);font-size:.8rem;margin:3px 0;display:flex;align-items:center;gap:8px"><span>${it?.emoji||''}</span><span>${it?.name||id}</span><span style="margin-left:auto;color:var(--err)">[trampa]</span></div>`;})
  ].join('');

  document.getElementById('game').innerHTML=`
    <div style="max-width:600px;margin:0 auto;padding:16px;text-align:center">
      <div style="font-size:2rem">${isOk?'[ok]':'[x]'}</div>
      <div style="font-size:1.2rem;font-weight:700;color:${isOk?'var(--ok)':'var(--err)'};margin:8px 0">${pct}% del kit correcto</div>
      <div style="text-align:left;margin:16px 0">${feedHTML}</div>
      <div style="color:var(--dim);font-size:.8rem;margin-bottom:16px">Tiempo: ${(rt/1000).toFixed(1)}s · Trampas tocadas: ${trapsHit}</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary" onclick="STATE.groupIdx++;startGrouping()">Siguiente misión</button>
        <button class="btn btn-ghost btn-sm" onclick="showIntro()">Menú</button>
      </div>
    </div>`;
}

/* ===== REASONING — inferencia: el cliente describe un problema ===== */
function startReasoning(){
  STATE.phase='playing';
  const missions=(PACK.missions?.reasoning||[]).filter(function(m){return !m.min_difficulty||m.min_difficulty<=STATE.level;});
  if(!missions||!missions.length){document.getElementById('game').innerHTML='<div class="loading"><p style="color:var(--dim)">Sin misiones de razonamiento en este pack</p></div>';return;}
  if(!STATE.reasonIdx)STATE.reasonIdx=0;
  const mission=missions[STATE.reasonIdx%missions.length];
  if(!STATE.reasonScenIdx)STATE.reasonScenIdx=0;
  const scenarios=mission.scenarios||[];
  const sc=scenarios[STATE.reasonScenIdx%scenarios.length];
  STATE._rsnMission=mission;
  STATE._rsnScenario=sc;
  STATE._rsnSelected=new Set();
  STATE._rsnStart=performance.now();

  // Pool: correctos + distractores random
  const correctIds=new Set(sc.correct_items||[]);
  const pool=shuffle([
    ...sc.correct_items.map(id=>PACK.items.find(i=>i.id===id)).filter(Boolean),
    ...shuffle(PACK.items.filter(i=>!correctIds.has(i.id))).slice(0,8)
  ]);

  const itemsHTML=pool.map(it=>
    `<div class="rsn-item" data-id="${it.id}"
      style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:.85rem;transition:all .15s;"
      onclick="toggleRsn(this,'${it.id}')">
      <span style="font-size:1.2rem">${it.emoji}</span>
      <span>${it.name}</span>
    </div>`
  ).join('');

  document.getElementById('game').innerHTML=`
    <div style="max-width:640px;margin:0 auto;padding:16px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px">
        <div style="font-size:1rem;font-weight:700;margin-bottom:8px">${mission.emoji||'🤔'} ${mission.name}</div>
        <div style="background:var(--card2);border-radius:10px;padding:14px;font-size:.95rem;line-height:1.6;font-style:italic;color:var(--text)">
          "${sc.client_says}"
        </div>
        <div style="color:var(--dim);font-size:.78rem;margin-top:8px">¿Qué necesita este cliente? Seleccioná los productos.</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px" id="rsn-pool">${itemsHTML}</div>
      <div style="text-align:center;margin-top:16px">
        <button class="btn btn-primary" onclick="checkReasoning()">Confirmar</button>
        <button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="STATE.reasonScenIdx++;startReasoning()">Otro caso</button>
      </div>
    </div>`;
}

function toggleRsn(el,id){
  if(STATE._rsnSelected.has(id)){
    STATE._rsnSelected.delete(id);
    el.style.borderColor='var(--border)';el.style.background='var(--card)';
  }else{
    STATE._rsnSelected.add(id);
    el.style.borderColor='var(--accent)';el.style.background='rgba(99,102,241,.1)';
  }
}

function checkReasoning(){
  const sc=STATE._rsnScenario;
  const sel=[...STATE._rsnSelected];
  const rt=Math.round(performance.now()-STATE._rsnStart);
  const correct=sc.correct_items||[];
  let hits=0,missed=0,extra=0;
  correct.forEach(id=>{if(sel.includes(id))hits++;else missed++;});
  sel.forEach(id=>{if(!correct.includes(id))extra++;});
  const pct=correct.length>0?Math.round(hits/correct.length*100):0;
  const isOk=pct>=75&&extra<=1;

  if(isOk){STATE.correct++;STATE.score+=250;}else{STATE.errors++;}
  document.getElementById('h-score').textContent=STATE.score;
  STATE.moves.push({mode:'reasoning',scenario:sc.client_says?.slice(0,40),pct:pct,rt_ms:rt,extra_items:extra,correct:isOk});

  const feedHTML=correct.map(id=>{
    const it=PACK.items.find(x=>x.id===id);
    const ok=sel.includes(id);
    return`<div style="padding:6px 10px;border-radius:6px;background:${ok?'rgba(34,197,94,.1)':'rgba(239,68,68,.05)'};border:1px solid ${ok?'var(--ok)':'var(--err)'};font-size:.8rem;margin:3px 0;display:flex;align-items:center;gap:8px">
      <span>${it?.emoji||''}</span><span>${it?.name||id}</span>
      <span style="margin-left:auto;color:${ok?'var(--ok)':'var(--err)'}">${ok?'[ok]':'[faltó]'}</span>
    </div>`;
  }).join('');

  document.getElementById('game').innerHTML=`
    <div style="max-width:600px;margin:0 auto;padding:16px;text-align:center">
      <div style="font-size:2rem">${isOk?'[ok]':'[x]'}</div>
      <div style="font-size:1.2rem;font-weight:700;color:${isOk?'var(--ok)':'var(--err)'};margin:8px 0">${pct}% correcto</div>
      <div style="background:var(--surface);border-radius:10px;padding:12px;margin:12px 0;text-align:left">
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:6px">Razonamiento correcto:</div>
        <div style="font-size:.82rem;color:var(--dim);line-height:1.5">${sc.reasoning||''}</div>
      </div>
      <div style="text-align:left">${feedHTML}</div>
      ${extra>0?`<div style="color:var(--warn);font-size:.78rem;margin-top:8px">Seleccionaste ${extra} producto(s) que no corresponde(n)</div>`:''}
      <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
        <button class="btn btn-primary" onclick="STATE.reasonScenIdx++;startReasoning()">Siguiente caso</button>
        <button class="btn btn-ghost btn-sm" onclick="showIntro()">Menú</button>
      </div>
    </div>`;
}

// Progresion automatica de nivel

  :acc<60?`<div style="background:rgba(239,68,68,.05);border:1px solid var(--err);border-radius:10px;padding:10px 16px;font-size:.82rem;color:var(--err);margin-bottom:16px">Necesitas 75%+ para avanzar. ${acc}% esta vez.</div>`:'';

document.getElementById('game').innerHTML=`<div class="results">
<h2>${acc>=80?'Excelente':acc>=60?'Bien':'Seguí practicando'}</h2>

  <div class="res-card"><div class="rv" style="color:var(--accent)">${STATE.score}</div><div class="rl">Puntos</div></div>

</div>
<div style="margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">

// === MOUSE METRICS ENGINE ===
function mouseMetrics(){
  const md=STATE.mouseData;if(md.length<10)return{pts:md.length,vel:0,velVar:0,pauses:0,dirChanges:0,pathEff:0,totalDist:0,idleRatio:0};
  // Total distance & velocity per segment
  let totalDist=0;const vels=[];
  for(let i=1;i<md.length;i++){
    const dx=md[i].x-md[i-1].x,dy=md[i].y-md[i-1].y,dist=Math.sqrt(dx*dx+dy*dy);
    const dt=(md[i].t-md[i-1].t)/1000;
    totalDist+=dist;
    if(dt>0&&dt<2)vels.push(dist/dt); // ignore >2s gaps (pauses)
  }
  const avgVel=vels.length?Math.round(vels.reduce((a,b)=>a+b,0)/vels.length):0;
  // Velocity variance
  const velVar=vels.length>1?Math.round(Math.sqrt(vels.reduce((s,v)=>s+(v-avgVel)**2,0)/(vels.length-1))):0;
  // Pauses >2s
  let pauses=0,idleMs=0;
  for(let i=1;i<md.length;i++){const gap=md[i].t-md[i-1].t;if(gap>2000){pauses++;idleMs+=gap}}
  const totalMs=md[md.length-1].t-md[0].t;
  const idleRatio=totalMs>0?Math.round(idleMs/totalMs*100):0;
  // Direction changes (angle change > 90°)
  let dirChanges=0;
  for(let i=2;i<md.length;i++){
    const ax=md[i-1].x-md[i-2].x,ay=md[i-1].y-md[i-2].y;
    const bx=md[i].x-md[i-1].x,by=md[i].y-md[i-1].y;
    const dot=ax*bx+ay*by,magA=Math.sqrt(ax*ax+ay*ay),magB=Math.sqrt(bx*bx+by*by);
    if(magA>2&&magB>2){const cos=dot/(magA*magB);if(cos<0)dirChanges++} // >90° change
  }
  // Path efficiency (straight line start→end / actual distance)
  const sx=md[0].x,sy=md[0].y,ex=md[md.length-1].x,ey=md[md.length-1].y;
  const straightDist=Math.sqrt((ex-sx)**2+(ey-sy)**2);
  const pathEff=totalDist>0?Math.round(straightDist/totalDist*100):0;
  // Scroll depth
  const scrollCount=(STATE.scrollData||[]).length;
  const maxScroll=STATE.scrollData?.length?Math.max(...STATE.scrollData.map(s=>s.y)):0;

  return{pts:md.length,vel:avgVel,velVar,pauses,dirChanges,pathEff,totalDist:Math.round(totalDist),idleRatio,scrollCount,maxScroll};
}

  <div style="background:var(--card);padding:8px;border-radius:8px;text-align:center"><div style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700">${m.dirChanges}</div><div style="color:var(--dim);font-size:.55rem;margin-top:2px">cambios dirección</div></div>
  <div style="background:var(--card);padding:8px;border-radius:8px;text-align:center"><div style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700">${m.pathEff}%</div><div style="color:var(--dim);font-size:.55rem;margin-top:2px">eficiencia trazo</div></div>
  <div style="background:var(--card);padding:8px;border-radius:8px;text-align:center"><div style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700">${m.idleRatio}%</div><div style="color:var(--dim);font-size:.55rem;margin-top:2px">% inactivo</div></div>
</div>
<div style="font-size:.65rem;color:var(--dim);line-height:1.7">

  <strong>Vel. prom (${m.vel} px/s):</strong> ${m.vel<100?'Muy lento — posible enlentecimiento psicomotor o sedación':m.vel<300?'Normal':m.vel<600?'Rápido — buena activación motora':'Muy rápido — posible agitación o impulsividad'}<br>
  <strong>Varianza vel. (${m.velVar}):</strong> ${m.velVar<50?'Muy consistente — movimiento uniforme':m.velVar<150?'Varianza normal':m.velVar<300?'Variable — aceleraciones y desaceleraciones marcadas':'Muy variable — posible tremor, fatiga o agitación'}<br>
  <strong>Pausas &gt;2s (${m.pauses}):</strong> ${m.pauses===0?'Sin interrupciones':m.pauses<=3?'Pocas — reflexión puntual':m.pauses<=8?'Moderadas — deliberación o fatiga intermitente':'Muchas — fatiga cognitiva, desenganche o distracción'}<br>
  <strong>Cambios dirección (${m.dirChanges}):</strong> ${m.dirChanges<10?'Movimiento fluido y dirigido':m.dirChanges<30?'Normal — exploración visual':m.dirChanges<60?'Frecuentes — búsqueda visual activa o indecisión':'Excesivos — desorientación visual o agitación motora'}<br>
  <strong>Eficiencia trazo (${m.pathEff}%):</strong> ${m.pathEff>50?'Alta — movimiento dirigido con objetivo':m.pathEff>20?'Media — exploración con orientación':m.pathEff>5?'Baja — mucha exploración sin rumbo claro':'Muy baja — movimiento errático'}
</div>`
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
