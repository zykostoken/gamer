<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cargando... · HDD Gaming</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0b;--surface:#141416;--card:#1c1c20;--card2:#222228;--border:rgba(255,255,255,.06);--text:#e4e4e7;--muted:#71717a;--accent:#f59e0b;--green:#22c55e;--red:#ef4444;--blue:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
.noise{position:fixed;inset:0;opacity:.025;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-back{color:var(--muted);text-decoration:none;font-size:.8rem;padding:6px 12px;border-radius:8px;border:1px solid var(--border);transition:all .2s}
.topbar-back:hover{border-color:var(--accent);color:var(--accent)}
.topbar-title{font-weight:700;font-size:1rem}
.topbar-right{display:flex;align-items:center;gap:16px;font-family:'Space Mono',monospace;font-size:.85rem}
.timer{color:var(--accent);font-weight:700;font-size:1.1rem}
.score-display{display:flex;gap:12px}
.score-item{display:flex;align-items:center;gap:4px}
.score-icon{font-size:.8rem}
.score-val{font-weight:700}

/* MODES NAV */
.modes-nav{display:flex;gap:4px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.mode-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.mode-btn:hover{border-color:rgba(255,255,255,.15);color:var(--text)}
.mode-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.mode-btn .mode-emoji{margin-right:4px}

/* GAME AREA */
.game-area{max-width:1400px;margin:0 auto;padding:20px}

/* CLASSIFICATION MODE */
.classify-layout{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:900px){.classify-layout{grid-template-columns:320px 1fr}}
.source-area{background:var(--surface);border:2px dashed var(--border);border-radius:16px;padding:16px}
.source-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;font-weight:700}
.source-items{display:flex;flex-wrap:wrap;gap:8px;min-height:100px}

.item-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;background:var(--card2);border:1px solid var(--border);cursor:grab;user-select:none;font-size:.82rem;font-weight:500;transition:all .2s;position:relative}
.item-chip:hover{border-color:rgba(255,255,255,.15);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.item-chip.dragging{opacity:.4;transform:scale(.95)}
.item-chip .item-emoji{font-size:1.1rem}
.item-chip .item-price{font-size:.65rem;color:var(--green);font-family:'Space Mono',monospace;margin-left:4px}
.item-chip.correct{border-color:var(--green);background:rgba(34,197,94,.1);animation:popIn .3s ease}
.item-chip.wrong{border-color:var(--red);background:rgba(239,68,68,.1);animation:shake .4s ease}

.shelves-area{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.shelf{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:14px;min-height:120px;transition:all .25s}
.shelf.drag-over{border-color:var(--accent);background:rgba(245,158,11,.04);box-shadow:0 0 20px rgba(245,158,11,.08)}
.shelf-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.shelf-emoji{font-size:1.3rem}
.shelf-name{font-size:.82rem;font-weight:700}
.shelf-count{margin-left:auto;font-size:.65rem;color:var(--muted);font-family:'Space Mono',monospace;background:var(--card);padding:2px 8px;border-radius:6px}
.shelf-items{display:flex;flex-wrap:wrap;gap:6px;min-height:40px}

/* GROUPING MODE */
.grouping-mission{background:var(--surface);border-radius:16px;padding:24px;border:1px solid var(--border);margin-bottom:20px}
.mission-emoji{font-size:2rem;margin-bottom:8px}
.mission-name{font-size:1.2rem;font-weight:900}
.mission-desc{font-size:.88rem;color:#a1a1aa;margin-top:8px;line-height:1.5}
.grouping-items{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.group-item{padding:10px 16px;border-radius:10px;background:var(--card);border:2px solid var(--border);cursor:pointer;font-size:.82rem;display:flex;align-items:center;gap:6px;transition:all .2s;user-select:none}
.group-item:hover{border-color:rgba(255,255,255,.15)}
.group-item.selected{border-color:var(--accent);background:rgba(245,158,11,.08)}
.group-item.correct-reveal{border-color:var(--green);background:rgba(34,197,94,.1)}
.group-item.trap-reveal{border-color:var(--red);background:rgba(239,68,68,.1)}
.group-item.missed-reveal{border-color:var(--blue);background:rgba(59,130,246,.08)}
.check-btn{display:block;margin:20px auto 0;padding:14px 40px;border-radius:12px;background:var(--accent);color:#000;font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:all .2s}
.check-btn:hover{filter:brightness(1.1);transform:scale(1.02)}

/* CALCULATION MODE */
.calc-card{background:var(--surface);border-radius:16px;padding:32px;border:1px solid var(--border);max-width:600px;margin:0 auto}
.calc-emoji{font-size:2.5rem;margin-bottom:12px}
.calc-question{font-size:1.1rem;line-height:1.6;margin-bottom:24px}
.calc-input-row{display:flex;gap:12px;align-items:center}
.calc-input{flex:1;padding:14px 18px;border-radius:10px;background:var(--card);border:2px solid var(--border);color:var(--text);font-size:1.2rem;font-family:'Space Mono',monospace;outline:none;transition:border-color .2s}
.calc-input:focus{border-color:var(--accent)}
.calc-unit{font-size:.85rem;color:var(--muted)}
.calc-submit{padding:14px 28px;border-radius:10px;background:var(--accent);color:#000;font-weight:700;border:none;cursor:pointer;font-size:.9rem;transition:all .2s}
.calc-result{margin-top:20px;padding:16px;border-radius:12px;font-size:.88rem;line-height:1.5}
.calc-result.correct{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--green)}
.calc-result.wrong{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:var(--red)}

/* SIMILARITY MODE */
.similarity-pair{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:700px;margin:0 auto}
.sim-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:24px;text-align:center;cursor:pointer;transition:all .25s}
.sim-card:hover{border-color:rgba(255,255,255,.12)}
.sim-card .sim-emoji{font-size:2.5rem;margin-bottom:8px}
.sim-card .sim-name{font-size:1rem;font-weight:700;margin-bottom:4px}
.sim-card .sim-cat{font-size:.72rem;color:var(--muted)}
.sim-vs{text-align:center;font-size:1.4rem;font-weight:900;color:var(--muted);padding:20px 0}
.sim-explain{background:var(--surface);border-radius:14px;padding:20px;border:1px solid var(--border);max-width:700px;margin:16px auto 0;font-size:.88rem;line-height:1.6;color:#a1a1aa}
.sim-explain strong{color:var(--accent)}
.sim-next{display:block;margin:16px auto 0;padding:10px 32px;border-radius:8px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-weight:600;cursor:pointer;transition:all .2s}
.sim-next:hover{border-color:var(--accent);color:var(--accent)}

/* RESULTS */
.results-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.results-card{background:var(--surface);border-radius:20px;padding:40px;max-width:480px;width:90%;text-align:center;border:1px solid var(--border);animation:scaleIn .4s ease}
.results-emoji{font-size:3.5rem;margin-bottom:12px}
.results-title{font-size:1.6rem;font-weight:900}
.results-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin:24px 0}
.results-stat{background:var(--card);border-radius:12px;padding:14px}
.results-stat-val{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700}
.results-stat-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:4px}
.results-btn{padding:14px 40px;border-radius:12px;background:var(--accent);color:#000;font-weight:700;font-size:.95rem;border:none;cursor:pointer;margin-top:8px;transition:all .2s}
.results-btn:hover{filter:brightness(1.1)}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}

/* TOAST */
.toasts{position:fixed;top:70px;right:16px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 18px;border-radius:10px;font-size:.82rem;font-weight:600;color:#fff;animation:slideIn .3s ease,slideOut .3s ease 2s forwards;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:300px}
.toast-ok{background:rgba(34,197,94,.9)}
.toast-err{background:rgba(239,68,68,.85)}
.toast-info{background:rgba(59,130,246,.85)}

@keyframes popIn{0%{transform:scale(.9)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* Drag ghost */
.drag-ghost{position:fixed;pointer-events:none;z-index:999;padding:8px 14px;border-radius:10px;background:var(--accent);color:#000;font-weight:700;font-size:.85rem;box-shadow:0 8px 30px rgba(0,0,0,.5);transform:translate(-50%,-50%)}
</style>
</head>
<body>
<div class="noise"></div>
<div class="toasts" id="toasts"></div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="../../index.html" class="topbar-back">← Volver</a>
    <span class="topbar-title" id="topbar-title">Cargando...</span>
  </div>
  <div class="topbar-right">
    <div class="timer" id="timer">00:00</div>
    <div class="score-display">
      <div class="score-item"><span class="score-icon">✅</span><span class="score-val" id="score-ok">0</span></div>
      <div class="score-item"><span class="score-icon">❌</span><span class="score-val" id="score-err">0</span></div>
    </div>
  </div>
</div>

<!-- MODES NAV -->
<div class="modes-nav" id="modes-nav"></div>

<!-- GAME AREA -->
<div class="game-area" id="game-area">
  <div class="loading"><div class="spinner"></div><span style="color:var(--muted);font-size:.85rem">Cargando pack...</span></div>
</div>

<script>
// ============================
// ENGINE: classify-and-place
// ============================

let PACK = null;
let STATE = { mode:'classify', ok:0, err:0, startTime:0, timerInterval:null, level:1, placed:{}, currentMissionIdx:0, currentCalcIdx:0, currentPairIdx:0, selectedGroupItems:new Set() };

// -- PACK LOADING --
const params = new URLSearchParams(location.search);
const packId = params.get('pack') || 'ferreteria';

async function loadPack() {
  try {
    const r = await fetch(`../../packs/classify-and-place/${packId}/pack.json`);
    if (!r.ok) throw new Error(r.status);
    PACK = await r.json();
  } catch(e) {
    // Fallback: try alternate paths
    try {
      const r2 = await fetch(`/packs/classify-and-place/${packId}/pack.json`);
      PACK = await r2.json();
    } catch(e2) {
      document.getElementById('game-area').innerHTML = `<div class="loading"><p style="color:var(--red)">No se pudo cargar el pack "${packId}"</p><a href="../../index.html" class="topbar-back" style="margin-top:12px">Volver al hub</a></div>`;
      return;
    }
  }
  initGame();
}

function initGame() {
  document.title = `${PACK.meta.name} · HDD Gaming`;
  document.getElementById('topbar-title').textContent = `${PACK.meta.emoji} ${PACK.meta.name}`;
  document.documentElement.style.setProperty('--accent', PACK.meta.colors?.accent || '#f59e0b');
  STATE.startTime = Date.now();
  STATE.timerInterval = setInterval(updateTimer, 1000);
  buildModesNav();
  setMode('classify');
}

// -- TIMER --
function updateTimer() {
  const s = Math.floor((Date.now() - STATE.startTime) / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  document.getElementById('timer').textContent = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateScore() {
  document.getElementById('score-ok').textContent = STATE.ok;
  document.getElementById('score-err').textContent = STATE.err;
}

// -- MODES NAV --
const MODES = [
  { id:'classify', emoji:'📦', label:'Clasificar' },
  { id:'grouping', emoji:'🧰', label:'Armar Kit' },
  { id:'calculation', emoji:'🧮', label:'Calcular' },
  { id:'similarity', emoji:'👀', label:'¿Cuál es cuál?' }
];

function buildModesNav() {
  const nav = document.getElementById('modes-nav');
  nav.innerHTML = MODES.map(m => 
    `<button class="mode-btn ${m.id === STATE.mode ? 'active' : ''}" onclick="setMode('${m.id}')"><span class="mode-emoji">${m.emoji}</span>${m.label}</button>`
  ).join('');
}

function setMode(mode) {
  STATE.mode = mode;
  buildModesNav();
  const area = document.getElementById('game-area');
  switch(mode) {
    case 'classify': renderClassify(area); break;
    case 'grouping': renderGrouping(area); break;
    case 'calculation': renderCalculation(area); break;
    case 'similarity': renderSimilarity(area); break;
  }
}

// -- TOAST --
function toast(msg, type='ok') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ============================
// MODE: CLASSIFY
// ============================
function renderClassify(area) {
  const items = shuffle([...PACK.items]).slice(0, 20);
  const catIds = [...new Set(items.map(i => i.category))];
  const cats = PACK.categories.filter(c => catIds.includes(c.id));
  // Add a couple extra categories for confusion
  const extraCats = PACK.categories.filter(c => !catIds.includes(c.id)).slice(0, 2);
  const allCats = shuffle([...cats, ...extraCats]);

  STATE.classifyItems = items;
  STATE.placed = {};

  area.innerHTML = `
    <div class="classify-layout">
      <div class="source-area">
        <div class="source-title">📦 Mostrador — ${items.length} productos por ubicar</div>
        <div class="source-items" id="source-items">
          ${items.map(item => itemChip(item)).join('')}
        </div>
      </div>
      <div class="shelves-area" id="shelves-area">
        ${allCats.map(cat => `
          <div class="shelf" data-cat="${cat.id}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
            <div class="shelf-header">
              <span class="shelf-emoji">${cat.emoji}</span>
              <span class="shelf-name">${cat.label}</span>
              <span class="shelf-count" id="count-${cat.id}">0</span>
            </div>
            <div class="shelf-items" id="shelf-${cat.id}"></div>
          </div>
        `).join('')}
      </div>
    </div>`;

  // Setup drag events
  document.querySelectorAll('.item-chip[draggable]').forEach(el => {
    el.addEventListener('dragstart', onDragStart);
    el.addEventListener('dragend', onDragEnd);
    // Touch support
    el.addEventListener('touchstart', onTouchStart, {passive:false});
    el.addEventListener('touchmove', onTouchMove, {passive:false});
    el.addEventListener('touchend', onTouchEnd);
  });
}

function itemChip(item, small=false) {
  const price = item.price ? `<span class="item-price">$${item.price.toLocaleString('es-AR')}</span>` : '';
  return `<div class="item-chip" draggable="true" data-id="${item.id}" data-cat="${item.category}">
    <span class="item-emoji">${item.emoji}</span>
    <span>${item.name}</span>${price}
  </div>`;
}

let draggedItem = null;
let touchGhost = null;

function onDragStart(e) {
  draggedItem = e.target.closest('.item-chip');
  draggedItem.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedItem.dataset.id);
}
function onDragEnd(e) {
  if (draggedItem) draggedItem.classList.remove('dragging');
  draggedItem = null;
  document.querySelectorAll('.shelf').forEach(s => s.classList.remove('drag-over'));
}
function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  const shelf = e.currentTarget;
  shelf.classList.remove('drag-over');
  if (!draggedItem) return;
  const itemId = draggedItem.dataset.id;
  const correctCat = draggedItem.dataset.cat;
  const targetCat = shelf.dataset.cat;
  processPlacement(itemId, correctCat, targetCat, draggedItem, shelf);
}

// Touch support
function onTouchStart(e) {
  e.preventDefault();
  draggedItem = e.target.closest('.item-chip');
  draggedItem.classList.add('dragging');
  touchGhost = document.createElement('div');
  touchGhost.className = 'drag-ghost';
  touchGhost.textContent = draggedItem.querySelector('.item-emoji').textContent + ' ' + draggedItem.querySelector('span:nth-child(2)')?.textContent;
  document.body.appendChild(touchGhost);
  moveTouchGhost(e.touches[0]);
}
function onTouchMove(e) {
  e.preventDefault();
  if (touchGhost) moveTouchGhost(e.touches[0]);
  // Highlight shelf under touch
  document.querySelectorAll('.shelf').forEach(s => s.classList.remove('drag-over'));
  const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
  const shelf = el?.closest('.shelf');
  if (shelf) shelf.classList.add('drag-over');
}
function onTouchEnd(e) {
  if (touchGhost) { touchGhost.remove(); touchGhost = null; }
  if (!draggedItem) return;
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const shelf = el?.closest('.shelf');
  if (shelf) {
    const itemId = draggedItem.dataset.id;
    const correctCat = draggedItem.dataset.cat;
    const targetCat = shelf.dataset.cat;
    processPlacement(itemId, correctCat, targetCat, draggedItem, shelf);
  }
  draggedItem.classList.remove('dragging');
  document.querySelectorAll('.shelf').forEach(s => s.classList.remove('drag-over'));
  draggedItem = null;
}
function moveTouchGhost(touch) {
  if (touchGhost) {
    touchGhost.style.left = touch.clientX + 'px';
    touchGhost.style.top = touch.clientY + 'px';
  }
}

function processPlacement(itemId, correctCat, targetCat, chipEl, shelfEl) {
  if (STATE.placed[itemId]) return;
  STATE.placed[itemId] = targetCat;

  const isCorrect = correctCat === targetCat;
  const item = PACK.items.find(i => i.id === itemId);
  
  if (isCorrect) {
    STATE.ok++;
    chipEl.classList.add('correct');
    toast(`✅ ${item.name} → correcto`, 'ok');
  } else {
    STATE.err++;
    chipEl.classList.add('wrong');
    const correctCatObj = PACK.categories.find(c => c.id === correctCat);
    const hint = item.similarity_note || `Va en ${correctCatObj?.label}`;
    toast(`❌ ${item.name} → ${hint}`, 'err');
  }
  updateScore();

  // Move chip to shelf
  const shelfItems = shelfEl.querySelector('.shelf-items');
  const mini = document.createElement('div');
  mini.className = `item-chip ${isCorrect ? 'correct' : 'wrong'}`;
  mini.style.cursor = 'default';
  mini.innerHTML = `<span class="item-emoji">${item.emoji}</span><span style="font-size:.75rem">${item.name}</span>`;
  shelfItems.appendChild(mini);

  // Update count
  const countEl = document.getElementById(`count-${targetCat}`);
  if (countEl) countEl.textContent = shelfItems.children.length;

  // Remove from source
  chipEl.style.transition = 'all .2s';
  chipEl.style.opacity = '0';
  chipEl.style.transform = 'scale(.8)';
  setTimeout(() => chipEl.remove(), 200);

  // Check if done
  const remaining = document.querySelectorAll('#source-items .item-chip');
  if (remaining.length <= 1) {
    setTimeout(() => showResults('classify'), 600);
  }
}

// ============================
// MODE: GROUPING
// ============================
function renderGrouping(area) {
  const missions = PACK.missions?.grouping;
  if (!missions || missions.length === 0) {
    area.innerHTML = '<div class="loading"><p style="color:var(--muted)">Este pack no tiene misiones de agrupamiento todavía.</p></div>';
    return;
  }
  STATE.currentMissionIdx = STATE.currentMissionIdx % missions.length;
  const mission = missions[STATE.currentMissionIdx];
  STATE.selectedGroupItems = new Set();

  // Get all items that could be shown (correct + traps + some neutrals)
  const relevantIds = [...(mission.correct_items || []), ...(mission.trap_items || []), ...(mission.partial_credit || [])];
  const relevantItems = relevantIds.map(id => PACK.items.find(i => i.id === id)).filter(Boolean);
  // Add some random distractors
  const otherItems = shuffle(PACK.items.filter(i => !relevantIds.includes(i.id))).slice(0, 6);
  const allItems = shuffle([...relevantItems, ...otherItems]);

  area.innerHTML = `
    <div class="grouping-mission">
      <div class="mission-emoji">${mission.emoji || '🧰'}</div>
      <div class="mission-name">${mission.name}</div>
      <div class="mission-desc">${mission.description}</div>
    </div>
    <div class="grouping-items" id="grouping-items">
      ${allItems.map(item => `
        <div class="group-item" data-id="${item.id}" onclick="toggleGroupItem(this)">
          <span>${item.emoji}</span>
          <span>${item.name}</span>
          ${item.price ? `<span style="font-size:.7rem;color:var(--green);margin-left:4px;font-family:'Space Mono',monospace">$${item.price.toLocaleString('es-AR')}</span>` : ''}
        </div>
      `).join('')}
    </div>
    <button class="check-btn" onclick="checkGrouping()">Verificar selección</button>
    <div id="grouping-result"></div>`;
}

function toggleGroupItem(el) {
  const id = el.dataset.id;
  if (STATE.selectedGroupItems.has(id)) {
    STATE.selectedGroupItems.delete(id);
    el.classList.remove('selected');
  } else {
    STATE.selectedGroupItems.add(id);
    el.classList.add('selected');
  }
}

function checkGrouping() {
  const missions = PACK.missions.grouping;
  const mission = missions[STATE.currentMissionIdx];
  const correct = new Set(mission.correct_items || []);
  const traps = new Set(mission.trap_items || []);
  const partial = new Set(mission.partial_credit || []);
  const selected = STATE.selectedGroupItems;

  let hits = 0, misses = 0, trapHits = 0;

  document.querySelectorAll('.group-item').forEach(el => {
    const id = el.dataset.id;
    el.classList.remove('selected');
    el.style.pointerEvents = 'none';

    if (correct.has(id) && selected.has(id)) {
      el.classList.add('correct-reveal');
      hits++;
    } else if (correct.has(id) && !selected.has(id)) {
      el.classList.add('missed-reveal');
      misses++;
    } else if (traps.has(id) && selected.has(id)) {
      el.classList.add('trap-reveal');
      trapHits++;
      const explain = mission.trap_explanations?.[id];
      if (explain) {
        const note = document.createElement('div');
        note.style.cssText = 'font-size:.7rem;color:var(--red);margin-top:4px';
        note.textContent = '⚠️ ' + explain;
        el.appendChild(note);
      }
    } else if (partial.has(id) && selected.has(id)) {
      el.classList.add('correct-reveal');
      hits += 0.5;
    }
  });

  STATE.ok += hits;
  STATE.err += trapHits + misses;
  updateScore();

  const total = correct.size;
  const pct = Math.round((hits / total) * 100);
  const resultDiv = document.getElementById('grouping-result');
  resultDiv.innerHTML = `
    <div style="text-align:center;margin-top:24px">
      <div style="font-size:2rem">${pct >= 70 ? '🎉' : pct >= 40 ? '🤔' : '😬'}</div>
      <div style="font-size:1.1rem;font-weight:700;margin:8px 0">${hits}/${total} items correctos${trapHits > 0 ? ` · ${trapHits} trampas` : ''}</div>
      <button class="sim-next" onclick="STATE.currentMissionIdx++;renderGrouping(document.getElementById('game-area'))">Siguiente misión →</button>
    </div>`;

  document.querySelector('.check-btn').style.display = 'none';
}

// ============================
// MODE: CALCULATION
// ============================
function renderCalculation(area) {
  const calcs = PACK.missions?.calculation;
  if (!calcs || calcs.length === 0) {
    area.innerHTML = '<div class="loading"><p style="color:var(--muted)">Este pack no tiene desafíos de cálculo todavía.</p></div>';
    return;
  }
  STATE.currentCalcIdx = STATE.currentCalcIdx % calcs.length;
  const calc = calcs[STATE.currentCalcIdx];

  area.innerHTML = `
    <div class="calc-card">
      <div class="calc-emoji">${calc.emoji || '🧮'}</div>
      <div class="mission-name" style="margin-bottom:4px">${calc.name}</div>
      <div class="calc-question">${calc.description}</div>
      <div class="calc-input-row">
        <input type="number" class="calc-input" id="calc-answer" placeholder="Tu respuesta..." onkeydown="if(event.key==='Enter')checkCalc()">
        <span class="calc-unit">${calc.answer_unit || '$'}</span>
        <button class="calc-submit" onclick="checkCalc()">Verificar</button>
      </div>
      <div id="calc-result"></div>
    </div>`;
  document.getElementById('calc-answer').focus();
}

function checkCalc() {
  const calcs = PACK.missions.calculation;
  const calc = calcs[STATE.currentCalcIdx];
  const input = document.getElementById('calc-answer');
  const answer = parseFloat(input.value);
  if (isNaN(answer)) return;

  let correct = false;
  const expected = typeof calc.correct_answer === 'object' ? Object.values(calc.correct_answer)[0] : calc.correct_answer;
  
  if (calc.accept_range) {
    correct = answer >= calc.accept_range[0] && answer <= calc.accept_range[1];
  } else {
    correct = Math.abs(answer - expected) < expected * 0.05 || answer === expected;
  }

  if (correct) { STATE.ok++; toast('✅ ¡Correcto!', 'ok'); }
  else { STATE.err++; toast(`❌ La respuesta era ${typeof expected === 'number' ? expected.toLocaleString('es-AR') : expected}`, 'err'); }
  updateScore();

  const res = document.getElementById('calc-result');
  res.className = `calc-result ${correct ? 'correct' : 'wrong'}`;
  res.innerHTML = `<strong>${correct ? '✅ ¡Correcto!' : '❌ Incorrecto'}</strong><br>${calc.explanation}<br><br>
    <button class="sim-next" onclick="STATE.currentCalcIdx++;renderCalculation(document.getElementById('game-area'))">Siguiente problema →</button>`;
  input.disabled = true;
}

// ============================
// MODE: SIMILARITY
// ============================
function renderSimilarity(area) {
  const simData = PACK.missions?.similarity_discrimination;
  if (!simData || simData.length === 0 || !simData[0].pairs) {
    area.innerHTML = '<div class="loading"><p style="color:var(--muted)">Este pack no tiene pares de semejanza todavía.</p></div>';
    return;
  }
  const pairs = simData[0].pairs;
  STATE.currentPairIdx = STATE.currentPairIdx % pairs.length;
  const pair = pairs[STATE.currentPairIdx];
  const itemA = PACK.items.find(i => i.id === pair.item_a);
  const itemB = PACK.items.find(i => i.id === pair.item_b);
  if (!itemA || !itemB) { STATE.currentPairIdx++; renderSimilarity(area); return; }

  const catA = PACK.categories.find(c => c.id === itemA.category);
  const catB = PACK.categories.find(c => c.id === itemB.category);

  area.innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Par ${STATE.currentPairIdx + 1} de ${pairs.length}</div>
      <div style="font-size:1.2rem;font-weight:700;margin-top:8px">Estos dos se parecen. ¿En qué se diferencian?</div>
    </div>
    <div class="similarity-pair">
      <div class="sim-card" onclick="revealSimilarity()">
        <div class="sim-emoji">${itemA.emoji}</div>
        <div class="sim-name">${itemA.name}</div>
        <div class="sim-cat">${catA?.emoji} ${catA?.label}</div>
      </div>
      <div class="sim-card" onclick="revealSimilarity()">
        <div class="sim-emoji">${itemB.emoji}</div>
        <div class="sim-name">${itemB.name}</div>
        <div class="sim-cat">${catB?.emoji} ${catB?.label}</div>
      </div>
    </div>
    <div class="sim-vs">VS</div>
    <div id="sim-reveal" style="display:none">
      <div class="sim-explain"><strong>Diferencia clave:</strong><br>${pair.key_difference}</div>
      <button class="sim-next" onclick="STATE.currentPairIdx++;renderSimilarity(document.getElementById('game-area'))">Siguiente par →</button>
    </div>
    <button class="check-btn" id="sim-show-btn" onclick="revealSimilarity()" style="margin-top:20px">Revelar diferencia</button>`;
}

function revealSimilarity() {
  document.getElementById('sim-reveal').style.display = 'block';
  const btn = document.getElementById('sim-show-btn');
  if (btn) btn.style.display = 'none';
  STATE.ok++;
  updateScore();
}

// ============================
// RESULTS
// ============================
function showResults(mode) {
  const elapsed = Math.floor((Date.now() - STATE.startTime) / 1000);
  const total = STATE.ok + STATE.err;
  const pct = total > 0 ? Math.round((STATE.ok / total) * 100) : 0;
  let emoji = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : pct >= 40 ? '🤔' : '💪';
  let msg = pct >= 80 ? '¡Excelente trabajo!' : pct >= 60 ? 'Buen trabajo' : pct >= 40 ? 'Se puede mejorar' : 'A seguir practicando';

  const overlay = document.createElement('div');
  overlay.className = 'results-overlay';
  overlay.innerHTML = `
    <div class="results-card">
      <div class="results-emoji">${emoji}</div>
      <div class="results-title">${msg}</div>
      <div class="results-stats">
        <div class="results-stat"><div class="results-stat-val" style="color:var(--green)">${STATE.ok}</div><div class="results-stat-lbl">Correctos</div></div>
        <div class="results-stat"><div class="results-stat-val" style="color:var(--red)">${STATE.err}</div><div class="results-stat-lbl">Errores</div></div>
        <div class="results-stat"><div class="results-stat-val">${pct}%</div><div class="results-stat-lbl">Precisión</div></div>
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted);margin-bottom:16px">Tiempo: ${Math.floor(elapsed/60)}:${String(elapsed%60).padStart(2,'0')}</div>
      <button class="results-btn" onclick="this.closest('.results-overlay').remove();setMode(STATE.mode)">Jugar de nuevo</button>
      <button class="sim-next" style="margin-top:8px" onclick="this.closest('.results-overlay').remove()">Cerrar</button>
    </div>`;
  document.body.appendChild(overlay);
}

// -- UTILS --
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

// -- INIT --
loadPack();
</script>
