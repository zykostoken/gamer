<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cargando... · ZYKOS GAMER</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--card:#1a1a27;--card2:#22222f;--border:rgba(255,255,255,.06);--text:#e8e8ed;--dim:rgba(255,255,255,.4);--accent:#6366f1;--ok:#22c55e;--err:#ef4444;--warn:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
.grain{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.hdr{background:linear-gradient(180deg,rgba(99,102,241,.08) 0%,transparent 100%);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.hdr-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hdr-left a{color:var(--dim);text-decoration:none;font-size:.75rem;font-family:'Space Mono',monospace;letter-spacing:.05em}
.hdr-left a:hover{color:var(--accent)}
.hdr-title{font-size:1.2rem;font-weight:900;margin-top:2px}
.hdr-right{display:flex;gap:20px;align-items:center}
.hdr-stat{text-align:center}
.hdr-stat-v{font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700}
.hdr-stat-l{font-size:.55rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim)}
.timer{color:var(--warn)}.score-v{color:var(--ok)}
.level-badge{font-family:'Space Mono',monospace;font-size:.65rem;padding:4px 10px;border-radius:6px;background:rgba(99,102,241,.15);color:var(--accent);border:1px solid rgba(99,102,241,.2)}
.game{max-width:1200px;margin:0 auto;padding:24px}
.game-intro{text-align:center;padding:40px 20px}
.game-intro .big-em{font-size:4rem;display:block;margin-bottom:12px}
.game-intro h2{font-size:1.6rem;font-weight:900;margin-bottom:8px}
.game-intro p{color:var(--dim);max-width:500px;margin:0 auto 24px;line-height:1.5;font-size:.9rem}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#818cf8;transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{border-color:rgba(255,255,255,.15)}
.btn-sm{padding:8px 16px;font-size:.78rem}
.mostrador{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px}
.mostrador-title{font-family:'Space Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mostrador-title .count{color:var(--accent)}
.items-row{display:flex;flex-wrap:wrap;gap:8px}
.item{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:100px;height:100px;border-radius:12px;background:var(--card);border:2px solid var(--border);cursor:grab;user-select:none;gap:2px;padding:8px;transition:all .15s;position:relative}
.item:hover{transform:scale(1.06);border-color:rgba(255,255,255,.15);z-index:10}
.item.dragging{opacity:.4;transform:scale(.95)}
.item .item-em{font-size:1.6rem}.item .item-nm{font-size:.55rem;text-align:center;line-height:1.15;color:var(--dim);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.item .item-price{font-size:.6rem;font-weight:700;color:var(--ok);margin-top:1px}
.estantes{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.estante{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:14px;min-height:130px;transition:all .25s}
.estante.drag-over{border-color:var(--accent);background:rgba(99,102,241,.04);box-shadow:0 0 20px rgba(99,102,241,.1)}
.estante.correct-flash{border-color:var(--ok);background:rgba(34,197,94,.04)}.estante.wrong-flash{border-color:var(--err);background:rgba(239,68,68,.04)}
.estante-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.estante-em{font-size:1.2rem}.estante-nm{font-size:.8rem;font-weight:700}.estante-count{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--dim);margin-left:auto}
.estante-items{display:flex;flex-wrap:wrap;gap:6px;min-height:40px}
.placed-item{display:inline-flex;align-items:center;gap:4px;background:var(--card);border-radius:8px;padding:4px 10px;font-size:.7rem;border:1px solid rgba(34,197,94,.2);animation:popIn .25s ease}
.placed-item .pi-em{font-size:.9rem}
.kit-scenario{background:linear-gradient(135deg,var(--surface),var(--card));border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
.kit-scenario::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(99,102,241,.08),transparent 70%);pointer-events:none}
.kit-em{font-size:2.5rem;margin-bottom:8px}.kit-title{font-size:1.3rem;font-weight:900;margin-bottom:4px}
.kit-desc{font-size:.9rem;color:#a1a1aa;line-height:1.5;margin-bottom:16px}
.kit-budget-bar{background:var(--card);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.kit-budget-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim)}
.kit-budget-val{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700}
.kit-budget-meter{flex:1;min-width:120px;height:8px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden}
.kit-budget-fill{height:100%;border-radius:4px;transition:width .3s,background .3s}
.kit-spent{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--dim)}
.kit-remaining{font-family:'Space Mono',monospace;font-size:.8rem;font-weight:700}.kit-remaining.over{color:var(--err)}
.kit-store{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.kit-section{background:var(--surface);border-radius:14px;padding:16px;border:1px solid var(--border)}
.kit-section-hdr{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:.82rem;font-weight:700}
.kit-section-em{font-size:1.1rem}
.kit-product{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);margin-bottom:6px;cursor:pointer;transition:all .2s;user-select:none;position:relative}
.kit-product:hover{border-color:rgba(255,255,255,.12);background:var(--card2)}
.kit-product.in-cart{border-color:var(--accent);background:rgba(99,102,241,.06)}
.kit-product.in-cart::after{content:'';position:absolute;right:10px;color:var(--accent);font-weight:700}
.kit-p-em{font-size:1.2rem;flex-shrink:0}.kit-p-info{flex:1;min-width:0}
.kit-p-name{font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kit-p-hint{font-size:.65rem;color:var(--dim);margin-top:1px}
.kit-p-price{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--ok);font-weight:700;flex-shrink:0}
.kit-cart{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px}
.kit-cart-title{font-family:'Space Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:12px}
.kit-cart-items{display:flex;flex-wrap:wrap;gap:8px;min-height:50px}
.kit-cart-item{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--card);border:1px solid rgba(99,102,241,.2);font-size:.78rem}
.kit-cart-item .ci-em{font-size:.9rem}.kit-cart-item .ci-price{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--ok)}
.kit-empty{color:var(--dim);font-size:.82rem;padding:12px;text-align:center}
.calc-card{background:var(--surface);border-radius:16px;padding:32px;border:1px solid var(--border);max-width:600px;margin:0 auto}
.calc-q{font-size:1.1rem;line-height:1.6;margin:16px 0 24px}
.calc-row{display:flex;gap:12px;align-items:center}
.calc-inp{flex:1;padding:14px 18px;border-radius:10px;background:var(--card);border:2px solid var(--border);color:var(--text);font-size:1.2rem;font-family:'Space Mono',monospace;outline:none;transition:border-color .2s}.calc-inp:focus{border-color:var(--accent)}
.calc-res{margin-top:20px;padding:16px;border-radius:12px;font-size:.88rem;line-height:1.5}
.calc-res.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--ok)}.calc-res.bad{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:var(--err)}
.sim-pair{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:700px;margin:0 auto}
.sim-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:24px;text-align:center;transition:all .25s}
.sim-card .s-em{font-size:2.5rem;margin-bottom:8px}.sim-card .s-nm{font-size:1rem;font-weight:700}.sim-card .s-cat{font-size:.72rem;color:var(--dim);margin-top:4px}
.sim-vs{text-align:center;font-size:1.4rem;font-weight:900;color:var(--dim);padding:20px 0}
.sim-explain{background:var(--surface);border-radius:14px;padding:20px;border:1px solid var(--border);max-width:700px;margin:16px auto 0;font-size:.88rem;line-height:1.6;color:#a1a1aa}
.sim-explain strong{color:var(--accent)}
.results{text-align:center;padding:40px 20px}
.results h2{font-size:2rem;font-weight:900;margin-bottom:8px}
.big-score{font-family:'Space Mono',monospace;font-size:4rem;font-weight:700;color:var(--ok);margin:16px 0}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;max-width:600px;margin:24px auto}
.res-card{background:var(--card);border-radius:12px;padding:16px;text-align:center}
.res-card .rv{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700}
.res-card .rl{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-top:4px}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}.shake{animation:shake .4s ease}
.toast-wrap{position:fixed;top:80px;right:16px;z-index:9998;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:10px 18px;border-radius:10px;font-size:.8rem;font-weight:600;color:#fff;backdrop-filter:blur(12px);pointer-events:auto;animation:tIn .3s ease,tOut .3s ease 2s forwards;box-shadow:0 4px 15px rgba(0,0,0,.3);max-width:320px}
.toast-ok{background:rgba(34,197,94,.85)}.toast-err{background:rgba(239,68,68,.75)}.toast-info{background:rgba(99,102,241,.8)}
@keyframes tIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
.diff-select{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.diff-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'Space Mono',monospace;font-size:.75rem;cursor:pointer;transition:all .2s}
.diff-btn:hover,.diff-btn.active{border-color:var(--accent);background:rgba(99,102,241,.1);color:var(--accent)}
@media(max-width:768px){.estantes{grid-template-columns:1fr 1fr}.item{width:80px;height:85px}.item .item-em{font-size:1.3rem}.hdr-title{font-size:1rem}.kit-store{grid-template-columns:1fr}.sim-pair{grid-template-columns:1fr}}
@media(max-width:480px){.estantes{grid-template-columns:1fr}.game{padding:12px}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="toast-wrap" id="toasts"></div>
<header class="hdr"><div class="hdr-inner">
  <div class="hdr-left"><a href="/games/portal/">← ZYKOS GAMER</a><div class="hdr-title"><span id="h-em"></span> <span id="h-nm"></span></div></div>
  <div class="hdr-right"><span class="level-badge" id="h-level">Nivel 1</span><div class="hdr-stat"><div class="hdr-stat-v score-v" id="h-score">0</div><div class="hdr-stat-l">Puntos</div></div><div class="hdr-stat"><div class="hdr-stat-v timer" id="h-timer">--:--</div><div class="hdr-stat-l">Tiempo</div></div></div>
</div></header>
<main class="game" id="game"><div class="loading"><div class="spinner"></div><p style="color:var(--dim);font-size:.85rem">Cargando pack...</p></div></main>
<script>
const PACK_MAP={'ferreteria':'../../packs/classify-and-place/ferreteria/pack.json','libreria-escolar':'../../packs/classify-and-place/libreria-escolar/pack.json','electrodomesticos':'../../packs/classify-and-place/electrodomesticos/pack.json','almacen-general':'../../packs/classify-and-place/almacen-general/pack.json','supermarket':'../../packs/classify-and-place/supermarket/pack.json'};
let PACK=null,STATE={phase:'intro',mode:'classify',level:1,score:0,correct:0,errors:0,totalItems:0,placedItems:0,startTime:0,timerInterval:null,currentItems:[],moves:[],mouseData:[],lastMoveTime:0,kitCart:{},kitMissionIdx:0,calcIdx:0,simIdx:0,kitBudget:0,kitSpent:0,kitScenario:null,
// Kit telemetry
kitLog:[],       // every add/remove action timestamped
kitRemovals:0,   // how many times removed item from cart
kitFirstAction:0,// ms from start to first add
kitBudgetExceededAt:0, // ms when first exceeded budget (0=never)
kitSectionClicks:{}, // which category sections were scrolled to / clicked
kitLastActionTime:0,
kitDeliberationPauses:0, // pauses >5s between actions
};

async function loadPack(){const p=new URLSearchParams(location.search),id=p.get('pack')||'ferreteria',url=PACK_MAP[id];if(!url){document.getElementById('game').innerHTML='<div class="loading"><p style="color:var(--err)">Pack no encontrado</p></div>';return}try{const r=await fetch(url);if(!r.ok)throw new Error(r.status);PACK=await r.json()}catch(e){document.getElementById('game').innerHTML='<div class="loading"><p style="color:var(--err)">Error: '+e.message+'</p></div>';return}document.title=PACK.meta.name+' · ZYKOS GAMER';document.getElementById('h-em').textContent=PACK.meta.emoji;document.getElementById('h-nm').textContent=PACK.meta.name;if(PACK.meta.colors)document.documentElement.style.setProperty('--accent',PACK.meta.colors.accent);
// Init telemetry with patient ID (from URL param or localStorage)
const pid=new URLSearchParams(location.search).get('pid')||localStorage.getItem('zykos_patient_id')||'demo_'+Date.now();
if(typeof TELEM!=='undefined')TELEM.init(pid).catch(()=>{});
showIntro()}

function showIntro(){STATE.phase='intro';const ml=Object.keys(PACK.difficulty_scaling||{}).length||4,g=document.getElementById('game'),hm=PACK.missions&&(PACK.missions.grouping||PACK.missions.calculation||PACK.missions.similarity_discrimination);
g.innerHTML=`<div class="game-intro"><span class="big-em">${PACK.meta.emoji}</span><h2>${PACK.meta.name}</h2><p>${PACK.meta.description||''}</p><p style="font-size:.75rem;color:var(--dim);margin-bottom:20px;font-style:italic">${PACK.meta.setting||''}</p>
<div style="margin-bottom:20px"><span style="font-family:'Space Mono',monospace;font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Modo de juego</span>
<div class="diff-select" style="margin-top:12px" id="mode-sel"><button class="diff-btn active" onclick="pickMode(this,'classify')"> Clasificar</button><button class="diff-btn" onclick="pickMode(this,'kit')"> Armar Kit</button>${PACK.missions?.calculation?'<button class="diff-btn" onclick="pickMode(this,\'calc\')"> Calcular</button>':''}${PACK.missions?.similarity_discrimination?'<button class="diff-btn" onclick="pickMode(this,\'sim\')"> Semejanzas</button>':''}</div></div>
<div style="margin-bottom:24px"><span style="font-family:'Space Mono',monospace;font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Dificultad</span><div class="diff-select" id="diff-sel"></div></div>
<button class="btn btn-primary" onclick="startMode()">[G] Empezar</button></div>`;
const ds=document.getElementById('diff-sel');for(let i=1;i<=ml;i++){const b=document.createElement('button');b.className='diff-btn'+(i===1?' active':'');b.textContent='Nivel '+i;b.onclick=()=>{STATE.level=i;ds.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('h-level').textContent='Nivel '+i};ds.appendChild(b)}}

function pickMode(btn,m){STATE.mode=m;document.querySelectorAll('#mode-sel .diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function startMode(){if(typeof showPreGameChat==='function'&&!window._pgd){window._pgd=true;showPreGameChat();var _w=setInterval(function(){if(!document.getElementById('mood-pre-overlay')&&!document.getElementById('input-calibration-overlay')){clearInterval(_w);_startModeReal();}},200);setTimeout(function(){clearInterval(_w);_startModeReal();},15000);return;}_startModeReal();}function _startModeReal(){STATE.score=0;STATE.correct=0;STATE.errors=0;STATE.placedItems=0;STATE.moves=[];STATE.mouseData=[];STATE.scrollData=[];STATE.startTime=performance.now();STATE.lastMoveTime=0;document.getElementById('h-score').textContent='0';clearInterval(STATE.timerInterval);let el=0;STATE.timerInterval=setInterval(()=>{el++;document.getElementById('h-timer').textContent=String(Math.floor(el/60)).padStart(2,'0')+':'+String(el%60).padStart(2,'0')},1000);
// Global mouse + scroll telemetry for ALL modes
document.addEventListener('mousemove',trackMouse);document.addEventListener('scroll',trackScroll,true);
// Telemetry: start game session
if(typeof TELEM!=='undefined')TELEM.startGameSession({frame:'classify-and-place',packId:PACK.meta.id,mode:STATE.mode,level:STATE.level}).catch(()=>{});
({classify:startClassify,kit:startKit,calc:startCalc,sim:startSim})[STATE.mode]()}
function toast(m,t){const c=document.getElementById('toasts'),d=document.createElement('div');d.className='toast toast-'+(t||'info');d.textContent=m;c.appendChild(d);setTimeout(()=>d.remove(),2500)}

/* ===== CLASSIFY ===== */
function startClassify(){STATE.phase='playing';const dk='level_'+STATE.level,diff=(PACK.difficulty_scaling||{})[dk]||{items_per_round:15,categories_visible:5};let cats=[...PACK.categories];if(diff.categories_visible&&diff.categories_visible<cats.length)cats=shuffle(cats).slice(0,diff.categories_visible);const catIds=new Set(cats.map(c=>c.id));let items=shuffle(PACK.items.filter(i=>catIds.has(i.category))).slice(0,Math.min(diff.items_per_round||15,PACK.items.length));STATE.currentItems=items;STATE.totalItems=items.length;
// ALL items in one shuffled block — no zones, no grouping, no hints
const allItems=shuffle([...items]).map(it=>{const pr=it.price?'$'+it.price.toLocaleString('es-AR'):(it.price_range?'$'+it.price_range[0].toLocaleString('es-AR'):'');return`<div class="item" draggable="true" data-id="${it.id}" data-cat="${it.category}"><span class="item-em">${it.emoji}</span><span class="item-nm">${it.name}</span>${pr?'<span class="item-price">'+pr+'</span>':''}</div>`}).join('');
document.getElementById('game').innerHTML=`<div class="mostrador"><div class="mostrador-title"> Mostrador — todo mezclado — <span class="count"><span id="remaining">${items.length}</span> por ubicar</span></div><div class="items-row">${allItems}</div></div><div class="estantes" id="estantes"></div>`;
const ed=document.getElementById('estantes');shuffle([...cats]).forEach(cat=>{const el=document.createElement('div');el.className='estante';el.dataset.cat=cat.id;el.innerHTML=`<div class="estante-hdr"><span class="estante-em">${cat.emoji}</span><span class="estante-nm">${cat.label}</span><span class="estante-count" id="cnt-${cat.id}">0</span></div><div class="estante-items" id="placed-${cat.id}"></div>`;el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over')});el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');handleDrop(e.dataTransfer.getData('text/plain'),cat.id,document.querySelector('.item[data-id="'+e.dataTransfer.getData('text/plain')+'"]'))});ed.appendChild(el)});

function kitToggle(id,pr){const now=performance.now(),elapsed=now-STATE.startTime,sinceLastAction=now-STATE.kitLastActionTime;
// Track deliberation pauses (>5s between actions)
if(STATE.kitLastActionTime>0&&sinceLastAction>5000)STATE.kitDeliberationPauses++;

// Track first action latency
if(!STATE.kitFirstAction)STATE.kitFirstAction=elapsed;
const item=PACK.items.find(i=>i.id===id);
if(STATE.kitCart[id]){
  delete STATE.kitCart[id];STATE.kitSpent-=pr;STATE.kitRemovals++;
  STATE.kitLog.push({action:'remove',itemId:id,name:item?.name||id,category:item?.category||'?',price:pr,time:elapsed,spent:STATE.kitSpent,sinceLastMs:sinceLastAction});
  document.querySelector('.kit-product[data-id="'+id+'"]')?.classList.remove('in-cart');toast('Quitado','info');
}else{
  STATE.kitCart[id]=pr;STATE.kitSpent+=pr;
  STATE.kitLog.push({action:'add',itemId:id,name:item?.name||id,category:item?.category||'?',price:pr,time:elapsed,spent:STATE.kitSpent,sinceLastMs:sinceLastAction});
  // Track when budget first exceeded
  if(STATE.kitSpent>STATE.kitBudget&&!STATE.kitBudgetExceededAt)STATE.kitBudgetExceededAt=elapsed;
  document.querySelector('.kit-product[data-id="'+id+'"]')?.classList.add('in-cart');toast('Agregado','ok');
}
// Track section engagement
if(item)STATE.kitSectionClicks[item.category]=(STATE.kitSectionClicks[item.category]||0)+1;
kitUI()}

function startCalc(){STATE.phase='playing';const cs=PACK.missions?.calculation;if(!cs||!cs.length){document.getElementById('game').innerHTML='<div class="loading"><p style="color:var(--dim)">Sin cálculos en este pack</p></div>';return}const c=cs[STATE.calcIdx%cs.length];document.getElementById('game').innerHTML=`<div class="calc-card"><div style="font-size:2.5rem">${c.emoji||''}</div><div style="font-size:1.1rem;font-weight:900;margin-top:8px">${c.name}</div><div class="calc-q">${c.description}</div><div class="calc-row"><input type="number" class="calc-inp" id="calc-a" placeholder="Tu respuesta..." onkeydown="if(event.key==='Enter')checkCalc()"><span style="color:var(--dim);font-size:.85rem">${c.answer_unit||'$'}</span><button class="btn btn-primary btn-sm" onclick="checkCalc()">Verificar</button></div><div id="calc-res"></div></div>`;document.getElementById('calc-a').focus()}

function checkCalc(){const cs=PACK.missions.calculation,c=cs[STATE.calcIdx%cs.length],v=parseFloat(document.getElementById('calc-a').value);if(isNaN(v))return;const exp=typeof c.correct_answer==='object'?Object.values(c.correct_answer)[0]:c.correct_answer;let ok=c.accept_range?v>=c.accept_range[0]&&v<=c.accept_range[1]:Math.abs(v-exp)<Math.max(1,exp*.05);if(ok){STATE.correct++;STATE.score+=150;toast('[ok] Correcto','ok')}else{STATE.errors++;toast('[x] Era '+exp.toLocaleString('es-AR'),'err')}document.getElementById('h-score').textContent=STATE.score;const r=document.getElementById('calc-res');r.className='calc-res '+(ok?'ok':'bad');r.innerHTML=`<strong>${ok?'[ok] Correcto':'[x] Incorrecto'}</strong><br>${c.explanation}<br><br><button class="btn btn-ghost btn-sm" onclick="STATE.calcIdx++;startCalc()">Siguiente →</button>`;document.getElementById('calc-a').disabled=true}

function startSim(){STATE.phase='playing';const sd=PACK.missions?.similarity_discrimination;if(!sd||!sd[0]?.pairs){document.getElementById('game').innerHTML='<div class="loading"><p style="color:var(--dim)">Sin pares en este pack</p></div>';return}const pairs=sd[0].pairs,pair=pairs[STATE.simIdx%pairs.length],a=PACK.items.find(i=>i.id===pair.item_a),b=PACK.items.find(i=>i.id===pair.item_b);if(!a||!b){STATE.simIdx++;startSim();return}const ca=PACK.categories.find(c=>c.id===a.category),cb=PACK.categories.find(c=>c.id===b.category);
document.getElementById('game').innerHTML=`<div style="text-align:center;margin-bottom:20px"><div style="font-size:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Par ${(STATE.simIdx%pairs.length)+1} de ${pairs.length}</div><div style="font-size:1.2rem;font-weight:700;margin-top:8px">Estos dos se parecen. ¿En qué se diferencian?</div></div><div class="sim-pair"><div class="sim-card"><div class="s-em">${a.emoji}</div><div class="s-nm">${a.name}</div><div class="s-cat">${ca?.emoji||''} ${ca?.label||''}</div></div><div class="sim-card"><div class="s-em">${b.emoji}</div><div class="s-nm">${b.name}</div><div class="s-cat">${cb?.emoji||''} ${cb?.label||''}</div></div></div><div class="sim-vs">VS</div><div id="sim-rev" style="display:none"><div class="sim-explain"><strong>Diferencia clave:</strong><br>${pair.key_difference}</div><div style="text-align:center;margin-top:16px"><button class="btn btn-ghost btn-sm" onclick="STATE.simIdx++;startSim()">Siguiente →</button></div></div><div style="text-align:center"><button class="btn btn-primary" id="sim-btn" onclick="document.getElementById('sim-rev').style.display='block';this.remove();STATE.correct++;STATE.score+=50;document.getElementById('h-score').textContent=STATE.score">Revelar diferencia</button></div>`}

/* ===== RESULTS (classify) ===== */
function showResults(){STATE.phase='results';document.removeEventListener('mousemove',trackMouse);document.removeEventListener('scroll',trackScroll,true);const el=((performance.now()-STATE.startTime)/1000).toFixed(1),acc=STATE.correct+STATE.errors>0?Math.round(STATE.correct/(STATE.correct+STATE.errors)*100):0,avgRT=STATE.moves.length?Math.round(STATE.moves.reduce((a,m)=>a+m.rt,0)/STATE.moves.length):0;let pers=0;for(let i=1;i<STATE.moves.length;i++)if(!STATE.moves[i].correct&&!STATE.moves[i-1].correct&&STATE.moves[i].targetCat===STATE.moves[i-1].targetCat)pers++;
// TELEMETRY: send everything to Supabase
if(typeof TELEM!=='undefined'){const mm=mouseMetrics();
TELEM.endGameSession({durationMs:Math.round(performance.now()-STATE.startTime),score:STATE.score,correct:STATE.correct,errors:STATE.errors,totalItems:STATE.totalItems,accuracyPct:acc,completed:true,perseverations:pers,avgReactionTimeMs:avgRT,packId:PACK.meta.id,mode:'classify'}).catch(()=>{});
TELEM.sendMouseTelemetry(mm).catch(()=>{});
TELEM.sendClassifyMoves(STATE.moves,STATE.currentItems).catch(()=>{});
}
document.getElementById('game').innerHTML=`<div class="results"><h2>${acc>=80?' ¡Excelente!':acc>=60?' ¡Bien!':' Seguí practicando'}</h2><div class="big-score">${acc}%</div><p style="color:var(--dim)">Precisión · Nivel ${STATE.level}</p><div class="results-grid"><div class="res-card"><div class="rv" style="color:var(--ok)">${STATE.correct}</div><div class="rl">Correctos</div></div><div class="res-card"><div class="rv" style="color:var(--err)">${STATE.errors}</div><div class="rl">Errores</div></div><div class="res-card"><div class="rv">${el}s</div><div class="rl">Tiempo</div></div><div class="res-card"><div class="rv">${avgRT}ms</div><div class="rl">RT promedio</div></div><div class="res-card"><div class="rv" style="color:var(--accent)">${STATE.score}</div><div class="rl">Puntos</div></div><div class="res-card"><div class="rv">${pers}</div><div class="rl">Perseveraciones</div></div></div><div style="margin-top:32px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><button class="btn btn-primary" onclick="startMode()"> De nuevo</button><button class="btn btn-ghost" onclick="showIntro()">️ Menú</button></div><div style="margin-top:24px;padding:16px;background:var(--surface);border-radius:12px;text-align:left;max-width:600px;margin:auto;border:1px solid var(--border)">${mouseHTML()}</div></div>`}

function trackMouse(e){const n=performance.now();STATE.mouseData.push({x:e.clientX,y:e.clientY,t:n});if(STATE.mouseData.length>8000)STATE.mouseData.shift()}
function trackScroll(){if(!STATE.scrollData)STATE.scrollData=[];STATE.scrollData.push({y:window.scrollY,t:performance.now()});if(STATE.scrollData.length>2000)STATE.scrollData.shift()}

// === MOUSE METRICS ENGINE ===
function mouseMetrics(){
  const md=STATE.mouseData;if(md.length<10)return{pts:md.length,vel:0,velVar:0,pauses:0,dirChanges:0,pathEff:0,totalDist:0,idleRatio:0};
  // Total distance & velocity per segment
  let totalDist=0;const vels=[];
  for(let i=1;i<md.length;i++){
    const dx=md[i].x-md[i-1].x,dy=md[i].y-md[i-1].y,dist=Math.sqrt(dx*dx+dy*dy);
    const dt=(md[i].t-md[i-1].t)/1000;
    totalDist+=dist;
    if(dt>0&&dt<2)vels.push(dist/dt); // ignore >2s gaps (pauses)
  }
  const avgVel=vels.length?Math.round(vels.reduce((a,b)=>a+b,0)/vels.length):0;
  // Velocity variance
  const velVar=vels.length>1?Math.round(Math.sqrt(vels.reduce((s,v)=>s+(v-avgVel)**2,0)/(vels.length-1))):0;
  // Pauses >2s
  let pauses=0,idleMs=0;
  for(let i=1;i<md.length;i++){const gap=md[i].t-md[i-1].t;if(gap>2000){pauses++;idleMs+=gap}}
  const totalMs=md[md.length-1].t-md[0].t;
  const idleRatio=totalMs>0?Math.round(idleMs/totalMs*100):0;
  // Direction changes (angle change > 90°)
  let dirChanges=0;
  for(let i=2;i<md.length;i++){
    const ax=md[i-1].x-md[i-2].x,ay=md[i-1].y-md[i-2].y;
    const bx=md[i].x-md[i-1].x,by=md[i].y-md[i-1].y;
    const dot=ax*bx+ay*by,magA=Math.sqrt(ax*ax+ay*ay),magB=Math.sqrt(bx*bx+by*by);
    if(magA>2&&magB>2){const cos=dot/(magA*magB);if(cos<0)dirChanges++} // >90° change
  }
  // Path efficiency (straight line start→end / actual distance)
  const sx=md[0].x,sy=md[0].y,ex=md[md.length-1].x,ey=md[md.length-1].y;
  const straightDist=Math.sqrt((ex-sx)**2+(ey-sy)**2);
  const pathEff=totalDist>0?Math.round(straightDist/totalDist*100):0;
  // Scroll depth
  const scrollCount=(STATE.scrollData||[]).length;
  const maxScroll=STATE.scrollData?.length?Math.max(...STATE.scrollData.map(s=>s.y)):0;

  return{pts:md.length,vel:avgVel,velVar,pauses,dirChanges,pathEff,totalDist:Math.round(totalDist),idleRatio,scrollCount,maxScroll};
}

function mouseHTML(){
  const m=mouseMetrics();
  return `<div style="font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:8px">️ Telemetría de mouse</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:.68rem;margin-bottom:10px">
  <div style="background:var(--card);padding:8px;border-radius:8px;text-align:center"><div style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700">${m.vel}</div><div style="color:var(--dim);font-size:.55rem;margin-top:2px">px/s velocidad</div></div>
  <div style="background:var(--card);padding:8px;border-radius:8px;text-align:center"><div style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700">${m.velVar}</div><div style="color:var(--dim);font-size:.55rem;margin-top:2px">varianza vel.</div></div>
  <div style="background:var(--card);padding:8px;border-radius:8px;text-align:center"><div style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700">${m.pauses}</div><div style="color:var(--dim);font-size:.55rem;margin-top:2px">pausas &gt;2s</div></div>
  <div style="background:var(--card);padding:8px;border-radius:8px;text-align:center"><div style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700">${m.dirChanges}</div><div style="color:var(--dim);font-size:.55rem;margin-top:2px">cambios dirección</div></div>
  <div style="background:var(--card);padding:8px;border-radius:8px;text-align:center"><div style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700">${m.pathEff}%</div><div style="color:var(--dim);font-size:.55rem;margin-top:2px">eficiencia trazo</div></div>
  <div style="background:var(--card);padding:8px;border-radius:8px;text-align:center"><div style="font-family:'Space Mono',monospace;font-size:1rem;font-weight:700">${m.idleRatio}%</div><div style="color:var(--dim);font-size:.55rem;margin-top:2px">% inactivo</div></div>
</div>
<div style="font-size:.65rem;color:var(--dim);line-height:1.7">
  Distancia total: ${(m.totalDist/1000).toFixed(1)}K px · ${m.pts} muestras · Scroll: ${m.scrollCount} eventos (max ${m.maxScroll}px)<br>
  <strong>Vel. prom (${m.vel} px/s):</strong> ${m.vel<100?'Muy lento — posible enlentecimiento psicomotor o sedación':m.vel<300?'Normal':m.vel<600?'Rápido — buena activación motora':'Muy rápido — posible agitación o impulsividad'}<br>
  <strong>Varianza vel. (${m.velVar}):</strong> ${m.velVar<50?'Muy consistente — movimiento uniforme':m.velVar<150?'Varianza normal':m.velVar<300?'Variable — aceleraciones y desaceleraciones marcadas':'Muy variable — posible tremor, fatiga o agitación'}<br>
  <strong>Pausas &gt;2s (${m.pauses}):</strong> ${m.pauses===0?'Sin interrupciones':m.pauses<=3?'Pocas — reflexión puntual':m.pauses<=8?'Moderadas — deliberación o fatiga intermitente':'Muchas — fatiga cognitiva, desenganche o distracción'}<br>
  <strong>Cambios dirección (${m.dirChanges}):</strong> ${m.dirChanges<10?'Movimiento fluido y dirigido':m.dirChanges<30?'Normal — exploración visual':m.dirChanges<60?'Frecuentes — búsqueda visual activa o indecisión':'Excesivos — desorientación visual o agitación motora'}<br>
  <strong>Eficiencia trazo (${m.pathEff}%):</strong> ${m.pathEff>50?'Alta — movimiento dirigido con objetivo':m.pathEff>20?'Media — exploración con orientación':m.pathEff>5?'Baja — mucha exploración sin rumbo claro':'Muy baja — movimiento errático'}
</div>`
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
loadPack();

window.addEventListener('beforeunload',()=>{if(typeof TELEM!=='undefined')TELEM.endPlatformSession()});
</script>
