<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cargando... · HDD Gaming</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--card:#1a1a27;--border:rgba(255,255,255,.06);--text:#e8e8ed;--dim:rgba(255,255,255,.4);--accent:#6366f1;--ok:#22c55e;--err:#ef4444;--warn:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
.grain{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* HEADER */
.hdr{background:linear-gradient(180deg,rgba(99,102,241,.08) 0%,transparent 100%);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hdr-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hdr-left a{color:var(--dim);text-decoration:none;font-size:.75rem;font-family:'Space Mono',monospace;letter-spacing:.05em}
.hdr-left a:hover{color:var(--accent)}
.hdr-title{font-size:1.2rem;font-weight:900;margin-top:2px}
.hdr-title .em{margin-right:6px}
.hdr-right{display:flex;gap:20px;align-items:center}
.hdr-stat{text-align:center}
.hdr-stat-v{font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700}
.hdr-stat-l{font-size:.55rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim)}
.timer{color:var(--warn)}
.score-v{color:var(--ok)}
.level-badge{font-family:'Space Mono',monospace;font-size:.65rem;padding:4px 10px;border-radius:6px;background:rgba(99,102,241,.15);color:var(--accent);border:1px solid rgba(99,102,241,.2)}

/* GAME AREA */
.game{max-width:1200px;margin:0 auto;padding:24px}
.game-intro{text-align:center;padding:40px 20px}
.game-intro .big-em{font-size:4rem;display:block;margin-bottom:12px}
.game-intro h2{font-size:1.6rem;font-weight:900;margin-bottom:8px}
.game-intro p{color:var(--dim);max-width:500px;margin:0 auto 24px;line-height:1.5;font-size:.9rem}

.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#818cf8;transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:rgba(255,255,255,.15)}

/* MOSTRADOR - items to classify */
.mostrador{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px;min-height:100px}
.mostrador-title{font-family:'Space Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.mostrador-title .count{color:var(--accent)}
.items-area{display:flex;flex-wrap:wrap;gap:10px;min-height:60px}

.item{
  display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
  width:100px;height:100px;border-radius:12px;background:var(--card);
  border:2px solid var(--border);cursor:grab;user-select:none;
  gap:2px;padding:8px;transition:all .15s;position:relative;
}
.item:hover{transform:scale(1.06);border-color:rgba(255,255,255,.15);z-index:10}
.item.dragging{opacity:.4;transform:scale(.95)}
.item .item-em{font-size:1.6rem}
.item .item-nm{font-size:.55rem;text-align:center;line-height:1.15;color:var(--dim);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.item .item-price{font-size:.6rem;font-weight:700;color:var(--ok);margin-top:1px}

/* ESTANTES - categories */
.estantes{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.estante{
  background:var(--surface);border:2px solid var(--border);border-radius:14px;
  padding:14px;min-height:130px;transition:all .25s;position:relative;
}
.estante.drag-over{border-color:var(--accent);background:rgba(99,102,241,.04);box-shadow:0 0 20px rgba(99,102,241,.1)}
.estante.correct-flash{border-color:var(--ok);background:rgba(34,197,94,.04)}
.estante.wrong-flash{border-color:var(--err);background:rgba(239,68,68,.04)}
.estante-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.estante-em{font-size:1.2rem}
.estante-nm{font-size:.8rem;font-weight:700}
.estante-count{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--dim);margin-left:auto}
.estante-items{display:flex;flex-wrap:wrap;gap:6px;min-height:40px}
.placed-item{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--card);border-radius:8px;padding:4px 10px;
  font-size:.7rem;border:1px solid rgba(34,197,94,.2);
  animation:popIn .25s ease;
}
.placed-item .pi-em{font-size:.9rem}
@keyframes popIn{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

/* TOAST */
.toast-wrap{position:fixed;top:80px;right:16px;z-index:9998;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:10px 18px;border-radius:10px;font-size:.8rem;font-weight:600;color:#fff;backdrop-filter:blur(12px);pointer-events:auto;animation:tIn .3s ease,tOut .3s ease 2s forwards;box-shadow:0 4px 15px rgba(0,0,0,.3);max-width:300px}
.toast-ok{background:rgba(34,197,94,.85);border:1px solid rgba(34,197,94,.4)}
.toast-err{background:rgba(239,68,68,.75);border:1px solid rgba(239,68,68,.4)}
.toast-info{background:rgba(99,102,241,.8);border:1px solid rgba(99,102,241,.4)}
@keyframes tIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

/* RESULTS */
.results{text-align:center;padding:40px 20px}
.results h2{font-size:2rem;font-weight:900;margin-bottom:8px}
.results .big-score{font-family:'Space Mono',monospace;font-size:4rem;font-weight:700;color:var(--ok);margin:16px 0}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;max-width:600px;margin:24px auto}
.res-card{background:var(--card);border-radius:12px;padding:16px;text-align:center}
.res-card .rv{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700}
.res-card .rl{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-top:4px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease}

/* DIFFICULTY SELECT */
.diff-select{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.diff-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'Space Mono',monospace;font-size:.75rem;cursor:pointer;transition:all .2s}
.diff-btn:hover,.diff-btn.active{border-color:var(--accent);background:rgba(99,102,241,.1);color:var(--accent)}

/* RESPONSIVE */
@media(max-width:768px){
  .estantes{grid-template-columns:1fr 1fr}
  .item{width:80px;height:85px}
  .item .item-em{font-size:1.3rem}
  .hdr-title{font-size:1rem}
}
@media(max-width:480px){
  .estantes{grid-template-columns:1fr}
  .game{padding:12px}
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="toast-wrap" id="toasts"></div>

<header class="hdr">
<div class="hdr-inner">
  <div class="hdr-left">
    <a href="../../index.html">← HDD Gaming</a>
    <div class="hdr-title"><span class="em" id="h-em"></span><span id="h-nm"></span></div>
  </div>
  <div class="hdr-right">
    <span class="level-badge" id="h-level">Nivel 1</span>
    <div class="hdr-stat"><div class="hdr-stat-v score-v" id="h-score">0</div><div class="hdr-stat-l">Puntos</div></div>
    <div class="hdr-stat"><div class="hdr-stat-v timer" id="h-timer">--:--</div><div class="hdr-stat-l">Tiempo</div></div>
  </div>
</div>
</header>

<main class="game" id="game">
<div class="loading" id="loading-screen">
  <div class="spinner"></div>
  <p style="color:var(--dim);font-size:.85rem">Cargando pack...</p>
</div>
</main>

<script>
/* ============================================================================
   CLASSIFY-AND-PLACE ENGINE v1.0
   HDD Therapeutic Gaming · Clínica José Ingenieros
   ============================================================================ */

const PACK_MAP = {
  'ferreteria': '../../packs/classify-and-place/ferreteria/pack.json',
  'libreria-escolar': '../../packs/classify-and-place/libreria-escolar/pack.json',
  'electrodomesticos': '../../packs/classify-and-place/electrodomesticos/pack.json',
  'almacen-general': '../../packs/classify-and-place/almacen-general/pack.json',
  'supermarket': '../../packs/classify-and-place/supermarket/pack.json',
};

let PACK = null;
let STATE = {
  phase: 'intro', // intro | playing | results
  level: 1,
  score: 0,
  correct: 0,
  errors: 0,
  totalItems: 0,
  placedItems: 0,
  startTime: 0,
  timerInterval: null,
  currentItems: [],
  // Telemetry
  moves: [],
  mouseData: [],
  lastMoveTime: 0,
};

// ---- PACK LOADING ----
async function loadPack() {
  const params = new URLSearchParams(window.location.search);
  const packId = params.get('pack') || 'ferreteria';
  const url = PACK_MAP[packId];
  if (!url) { document.getElementById('game').innerHTML = '<div class="loading"><p style="color:var(--err)">Pack no encontrado: '+packId+'</p></div>'; return; }
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    PACK = await r.json();
    document.title = PACK.meta.name + ' · HDD Gaming';
    document.getElementById('h-em').textContent = PACK.meta.emoji;
    document.getElementById('h-nm').textContent = PACK.meta.name;
    if (PACK.meta.colors) {
      document.documentElement.style.setProperty('--accent', PACK.meta.colors.accent);
    }
    showIntro();
  } catch(e) {
    document.getElementById('game').innerHTML = '<div class="loading"><p style="color:var(--err)">Error cargando pack: '+e.message+'</p><p style="color:var(--dim);font-size:.75rem;margin-top:8px">Intentá abrir desde el hub principal.</p></div>';
  }
}

// ---- INTRO SCREEN ----
function showIntro() {
  STATE.phase = 'intro';
  const maxLevel = Object.keys(PACK.difficulty_scaling || {}).length || 4;
  const game = document.getElementById('game');
  game.innerHTML = `
    <div class="game-intro">
      <span class="big-em">${PACK.meta.emoji}</span>
      <h2>${PACK.meta.name}</h2>
      <p>${PACK.meta.description || PACK.meta.subtitle}</p>
      <p style="font-size:.75rem;color:var(--dim);margin-bottom:20px">${PACK.meta.setting || ''}</p>
      <div style="margin-bottom:24px">
        <span style="font-family:'Space Mono',monospace;font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em">Elegí la dificultad</span>
        <div class="diff-select" id="diff-sel"></div>
      </div>
      <button class="btn btn-primary" onclick="startGame()">🎮 Empezar a jugar</button>
      <div style="margin-top:16px"><a href="../../index.html" style="color:var(--dim);font-size:.75rem;text-decoration:none">← Volver al hub</a></div>
    </div>`;
  const ds = document.getElementById('diff-sel');
  for (let i = 1; i <= maxLevel; i++) {
    const b = document.createElement('button');
    b.className = 'diff-btn' + (i === 1 ? ' active' : '');
    b.textContent = 'Nivel ' + i;
    b.onclick = () => { STATE.level = i; ds.querySelectorAll('.diff-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); document.getElementById('h-level').textContent = 'Nivel ' + i; };
    ds.appendChild(b);
  }
}

// ---- START GAME ----
function startGame() {
  STATE.phase = 'playing';
  STATE.score = 0; STATE.correct = 0; STATE.errors = 0; STATE.placedItems = 0;
  STATE.moves = []; STATE.mouseData = []; STATE.startTime = performance.now();
  document.getElementById('h-score').textContent = '0';

  // Get difficulty config
  const diffKey = 'level_' + STATE.level;
  const diff = (PACK.difficulty_scaling || {})[diffKey] || { items_per_round: 12, categories_visible: 5 };

  // Select categories
  let cats = [...PACK.categories];
  if (diff.categories_visible && diff.categories_visible < cats.length) {
    cats = cats.sort(() => Math.random() - 0.5).slice(0, diff.categories_visible);
  }
  const catIds = new Set(cats.map(c => c.id));

  // Select items for this round
  let items = PACK.items.filter(it => catIds.has(it.category));
  // Shuffle and limit
  items = items.sort(() => Math.random() - 0.5);
  const count = Math.min(diff.items_per_round || 15, items.length);
  items = items.slice(0, count);
  STATE.currentItems = items;
  STATE.totalItems = items.length;

  // Timer
  if (diff.time_limit) {
    let remaining = diff.time_limit;
    updateTimer(remaining);
    STATE.timerInterval = setInterval(() => {
      remaining--;
      updateTimer(remaining);
      if (remaining <= 0) { clearInterval(STATE.timerInterval); showResults(); }
    }, 1000);
  } else {
    updateTimer(null);
    // Count-up timer
    let elapsed = 0;
    STATE.timerInterval = setInterval(() => { elapsed++; updateTimerUp(elapsed); }, 1000);
  }

  renderGame(cats, items, diff);
}

function updateTimer(sec) {
  const el = document.getElementById('h-timer');
  if (sec === null) { el.textContent = '00:00'; return; }
  const m = Math.floor(sec / 60); const s = sec % 60;
  el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  if (sec <= 30) el.style.color = 'var(--err)';
  else if (sec <= 60) el.style.color = 'var(--warn)';
  else el.style.color = 'var(--warn)';
}
function updateTimerUp(sec) {
  const m = Math.floor(sec / 60); const s = sec % 60;
  document.getElementById('h-timer').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ---- RENDER GAME ----
function renderGame(cats, items, diff) {
  const game = document.getElementById('game');
  game.innerHTML = `
    <div class="mostrador" id="mostrador">
      <div class="mostrador-title">
        📦 Mostrador — <span class="count"><span id="remaining">${items.length}</span> productos por ubicar</span>
      </div>
      <div class="items-area" id="items-area"></div>
    </div>
    <div class="estantes" id="estantes"></div>`;

  // Render items
  const area = document.getElementById('items-area');
  items.forEach(it => {
    const el = document.createElement('div');
    el.className = 'item';
    el.draggable = true;
    el.dataset.id = it.id;
    el.dataset.cat = it.category;
    const price = it.price ? '$' + it.price.toLocaleString('es-AR') : (it.price_range ? '$' + it.price_range[0].toLocaleString('es-AR') : '');
    el.innerHTML = `<span class="item-em">${it.emoji}</span><span class="item-nm">${it.name}</span>${price ? '<span class="item-price">' + price + '</span>' : ''}`;

    // Drag events
    el.addEventListener('dragstart', e => {
      el.classList.add('dragging');
      e.dataTransfer.setData('text/plain', it.id);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));

    // Touch support
    let touchClone = null;
    el.addEventListener('touchstart', e => {
      const touch = e.touches[0];
      el.dataset.touchId = it.id;
      el.classList.add('dragging');
      touchClone = el.cloneNode(true);
      touchClone.style.cssText = 'position:fixed;z-index:10000;pointer-events:none;opacity:0.8;transform:scale(1.1);';
      touchClone.style.left = (touch.clientX - 50) + 'px';
      touchClone.style.top = (touch.clientY - 50) + 'px';
      document.body.appendChild(touchClone);
    }, { passive: true });
    el.addEventListener('touchmove', e => {
      e.preventDefault();
      const touch = e.touches[0];
      if (touchClone) {
        touchClone.style.left = (touch.clientX - 50) + 'px';
        touchClone.style.top = (touch.clientY - 50) + 'px';
      }
      // Highlight estante under finger
      document.querySelectorAll('.estante').forEach(est => {
        const r = est.getBoundingClientRect();
        if (touch.clientX >= r.left && touch.clientX <= r.right && touch.clientY >= r.top && touch.clientY <= r.bottom) {
          est.classList.add('drag-over');
        } else {
          est.classList.remove('drag-over');
        }
      });
    }, { passive: false });
    el.addEventListener('touchend', e => {
      el.classList.remove('dragging');
      if (touchClone) { touchClone.remove(); touchClone = null; }
      const touch = e.changedTouches[0];
      document.querySelectorAll('.estante').forEach(est => {
        est.classList.remove('drag-over');
        const r = est.getBoundingClientRect();
        if (touch.clientX >= r.left && touch.clientX <= r.right && touch.clientY >= r.top && touch.clientY <= r.bottom) {
          handleDrop(it.id, est.dataset.cat, el);
        }
      });
    });

    area.appendChild(el);
  });

  // Render estantes (shelves)
  const estDiv = document.getElementById('estantes');
  cats.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'estante';
    el.dataset.cat = cat.id;
    el.innerHTML = `
      <div class="estante-hdr">
        <span class="estante-em">${cat.emoji}</span>
        <span class="estante-nm">${cat.label}</span>
        <span class="estante-count" id="cnt-${cat.id}">0</span>
      </div>
      <div class="estante-items" id="placed-${cat.id}"></div>`;

    // Drop events
    el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag-over');
      const itemId = e.dataTransfer.getData('text/plain');
      const itemEl = document.querySelector(`.item[data-id="${itemId}"]`);
      handleDrop(itemId, cat.id, itemEl);
    });

    estDiv.appendChild(el);
  });

  // Mouse telemetry
  document.addEventListener('mousemove', trackMouse);
}

// ---- HANDLE DROP ----
function handleDrop(itemId, targetCat, itemEl) {
  const item = STATE.currentItems.find(i => i.id === itemId);
  if (!item || !itemEl) return;

  const isCorrect = item.category === targetCat;
  const now = performance.now();
  STATE.moves.push({ itemId, targetCat, correct: isCorrect, time: now - STATE.startTime, rt: now - (STATE.lastMoveTime || STATE.startTime) });
  STATE.lastMoveTime = now;

  if (isCorrect) {
    STATE.correct++;
    STATE.score += 100 + (STATE.level * 20);
    STATE.placedItems++;

    // Move item to estante
    const placedArea = document.getElementById('placed-' + targetCat);
    const pill = document.createElement('span');
    pill.className = 'placed-item';
    pill.innerHTML = `<span class="pi-em">${item.emoji}</span> ${item.name}`;
    placedArea.appendChild(pill);

    // Update count
    const cnt = document.getElementById('cnt-' + targetCat);
    cnt.textContent = parseInt(cnt.textContent) + 1;

    // Flash estante green
    const estante = document.querySelector(`.estante[data-cat="${targetCat}"]`);
    estante.classList.add('correct-flash');
    setTimeout(() => estante.classList.remove('correct-flash'), 400);

    // Remove from mostrador
    itemEl.remove();
    toast('✓ ' + item.name, 'ok');
  } else {
    STATE.errors++;
    STATE.score = Math.max(0, STATE.score - 30);

    // Flash estante red
    const estante = document.querySelector(`.estante[data-cat="${targetCat}"]`);
    estante.classList.add('wrong-flash');
    setTimeout(() => estante.classList.remove('wrong-flash'), 500);

    // Shake the item
    itemEl.classList.add('shake');
    setTimeout(() => itemEl.classList.remove('shake'), 500);

    // Find correct category name
    const correctCat = PACK.categories.find(c => c.id === item.category);
    toast('✗ ' + item.name + ' → va en ' + (correctCat ? correctCat.label : item.category), 'err');
  }

  // Update UI
  document.getElementById('h-score').textContent = STATE.score;
  const remaining = STATE.totalItems - STATE.placedItems;
  const remEl = document.getElementById('remaining');
  if (remEl) remEl.textContent = remaining;

  // Check if done
  if (STATE.placedItems >= STATE.totalItems) {
    clearInterval(STATE.timerInterval);
    setTimeout(showResults, 800);
  }
}

// ---- TOAST ----
function toast(msg, type) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast toast-' + (type || 'info');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ---- RESULTS ----
function showResults() {
  STATE.phase = 'results';
  document.removeEventListener('mousemove', trackMouse);
  const elapsed = ((performance.now() - STATE.startTime) / 1000).toFixed(1);
  const accuracy = STATE.totalItems > 0 ? Math.round((STATE.correct / (STATE.correct + STATE.errors)) * 100) : 0;
  const avgRT = STATE.moves.length > 0 ? Math.round(STATE.moves.reduce((a, m) => a + m.rt, 0) / STATE.moves.length) : 0;
  const perseverations = countPerseverations();

  const game = document.getElementById('game');
  game.innerHTML = `
    <div class="results">
      <h2>${accuracy >= 80 ? '🎉 ¡Excelente!' : accuracy >= 60 ? '👍 ¡Bien!' : '💪 Seguí practicando'}</h2>
      <div class="big-score">${accuracy}%</div>
      <p style="color:var(--dim);margin-bottom:8px">Precisión de clasificación · Nivel ${STATE.level}</p>
      <div class="results-grid">
        <div class="res-card"><div class="rv" style="color:var(--ok)">${STATE.correct}</div><div class="rl">Correctos</div></div>
        <div class="res-card"><div class="rv" style="color:var(--err)">${STATE.errors}</div><div class="rl">Errores</div></div>
        <div class="res-card"><div class="rv">${elapsed}s</div><div class="rl">Tiempo total</div></div>
        <div class="res-card"><div class="rv">${avgRT}ms</div><div class="rl">RT Promedio</div></div>
        <div class="res-card"><div class="rv" style="color:var(--accent)">${STATE.score}</div><div class="rl">Puntos</div></div>
        <div class="res-card"><div class="rv">${perseverations}</div><div class="rl">Perseveraciones</div></div>
      </div>
      <div style="margin-top:32px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="startGame()">🔄 Jugar de nuevo</button>
        <button class="btn btn-ghost" onclick="showIntro()">⚙️ Cambiar nivel</button>
        <a href="../../index.html" class="btn btn-ghost">← Volver al hub</a>
      </div>
      <div style="margin-top:24px;padding:16px;background:var(--surface);border-radius:12px;text-align:left;max-width:500px;margin-left:auto;margin-right:auto">
        <div style="font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:8px">Telemetría de sesión</div>
        <div style="font-size:.7rem;color:var(--dim);line-height:1.8">
          Movimientos totales del mouse: ${STATE.mouseData.length}<br>
          Velocidad promedio cursor: ${avgMouseSpeed()}px/s<br>
          Pausas >2s: ${countPauses()}<br>
          Pack: ${PACK.meta.id} · Nivel: ${STATE.level}
        </div>
      </div>
    </div>`;
}

function countPerseverations() {
  let p = 0;
  for (let i = 1; i < STATE.moves.length; i++) {
    if (!STATE.moves[i].correct && !STATE.moves[i-1].correct && STATE.moves[i].targetCat === STATE.moves[i-1].targetCat) p++;
  }
  return p;
}

// ---- MOUSE TELEMETRY ----
function trackMouse(e) {
  const now = performance.now();
  STATE.mouseData.push({ x: e.clientX, y: e.clientY, t: now });
  // Keep last 5000 points
  if (STATE.mouseData.length > 5000) STATE.mouseData.shift();
}

function avgMouseSpeed() {
  if (STATE.mouseData.length < 2) return 0;
  let totalDist = 0;
  for (let i = 1; i < STATE.mouseData.length; i++) {
    const dx = STATE.mouseData[i].x - STATE.mouseData[i-1].x;
    const dy = STATE.mouseData[i].y - STATE.mouseData[i-1].y;
    totalDist += Math.sqrt(dx*dx + dy*dy);
  }
  const totalTime = (STATE.mouseData[STATE.mouseData.length-1].t - STATE.mouseData[0].t) / 1000;
  return totalTime > 0 ? Math.round(totalDist / totalTime) : 0;
}

function countPauses() {
  let pauses = 0;
  for (let i = 1; i < STATE.mouseData.length; i++) {
    if ((STATE.mouseData[i].t - STATE.mouseData[i-1].t) > 2000) pauses++;
  }
  return pauses;
}

// ---- INIT ----
loadPack();
</script>
