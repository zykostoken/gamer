<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardá las Compras · HDD Gaming</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{background:linear-gradient(135deg,#16213e 0%,#0f3460 100%);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.hdr-title{font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:8px}
.hdr-stats{display:flex;gap:12px}
.hs{text-align:center;min-width:50px}
.hs-v{font-size:1.4rem;font-weight:900;line-height:1}
.hs-l{font-size:.5rem;text-transform:uppercase;letter-spacing:.08em;opacity:.5}
.hs-time{color:#f59e0b}.hs-ok{color:#4ade80}.hs-err{color:#f87171}.hs-left{color:#60a5fa}

/* PROGRESS BAR */
.progress{height:4px;background:rgba(255,255,255,.08);position:sticky;top:52px;z-index:99}
.progress-fill{height:100%;background:linear-gradient(90deg,#4ade80,#22d3ee);transition:width .4s ease;border-radius:0 2px 2px 0}

/* MAIN LAYOUT */
.game-wrap{max-width:1200px;margin:0 auto;padding:16px;display:grid;gap:16px}

/* THE BAG — horizontal scrollable strip */
.bag{background:linear-gradient(135deg,#1e293b,#334155);border-radius:20px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06)}
.bag-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.4);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.bag-title span{color:#f59e0b;font-weight:900}
.bag-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.bag-scroll::-webkit-scrollbar{height:4px}
.bag-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,.05);border-radius:2px}
.bag-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

/* PRODUCT CARDS — big, tactile, game-like */
.product{
  flex-shrink:0;scroll-snap-align:start;
  width:90px;height:110px;border-radius:14px;
  background:linear-gradient(145deg,#2d2d44,#1f1f35);
  border:2px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:grab;user-select:none;transition:all .2s;gap:4px;padding:8px;
  box-shadow:0 4px 12px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;
}
.product:hover{transform:translateY(-4px) scale(1.05);border-color:rgba(255,255,255,.2);box-shadow:0 8px 24px rgba(0,0,0,.4),0 0 15px rgba(99,102,241,.15)}
.product:active{transform:scale(.95)}
.product.dragging{opacity:.3;transform:scale(.85)}
.product.placed{opacity:0;height:0;width:0;padding:0;margin:0;border:0;overflow:hidden;transition:all .3s}
.product .p-em{font-size:2rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.product .p-nm{font-size:.52rem;text-align:center;line-height:1.15;color:rgba(255,255,255,.6);max-height:2.5em;overflow:hidden}
.product .p-price{font-size:.5rem;color:#4ade80;font-weight:800}

/* KITCHEN — the immersive part */
.kitchen{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:768px){.kitchen{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.kitchen{grid-template-columns:1fr}}

/* ZONE — each "furniture" piece */
.zone{
  border-radius:18px;overflow:hidden;cursor:pointer;transition:all .3s;
  position:relative;min-height:160px;
  box-shadow:0 6px 24px rgba(0,0,0,.3);
  border:2px solid rgba(255,255,255,.06);
}
.zone:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,0,0,.4);border-color:rgba(255,255,255,.12)}
.zone.drag-over{border-color:#60a5fa;box-shadow:0 0 30px rgba(96,165,250,.2),0 10px 36px rgba(0,0,0,.4);transform:scale(1.02)}
.zone.correct-flash{border-color:#4ade80;box-shadow:0 0 30px rgba(74,222,128,.25)}
.zone.wrong-flash{border-color:#f87171;box-shadow:0 0 30px rgba(248,113,113,.2)}
.zone.open{border-color:#60a5fa}

.zone-bg{position:absolute;inset:0;opacity:.15;background-size:cover;background-position:center}

/* Each zone has its own gradient/vibe */
.zone-freezer{background:linear-gradient(145deg,#0c4a6e,#164e63)}
.zone-freezer .zone-bg{background:linear-gradient(135deg,#06b6d4 0%,#0284c7 100%);opacity:.1}
.zone-heladera{background:linear-gradient(145deg,#1e3a5f,#1e40af)}
.zone-heladera .zone-bg{background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);opacity:.08}
.zone-cajones{background:linear-gradient(145deg,#14532d,#166534)}
.zone-cajones .zone-bg{background:linear-gradient(135deg,#22c55e,#16a34a);opacity:.08}
.zone-alacena{background:linear-gradient(145deg,#78350f,#92400e)}
.zone-alacena .zone-bg{background:linear-gradient(135deg,#f59e0b,#d97706);opacity:.1}
.zone-bajomesada{background:linear-gradient(145deg,#3f3f46,#52525b)}
.zone-bajomesada .zone-bg{background:linear-gradient(135deg,#a78bfa,#7c3aed);opacity:.08}
.zone-bano{background:linear-gradient(145deg,#831843,#9d174d)}
.zone-bano .zone-bg{background:linear-gradient(135deg,#ec4899,#db2777);opacity:.08}

.zone-face{padding:24px 16px;text-align:center;position:relative;z-index:1}
.zone-face .zf-em{font-size:2.8rem;display:block;margin-bottom:6px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.zone-face .zf-nm{font-size:1rem;font-weight:800;letter-spacing:.01em}
.zone-face .zf-hint{font-size:.62rem;color:rgba(255,255,255,.45);margin-top:6px;line-height:1.35}
.zone-face .zf-temp{font-size:.6rem;color:rgba(255,255,255,.3);margin-top:4px;font-weight:700}
.zone-badge{position:absolute;top:10px;right:12px;font-size:.7rem;font-weight:900;color:#fff;background:rgba(255,255,255,.15);padding:2px 10px;border-radius:10px;z-index:2;backdrop-filter:blur(8px)}

.zone-shelf{display:none;padding:12px;border-top:1px solid rgba(255,255,255,.08);min-height:70px;position:relative;z-index:1}
.zone.open .zone-shelf{display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}

.placed-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:.68rem;font-weight:700;animation:popIn .3s ease}
.placed-pill.ok{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.placed-pill.bad{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.placed-pill .pp-em{font-size:.8rem}

/* TOAST */
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column-reverse;gap:8px;align-items:center}
.toast{padding:12px 24px;border-radius:14px;font-size:.85rem;font-weight:700;backdrop-filter:blur(16px);animation:toastUp .3s ease,toastOut .3s ease 2s forwards;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.toast-ok{background:rgba(34,197,94,.9);color:#fff}
.toast-err{background:rgba(239,68,68,.9);color:#fff}

/* INTRO */
.intro{text-align:center;padding:60px 20px}
.intro .big-em{font-size:5rem;display:block;margin-bottom:16px;filter:drop-shadow(0 8px 20px rgba(0,0,0,.4))}
.intro h2{font-size:1.8rem;font-weight:900;margin-bottom:12px;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.intro p{color:rgba(255,255,255,.5);max-width:480px;margin:0 auto 20px;line-height:1.6;font-size:.88rem}
.intro .warn{color:#fbbf24;font-size:.8rem;font-weight:700;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:14px;border:none;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-play{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 20px rgba(99,102,241,.4)}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,.5)}
.btn-small{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);padding:10px 20px;font-size:.82rem;border:1px solid rgba(255,255,255,.1)}
.btn-small:hover{background:rgba(255,255,255,.12);color:#fff}

/* RESULTS */
.results{text-align:center;padding:40px 20px}
.results h2{font-size:1.8rem;font-weight:900;margin-bottom:4px}
.res-pct{font-size:4rem;font-weight:900;margin:16px 0;background:linear-gradient(135deg,#4ade80,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;max-width:500px;margin:20px auto}
.res-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;text-align:center}
.res-card b{font-size:1.3rem;display:block;font-weight:900}.res-card small{font-size:.55rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.35)}
.logic-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.15);border-radius:14px;padding:16px;max-width:500px;margin:20px auto;text-align:left}
.logic-title{font-size:.75rem;font-weight:800;color:#f87171;margin-bottom:8px}
.logic-item{font-size:.78rem;color:rgba(255,255,255,.5);margin-bottom:4px;padding-left:12px;border-left:2px solid rgba(248,113,113,.3)}

@keyframes popIn{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes toastUp{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.shake{animation:shake .4s ease}
</style>
</head>
<body>
<div class="toasts" id="toasts"></div>

<header class="hdr">
  <div class="hdr-title">🛒 Guardá las Compras</div>
  <div class="hdr-stats">
    <div class="hs"><div class="hs-v hs-time" id="h-timer">0:00</div><div class="hs-l">Tiempo</div></div>
    <div class="hs"><div class="hs-v hs-ok" id="h-ok">0</div><div class="hs-l">Bien</div></div>
    <div class="hs"><div class="hs-v hs-err" id="h-err">0</div><div class="hs-l">Mal</div></div>
    <div class="hs"><div class="hs-v hs-left" id="h-left">0</div><div class="hs-l">Quedan</div></div>
  </div>
</header>
<div class="progress"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>

<div class="game-wrap" id="game"></div>

<script>
var PACK = null;
async function loadPack(){var pid=new URLSearchParams(location.search).get('pack')||'almacen-general';try{var r=await fetch('../../packs/classify-and-place/'+pid+'/pack.json');if(!r.ok)throw new Error(r.status);PACK=await r.json()}catch(e){document.getElementById('game').innerHTML='<p style="color:red">Error: '+e.message+'</p>';return}showIntro()}
loadPack();

var patientId = new URLSearchParams(location.search).get('patient_id') || 'DEMO';
var STATE = {ok:0,err:0,total:0,placed:0,startTime:0,ti:null,elapsed:0,moves:[],items:[]};

var ZONES = [
  {id:'freezer',name:'Freezer',emoji:'\u{1F9CA}',hint:'Carnes, milanesas congeladas, helado, verduras congeladas',temp:'-18\u00B0C',cls:'zone-freezer',accepts:['congelados']},
  {id:'heladera',name:'Heladera',emoji:'\u{1F9CA}',hint:'L\u00E1cteos, fiambres, huevos, manteca, mayonesa abierta',temp:'2-4\u00B0C',cls:'zone-heladera',accepts:['lacteos_fiambres']},
  {id:'cajones',name:'Verdulera',emoji:'\u{1F96C}',hint:'Frutas y verduras frescas \u2014 caj\u00F3n de abajo',temp:'5-8\u00B0C',cls:'zone-cajones',accepts:['frutas_verduras']},
  {id:'alacena',name:'Alacena',emoji:'\u{1F3EA}',hint:'Fideos, arroz, aceite, conservas, yerba, galletitas, pan',cls:'zone-alacena',accepts:['almacen_seco','panaderia','bebidas']},
  {id:'bajomesada',name:'Bajo Mesada',emoji:'\u{1F9F9}',hint:'Lavandina, detergente, esponjas \u2014 NUNCA comida',cls:'zone-bajomesada',accepts:['limpieza']},
  {id:'bano',name:'Ba\u00F1o',emoji:'\u{1F6BF}',hint:'Shampoo, jab\u00F3n, pasta dental, papel higi\u00E9nico',cls:'zone-bano',accepts:['higiene']},
];

function showIntro(){
  document.getElementById('game').innerHTML=
    '<div class="intro">'+
    '<span class="big-em">\u{1F6D2}\u{1F3E0}</span>'+
    '<h2>Llegaste a casa con las bolsas</h2>'+
    '<p>Toc\u00E1 cada mueble para abrirlo. Arrastr\u00E1 los productos de la bolsa al lugar donde van. No es solo \u00BFd\u00F3nde va? \u2014 tambi\u00E9n importa la l\u00F3gica.</p>'+
    '<p class="warn">\u26A0\uFE0F Comida con lavandina = error. Limpieza en la heladera = error.</p>'+
    '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">'+
    '<button class="btn btn-play" onclick="startGame(20)">\u{1F3AE} Jugar (20 productos)</button>'+
    '<button class="btn btn-small" onclick="startGame(10)">Ronda corta (10)</button>'+
    '</div></div>';
}

function startGame(n){
  STATE.ok=0;STATE.err=0;STATE.placed=0;STATE.moves=[];STATE.elapsed=0;STATE.startTime=performance.now();
  var items=shuffle(PACK.items.filter(function(i){return i.price||i.price_range})).slice(0,Math.min(n,PACK.items.length));
  STATE.total=items.length;STATE.items=items;
  clearInterval(STATE.ti);STATE.ti=setInterval(function(){STATE.elapsed++;var m=Math.floor(STATE.elapsed/60),s=STATE.elapsed%60;document.getElementById('h-timer').textContent=m+':'+String(s).padStart(2,'0')},1000);
  document.getElementById('h-left').textContent=STATE.total;document.getElementById('h-ok').textContent='0';document.getElementById('h-err').textContent='0';
  document.getElementById('prog-fill').style.width='0%';
  if(window.biomet)biomet.start({patientId:patientId,patientDni:patientId,gameSlug:'kitchen-'+PACK.meta.id});
  render(items);
}

function render(items){
  var bagH=items.map(function(it){return'<div class="product" draggable="true" data-id="'+it.id+'" data-cat="'+it.category+'"><span class="p-em">'+it.emoji+'</span><span class="p-nm">'+it.name+'</span></div>'}).join('');
  var zH=ZONES.map(function(z){return'<div class="zone '+z.cls+'" data-zone="'+z.id+'" onclick="toggle(''+z.id+'')"><div class="zone-bg"></div><span class="zone-badge" id="zb-'+z.id+'">0</span><div class="zone-face"><span class="zf-em">'+z.emoji+'</span><div class="zf-nm">'+z.name+'</div><div class="zf-hint">'+z.hint+'</div>'+(z.temp?'<div class="zf-temp">'+z.temp+'</div>':'')+'</div><div class="zone-shelf" id="zs-'+z.id+'"></div></div>'}).join('');
  document.getElementById('game').innerHTML='<div class="bag"><div class="bag-title">\u{1F6CD}\uFE0F BOLSA \u2014 <span id="bag-n">'+items.length+' productos</span></div><div class="bag-scroll" id="bag-scroll">'+bagH+'</div></div><div class="kitchen">'+zH+'</div>';

  // Drag events
  document.querySelectorAll('.product').forEach(function(el){
    el.addEventListener('dragstart',function(e){el.classList.add('dragging');e.dataTransfer.setData('text/plain',el.dataset.id)});
    el.addEventListener('dragend',function(){el.classList.remove('dragging')});
    var tc=null;
    el.addEventListener('touchstart',function(e){el.classList.add('dragging');tc=el.cloneNode(true);tc.style.cssText='position:fixed;z-index:10000;pointer-events:none;opacity:.9;transform:scale(1.15);filter:drop-shadow(0 8px 20px rgba(0,0,0,.5))';tc.style.left=(e.touches[0].clientX-45)+'px';tc.style.top=(e.touches[0].clientY-55)+'px';document.body.appendChild(tc)},{passive:true});
    el.addEventListener('touchmove',function(e){e.preventDefault();if(tc){tc.style.left=(e.touches[0].clientX-45)+'px';tc.style.top=(e.touches[0].clientY-55)+'px'}document.querySelectorAll('.zone').forEach(function(z){var r=z.getBoundingClientRect();z.classList.toggle('drag-over',e.touches[0].clientX>=r.left&&e.touches[0].clientX<=r.right&&e.touches[0].clientY>=r.top&&e.touches[0].clientY<=r.bottom)})},{passive:false});
    el.addEventListener('touchend',function(e){el.classList.remove('dragging');if(tc){tc.remove();tc=null}var t=e.changedTouches[0];document.querySelectorAll('.zone').forEach(function(z){z.classList.remove('drag-over');var r=z.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom)place(el.dataset.id,z.dataset.zone,el)})});
  });

  // Drop zones
  document.querySelectorAll('.zone').forEach(function(z){
    z.addEventListener('dragover',function(e){e.preventDefault();z.classList.add('drag-over')});
    z.addEventListener('dragleave',function(){z.classList.remove('drag-over')});
    z.addEventListener('drop',function(e){e.preventDefault();z.classList.remove('drag-over');var iid=e.dataTransfer.getData('text/plain');place(iid,z.dataset.zone,document.querySelector('.product[data-id="'+iid+'"]'))});
  });
  if(window.biomet)ZONES.forEach(function(z){var el=document.querySelector('.zone[data-zone="'+z.id+'"]');if(el)biomet.registerTarget(z.id,el)});
}

function toggle(zid){var ze=document.querySelector('.zone[data-zone="'+zid+'"]');if(!ze)return;document.querySelectorAll('.zone').forEach(function(z){if(z.dataset.zone!==zid)z.classList.remove('open')});ze.classList.toggle('open')}

function place(iid,zid,iel){
  var it=STATE.items.find(function(i){return i.id===iid});if(!it||!iel||iel.classList.contains('placed'))return;
  var zone=ZONES.find(function(z){return z.id===zid});if(!zone)return;
  var ok=zone.accepts.indexOf(it.category)!==-1;
  var logicErr=null;
  if(['bajomesada','bano'].indexOf(zid)!==-1&&['almacen_seco','lacteos_fiambres','frutas_verduras','panaderia','bebidas','congelados'].indexOf(it.category)!==-1){logicErr='\u00A1Comida con productos de limpieza!';ok=false}
  if(['freezer','heladera','cajones','alacena'].indexOf(zid)!==-1&&['limpieza','higiene'].indexOf(it.category)!==-1){logicErr='\u00A1Limpieza donde va la comida!';ok=false}
  if(!ok&&it.similarity_note)logicErr=it.similarity_note;
  STATE.moves.push({itemId:iid,zone:zid,correct:ok,logicError:logicErr,time:performance.now()-STATE.startTime});
  if(window.biomet)biomet.recordAction({type:ok?'correct':'wrong',target_id:zid,correct:ok});
  if(ok){STATE.ok++;document.getElementById('h-ok').textContent=STATE.ok}else{STATE.err++;document.getElementById('h-err').textContent=STATE.err}
  STATE.placed++;
  document.getElementById('h-left').textContent=STATE.total-STATE.placed;
  document.getElementById('bag-n').textContent=(STATE.total-STATE.placed)+' productos';
  document.getElementById('prog-fill').style.width=Math.round(STATE.placed/STATE.total*100)+'%';
  var ze=document.querySelector('.zone[data-zone="'+zid+'"]');
  if(ok){ze.classList.add('correct-flash');setTimeout(function(){ze.classList.remove('correct-flash')},500);toast('\u2713 '+it.name,'ok')}
  else{ze.classList.add('wrong-flash');setTimeout(function(){ze.classList.remove('wrong-flash')},500);iel.classList.add('shake');setTimeout(function(){iel.classList.remove('shake')},500);
  var cz=ZONES.find(function(z){return z.accepts.indexOf(it.category)!==-1});toast('\u2717 '+(logicErr||it.name+' va en '+(cz?cz.name:'?')),'err')}
  if(!ze.classList.contains('open'))ze.classList.add('open');
  var shelf=document.getElementById('zs-'+zid);var pill=document.createElement('span');pill.className='placed-pill '+(ok?'ok':'bad');pill.innerHTML='<span class="pp-em">'+it.emoji+'</span>'+it.name;shelf.appendChild(pill);
  document.getElementById('zb-'+zid).textContent=shelf.children.length;
  iel.classList.add('placed');
  if(STATE.placed>=STATE.total){clearInterval(STATE.ti);setTimeout(results,700)}
}

function results(){
  var bm=null;if(window.biomet)bm=biomet.save({game_mode:'kitchen',pack_id:PACK.meta.id,correct:STATE.ok,errors:STATE.err,total:STATE.total});
  var acc=STATE.total>0?Math.round(STATE.ok/STATE.total*100):0;
  var le=STATE.moves.filter(function(m){return m.logicError});
  var em=acc>=80?'\u{1F389}':acc>=60?'\u{1F44D}':'\u{1F4AA}';
  document.getElementById('game').innerHTML='<div class="results"><h2>'+em+' '+(acc>=80?'\u00A1Excelente!':acc>=60?'\u00A1Bien!':'Segu\u00ED practicando')+'</h2><div class="res-pct">'+acc+'%</div><p style="color:rgba(255,255,255,.4);margin-bottom:16px">'+PACK.meta.name+'</p><div class="res-grid"><div class="res-card"><b style="color:#4ade80">'+STATE.ok+'</b><small>Correctos</small></div><div class="res-card"><b style="color:#f87171">'+STATE.err+'</b><small>Errores</small></div><div class="res-card"><b>'+STATE.elapsed+'s</b><small>Tiempo</small></div><div class="res-card"><b style="color:#fbbf24">'+le.length+'</b><small>Err. l\u00F3gicos</small></div></div>'+
  (le.length>0?'<div class="logic-box"><div class="logic-title">\u26A0\uFE0F Errores l\u00F3gicos</div>'+le.map(function(m){var it=STATE.items.find(function(i){return i.id===m.itemId});return'<div class="logic-item">'+((it?it.emoji:'')+' '+(it?it.name:'')+': '+m.logicError)+'</div>'}).join('')+'</div>':'')+
  (bm?'<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;max-width:400px;margin:16px auto;text-align:left"><div style="font-size:.65rem;font-weight:800;color:#60a5fa;margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em">Biomet.js</div><div style="font-size:.7rem;color:rgba(255,255,255,.4);line-height:1.8">Econom\u00EDa: '+(bm.economia_cognitiva||'\u2014')+' \u00B7 Eficiencia: '+((bm.eficiencia_motora||0)*100).toFixed(0)+'% \u00B7 Persev: '+(bm.perseveraciones||0)+' \u00B7 Hesit: '+(bm.hesitaciones||0)+'</div></div>':'')+
  '<div style="margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn btn-play" onclick="startGame('+STATE.total+')">\u{1F504} De nuevo</button><button class="btn btn-small" onclick="showIntro()">Men\u00FA</button></div></div>'}

function toast(m,t){var d=document.createElement('div');d.className='toast toast-'+(t||'ok');d.textContent=m;document.getElementById('toasts').appendChild(d);setTimeout(function(){d.remove()},2500)}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
showIntro();
</script>
</body>
</html>
