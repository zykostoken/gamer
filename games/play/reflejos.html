    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;600&display=swap');
        :root {
            --bg: #080c14; --surface: #0f1623; --card: #182032;
            --accent: #f43f5e; --accent2: #6366f1; --accent3: #06b6d4;
            --success: #22c55e; --danger: #ef4444; --warn: #f59e0b;
            --neon: #00ff94; --neon2: #39ff14;
            --dim: rgba(255,255,255,0.35);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:#e2e8f0; font-family:'DM Sans',system-ui,sans-serif; min-height:100vh; overflow:hidden; }
        
        /* === HEADER === */
        .game-header { background:var(--surface); border-bottom:1px solid rgba(255,255,255,0.06); padding:12px 20px; display:flex; justify-content:space-between; align-items:center; }
        .game-header .logo { font-family:'IBM Plex Mono',monospace; font-weight:800; font-size:0.85rem; color:var(--accent); letter-spacing:2px; text-decoration:none; }
        .game-header .info { display:flex; gap:16px; align-items:center; font-size:0.8rem; }
        .badge { padding:4px 12px; border-radius:20px; font-weight:700; font-size:0.75rem; }
        .badge-level { background:rgba(99,102,241,0.15); color:#818cf8; border:1px solid rgba(99,102,241,0.3); }
        .badge-score { background:rgba(34,197,94,0.1); color:var(--neon2); border:1px solid rgba(34,197,94,0.2); }
        .badge-time { color:var(--dim); font-family:'IBM Plex Mono',monospace; }
        
        /* === ARENA === */
        .arena { position:relative; width:100%; height:calc(100vh - 56px); overflow:hidden; background:radial-gradient(ellipse at center, #0f172a 0%, #080c14 70%); }
        .arena-grid { position:absolute; inset:0; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size:40px 40px; }
        
        /* === STIMULUS === */
        .stimulus {
            position:absolute; border-radius:50%; cursor:pointer; 
            display:flex; align-items:center; justify-content:center;
            transition: transform 0.08s; user-select:none; -webkit-tap-highlight-color:transparent;
            box-shadow: 0 0 30px rgba(var(--stim-rgb), 0.4), 0 0 60px rgba(var(--stim-rgb), 0.15);
            animation: stimPulse 0.6s ease-in-out infinite alternate;
        }
        .stimulus:active { transform:scale(0.9); }
        .stimulus.circle { border-radius:50%; }
        .stimulus.square { border-radius:16%; }
        .stimulus.triangle { border-radius:0; clip-path:polygon(50% 0%, 0% 100%, 100% 100%); }
        .stimulus.star { border-radius:0; clip-path:polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        .stimulus.car { border-radius:6px; overflow:visible; cursor:pointer; }

        /* Nivel 7 — lluvia de autos */
        .car-rain-item {
            position:absolute;
            cursor:pointer;
            transition:transform 0.08s;
            user-select:none;
        }
        .car-rain-item:active { transform:scale(0.88); }
        .car-rain-item.scored { animation:carScore 0.3s ease-out forwards; }
        .car-rain-item.wrong  { animation:carWrong 0.3s ease-out forwards; }
        @keyframes carScore { 0%{opacity:1;transform:scale(1.2)} 100%{opacity:0;transform:scale(0.5)} }
        @keyframes carWrong { 0%{opacity:1} 50%{opacity:0.3} 100%{opacity:0} }

        /* Regla activa — badge que muestra el color elegido */
        #rule-badge {
            position:fixed; top:58px; left:50%; transform:translateX(-50%);
            padding:6px 18px; border-radius:20px; font-size:0.8rem; font-weight:700;
            z-index:200; transition:all .3s; display:none;
            border:2px solid; letter-spacing:.05em;
        }
        #rule-badge.visible { display:block; }

        /* Instruccion inicial nivel 7/8 */
        #first-click-hint {
            position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
            background:rgba(0,0,0,0.85); border:1px solid rgba(255,255,255,0.15);
            border-radius:12px; padding:12px 22px; font-size:0.85rem; color:#e2e8f0;
            z-index:200; text-align:center; max-width:320px; line-height:1.6;
            transition:opacity .4s;
        }
        
        @keyframes stimPulse { from { box-shadow: 0 0 20px rgba(var(--stim-rgb),0.3); } to { box-shadow: 0 0 40px rgba(var(--stim-rgb),0.6); } }
        @keyframes stimAppear { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
        @keyframes stimHit { 0% { transform:scale(1); } 50% { transform:scale(1.3); } 100% { transform:scale(0); opacity:0; } }
        @keyframes stimMiss { 0% { opacity:1; } 100% { opacity:0; transform:translateY(20px); } }
        
        /* === FEEDBACK === */
        .feedback { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:3rem; font-weight:900; pointer-events:none; z-index:100; animation:fbPop 0.5s ease-out forwards; }
        @keyframes fbPop { from { transform:translate(-50%,-50%) scale(0.5); opacity:1; } to { transform:translate(-50%,-50%) scale(1.5); opacity:0; } }
        
        /* === START / RESULTS SCREENS === */
        .overlay-screen { position:fixed; inset:0; background:rgba(8,12,20,0.95); backdrop-filter:blur(20px); z-index:200; display:flex; align-items:flex-start; justify-content:center; overflow-y:auto; padding:3vh 0; }
        .screen-card { background:var(--surface); border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:40px; max-width:520px; width:90%; max-height:94vh; overflow-y:auto; text-align:center; }
        .screen-card h1 { font-size:2rem; font-weight:900; margin-bottom:8px; background:linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .screen-card h2 { font-size:1.1rem; font-weight:600; color:var(--dim); margin-bottom:24px; }
        .screen-card p { font-size:0.88rem; color:rgba(255,255,255,0.5); line-height:1.6; margin-bottom:16px; }
        
        .level-list { text-align:left; margin:20px 0; }
        .level-item { padding:10px 16px; margin:6px 0; border-radius:12px; background:var(--card); border:1px solid rgba(255,255,255,0.05); font-size:0.82rem; display:flex; justify-content:space-between; align-items:center; position:relative; }
        .level-item .lname { font-weight:700; color:#e2e8f0; }
        .level-item .ldesc { color:var(--dim); font-size:0.75rem; }
        .level-item .lstatus { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--dim); margin-top:3px; display:inline-block; }
        .level-item.locked { opacity:0.38; }
        .level-item.locked .lstatus { color:#94a3b8; }
        .level-item.locked::after {
            content:""; display:inline-block; width:18px; height:18px; margin-left:10px;
            background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%2394a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>');
            background-size:contain; background-repeat:no-repeat;
        }
        .level-item.current { border-color:var(--accent); background:rgba(244,63,94,0.08); box-shadow:0 0 0 1px rgba(244,63,94,0.25); }
        .level-item.current .lstatus { color:var(--accent); font-weight:700; }
        .level-item.completed { opacity:0.72; border-color:rgba(74,222,128,0.35); background:rgba(74,222,128,0.06); }
        .level-item.completed .lname { color:#86efac; }
        .level-item.completed .lstatus { color:#4ade80; }
        .level-item.completed::after {
            content:""; display:inline-block; width:18px; height:18px; margin-left:10px;
            background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%234ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>');
            background-size:contain; background-repeat:no-repeat;
        }
        
        .btn { padding:14px 32px; border-radius:14px; border:none; cursor:pointer; font-weight:800; font-size:0.95rem; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
        .btn-primary { background:linear-gradient(135deg, var(--accent), var(--accent2)); color:white; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(244,63,94,0.3); }
        .btn-secondary { background:var(--card); color:#e2e8f0; border:1px solid rgba(255,255,255,0.1); }
        .btn-sm { padding:10px 20px; font-size:0.82rem; border-radius:10px; }
        
        /* === RESULTS METRICS === */
        .metrics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:16px 0; }
        .metric-card { background:var(--card); border-radius:12px; padding:12px; text-align:center; border:1px solid rgba(255,255,255,0.05); }
        .metric-card .mv { font-size:1.4rem; font-weight:900; color:white; }
        .metric-card .ml { font-size:0.65rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
        .metric-card.good .mv { color:var(--success); }
        .metric-card.warn .mv { color:var(--warn); }
        .metric-card.bad .mv { color:var(--danger); }

        /* === SOUNDS (visual-only indicator) === */
        .sound-flash { position:fixed; inset:0; pointer-events:none; z-index:50; animation:soundFlash 0.15s ease-out; }
        @keyframes soundFlash { from { background:rgba(255,255,255,0.05); } to { background:transparent; } }

        /* === THEMES === */
        .theme-ocean .arena { background: radial-gradient(ellipse at 50% 80%, #0c2340 0%, #040d1a 70%); }
        .theme-mountain .arena { background: radial-gradient(ellipse at 50% 100%, #1a1a2e 0%, #0a0a14 70%); }
        .theme-neon .arena { background: radial-gradient(ellipse at center, #1a0025 0%, #080010 70%); }
    </style>

<script>
// ================================================================

//
// Constructos clínicos medidos:
// - Atención sostenida (hit rate, omission errors)
// - Control inhibitorio (commission errors, false alarm rate)  
// - Velocidad de procesamiento (RT mean, RT variability)
// - Discriminabilidad (d-prime: signal detection theory)
// - Sesgo de respuesta (criterion/beta)
// - Lateralización (RT diferencial izq/der)

var sb = null;
var GAME_SLUG = 'reflejos';

// ======================== AUDIO ENGINE ========================
var audioCtx = null;
function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, duration, type) {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}
function playHit() { playTone(880, 0.1, 'sine'); }
function playMiss() { playTone(220, 0.3, 'sawtooth'); }
function playWrong() { playTone(150, 0.2, 'square'); }

// ======================== LEVELS ========================

// ======================== INIT ========================
// Art XIII Constitucion V4: progresion forzada secuencial
// STATE.unlockedLevelId guarda el id numerico del nivel desbloqueado (1..8).
// Si no hay RPC disponible (sin sesion o error), cae al nivel 1.
function init() {
    try {
        sb = (typeof getSupabaseClient === 'function') ? getSupabaseClient() : null;
    } catch (e) {
        console.warn('[reflejos] getSupabaseClient threw:', e.message);
        sb = null;
    }
    STATE.unlockedLevelId = 1;
    STATE.completedLevelIds = [];

    // Render lista inmediatamente con defaults — si el fetch tarda o falla,
    // el paciente ve algo util igual (boton Comenzar funcional arranca en nivel 1).
    renderLevelList();

    // Beacon de diagnostico: marca entrada al juego.
    // Si cero filas aparecen en zykos_game_metrics con metric_type='game_entry_beacon',
    // significa que los pacientes NUNCA estan llegando al handler de DOMContentLoaded.
    try {
        var dni = window.ZYKOS_DNI || new URLSearchParams(location.search).get('dni');
        if (sb && dni) {
            sb.from('zykos_game_metrics').insert({
                patient_dni: dni,
                game_slug: 'reflejos',
                metric_type: 'game_entry_beacon',
                metric_value: null,
                metric_data: {
                    t: new Date().toISOString(),
                    ua: navigator.userAgent.substring(0, 200),
                    viewport: window.innerWidth + 'x' + window.innerHeight,
                    has_sb: !!sb,
                    has_auth: !window.ZYKOS_AUTH_BLOCKED
                }
            }).then(function(){}, function(e){ console.warn('[reflejos] beacon failed:', e); });
        }
    } catch (e) { /* silent */ }

    // Art XIII: fetch unlocked level (async, no bloquea UI)
    fetchUnlockedLevel().then(function() {
        renderLevelList(); // re-render con data real
        // ROKOLA auto-launch (audit #115): si Rokola forced, saltar pantalla inicial
        try {
          if (typeof RokolaClient !== 'undefined' && RokolaClient.isForced()) {
            console.log('[reflejos] ROKOLA auto-launch detected, skipping start screen');
            setTimeout(function() {
              try { beginGame(); } catch(e) { console.warn('[reflejos] rokola auto beginGame:', e); }
            }, 200);
          }
        } catch(e) {}
    }).catch(function(e) {
        console.warn('[reflejos] fetchUnlockedLevel promise rejected:', e && e.message);
        // lista ya esta renderizada con defaults, seguimos
        try {
          if (typeof RokolaClient !== 'undefined' && RokolaClient.isForced()) {
            setTimeout(function() {
              try { beginGame(); } catch(e) { console.warn('[reflejos] rokola auto beginGame:', e); }
            }, 200);
          }
        } catch(e) {}
    });
}

async function fetchUnlockedLevel() {
    try {
        var dni = window.ZYKOS_DNI || new URLSearchParams(location.search).get('dni');
        if (!dni || !sb) return;
        var r = await sb.rpc('zykos_get_unlocked_level', {
            p_dni: dni, p_game_slug: 'reflejos'
        });
        if (r.error) { console.warn('[reflejos] get_unlocked_level error:', r.error.message); return; }
        if (!r.data || r.data.error) { console.warn('[reflejos] get_unlocked_level:', r.data && r.data.error); return; }
        STATE.unlockedLevelId = r.data.unlocked_level || 1;
        STATE.completedLevelIds = r.data.levels_completed || [];
    } catch (e) { console.warn('[reflejos] fetchUnlockedLevel:', e.message); }
}

function renderLevelList() {
    var html = '';
    var levelListEl = document.getElementById('level-list');
    if (!levelListEl) return;
    if (!LEVELS || !LEVELS.length) {
        levelListEl.innerHTML = '<div style="padding:12px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:8px;color:#fecaca;font-size:.85rem">Error cargando niveles. Recarga la pagina o volve al portal.</div>';
        return;
    }
    LEVELS.forEach(function(lv) {
        var cls, label;
        if (STATE.completedLevelIds.indexOf(lv.id) >= 0) {
            cls = 'completed'; label = 'completado';
        } else if (lv.id === STATE.unlockedLevelId) {
            cls = 'current'; label = 'aqui seguis';
        } else {
            cls = 'locked'; label = 'bloqueado';
        }
        html += '<div class="level-item ' + cls + '" data-status="' + label + '">' +
            '<div><span class="lname">Nivel ' + lv.id + ': ' + lv.name + '</span>' +
            '<br><span class="ldesc">' + lv.desc + '</span>' +
            '<br><span class="lstatus">' + label + '</span></div>' +
            '</div>';
    });
    levelListEl.innerHTML = html;
}

// ======================== GAME START ========================
function beginGame() {
    try {
        // Beacon: "el paciente clicko Comenzar". Diagnostico de donde se caen las sesiones.
        try {
            var dni = window.ZYKOS_DNI || new URLSearchParams(location.search).get('dni');
            if (sb && dni) {
                sb.from('zykos_game_metrics').insert({
                    patient_dni: dni,
                    game_slug: 'reflejos',
                    metric_type: 'begin_game_clicked',
                    metric_value: null,
                    metric_data: {
                        t: new Date().toISOString(),
                        unlocked_level: STATE.unlockedLevelId || 1
                    }
                }).then(function(){}, function(){});
            }
        } catch (e) { /* silent */ }

        initAudio();
        // ZYKOS V4 wiring: activa el engine + 11 agentes + corsario. Escribe
        // session_biomet y raw_stream cuando se llama ZykosBootstrap.end() al
        // completar el nivel.
        if (typeof ZykosBootstrap !== 'undefined') {
            try { ZykosBootstrap.start('reflejos'); } catch(e) { console.warn('[reflejos] bootstrap.start failed:', e && e.message); }
        }
        var startEl = document.getElementById('start-screen');
        if (startEl) startEl.style.display = 'none';
        // ROKOLA override (audit #115): si la Rokola pidio un nivel especifico,
        // ignorar art XIII/unlockedLevelId y arrancar en el nivel pedido.
        var targetIdx = 0;
        var rokolaLevel = null;
        try {
          if (typeof RokolaClient !== 'undefined' && RokolaClient.isForced()) {
            var pLv = new URLSearchParams(location.search).get('level');
            if (pLv) rokolaLevel = parseInt(pLv, 10);
          }
        } catch(e) {}
        if (rokolaLevel) {
          for (var k = 0; k < LEVELS.length; k++) {
            if (LEVELS[k].id === rokolaLevel) { targetIdx = k; break; }
          }
          console.log('[reflejos] ROKOLA forced level', rokolaLevel, '-> idx', targetIdx);
        } else {
          // Art XIII: arrancar en el nivel desbloqueado, no en el 0 hardcoded.
          var unlockedId = (STATE && STATE.unlockedLevelId) || 1;
          for (var i = 0; i < LEVELS.length; i++) {
            if (LEVELS[i].id === unlockedId) { targetIdx = i; break; }
          }
        }
        STATE.level = targetIdx;
        STATE.score = 0;
        startLevel();
    } catch (err) {
        console.error('[reflejos] beginGame failed:', err);
        // Mostrar error visible al paciente en vez de pantalla en blanco
        var startEl2 = document.getElementById('start-screen');
        if (startEl2) {
            startEl2.innerHTML = '<div class="screen-card"><h2 style="color:#fecaca">Algo fallo al iniciar</h2><p style="color:#fecaca">' + (err.message || 'Error desconocido') + '</p><button class="btn btn-primary" onclick="location.reload()">Recargar</button></div>';
        }
    }
}

// startLevel: wrapper que muestra la consigna pre-nivel y mide tiempo de lectura.
// El core original (ahora _startLevelCore) recibe el control cuando el paciente
// confirma que entendio.
function startLevel() {
    var lv = LEVELS[STATE.level];
    var consignaText = lv.longConsigna || lv.desc || ('Nivel ' + lv.id);
    var consignaStartMs = performance.now();

    // Beacon: intentamos arrancar un nivel
    try {
        var dni = window.ZYKOS_DNI || new URLSearchParams(location.search).get('dni');
        if (sb && dni) {
            sb.from('zykos_game_metrics').insert({
                patient_dni: dni,
                game_slug: 'reflejos',
                metric_type: 'level_started',
                metric_value: null,
                metric_data: { level: lv.id, level_name: lv.name, t: new Date().toISOString() }
            }).then(function(){}, function(){});
        }
    } catch (e) {}

    // Construir overlay consigna
    var overlay = document.createElement('div');
    overlay.id = 'consigna-overlay';
    overlay.style.cssText = [
        'position:fixed', 'inset:0', 'z-index:99990',
        'background:rgba(8,12,20,.96)', 'backdrop-filter:blur(8px)',
        'display:flex', 'align-items:center', 'justify-content:center',
        'padding:20px', 'animation:fadeIn .25s ease-out'
    ].join(';');

    var card = document.createElement('div');
    card.style.cssText = [
        'max-width:520px', 'width:100%',
        'background:var(--card,#182032)', 'border:1px solid rgba(99,102,241,.35)',
        'border-radius:16px', 'padding:28px 26px',
        'box-shadow:0 20px 60px rgba(0,0,0,.6)',
        'color:var(--fg,#e5e9f0)', 'font-family:DM Sans,system-ui,sans-serif'
    ].join(';');

    var header =
        '<div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.15em;color:var(--accent2,#6366f1);margin-bottom:6px">Nivel ' + lv.id + '</div>' +
        '<h2 style="margin:0 0 18px 0;font-size:1.5rem;font-weight:700;color:var(--fg,#e5e9f0)">' + escapeHtmlC(lv.name) + '</h2>';

    // Consigna con saltos de linea respetados
    var consignaHtml = '<div style="font-size:1rem;line-height:1.6;color:var(--fg,#e5e9f0);margin-bottom:24px;white-space:pre-line">' + escapeHtmlC(consignaText) + '</div>';

    var btn =
        '<button id="consigna-ok-btn" style="width:100%;padding:14px 20px;font-size:1rem;font-weight:600;' +
        'background:linear-gradient(135deg,#6366f1,#06b6d4);color:white;border:none;border-radius:10px;' +
        'cursor:pointer;letter-spacing:.02em;transition:transform .15s">Entendí — Empezar</button>';

    card.innerHTML = header + consignaHtml + btn;
    overlay.appendChild(card);
    document.body.appendChild(overlay);

    document.getElementById('consigna-ok-btn').addEventListener('click', function(){
        var readMs = Math.round(performance.now() - consignaStartMs);

        // Beacon: consigna leida, cuanto tardo
        try {
            var dni2 = window.ZYKOS_DNI || new URLSearchParams(location.search).get('dni');
            if (sb && dni2) {
                sb.from('zykos_game_metrics').insert({
                    patient_dni: dni2,
                    game_slug: 'reflejos',
                    metric_type: 'consigna_read',
                    metric_value: readMs,
                    metric_data: { level: lv.id, consigna_read_time_ms: readMs, t: new Date().toISOString() }
                }).then(function(){}, function(){});
            }
        } catch (e) {}

        // Guardar para incluirlo en el session_summary
        STATE.consignaReadTimeMs = readMs;
        overlay.remove();
        _startLevelCore();
    });
}

function escapeHtmlC(s) {
    return String(s || '').replace(/[&<>"']/g, function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
}

function _startLevelCore() {
    var lv = LEVELS[STATE.level];
    STATE.phase = 'countdown';
    STATE.stimIndex = 0;
    STATE.responses = [];
    STATE.startTime = performance.now();
    STATE.score = 0;
    // Reset estado de alternancia (usado solo en niveles con rules.alternation)
    STATE.alternationLastColor = null;
    STATE.alternationFirstColor = null;
    STATE.alternationBreaks = 0;

    document.body.className = lv.theme ? 'theme-' + lv.theme : '';
    document.getElementById('level-badge').textContent = 'Nivel ' + lv.id;
    document.getElementById('score-display').textContent = STATE.score;

    // Timer
    if (STATE.timerInterval) clearInterval(STATE.timerInterval);
    var startT = Date.now();
    STATE.timerInterval = setInterval(function() {
        var elapsed = Math.floor((Date.now() - startT) / 1000);
        var m = String(Math.floor(elapsed/60)).padStart(2,'0');
        var s = String(elapsed%60).padStart(2,'0');
        document.getElementById('timer-display').textContent = m + ':' + s;
    }, 1000);

    // Niveles con modo propio (7 y 8) — saltan generateSequence y CPT
    var mode = lv.rules && lv.rules.mode;
    if (mode === 'car_rain') {
        showCountdown(3, function() {
            STATE.phase = 'playing';
            startCarRain(lv);
        });
        return;
    }
    if (mode === 'choose_target') {
        showCountdown(3, function() {
            STATE.phase = 'playing';
            startChooseTarget(lv);
        });
        return;
    }

    // Modo CPT estándar (niveles 1-6)
    STATE.stimuli = generateSequence(lv);
    STATE.halfwayIndex = Math.floor(STATE.stimuli.length / 2);
    showCountdown(3, function() {
        STATE.phase = 'playing';
        presentNextStimulus();
    });
}

// ======================== SEQUENCE GENERATOR ========================
function generateSequence(lv) {
    var seq = [];
    var rules = lv.rules;
    var count = rules.count;
    var targetRatio = rules.targetRatio || 0.7;
    
    for (var i = 0; i < count; i++) {
        var isTarget = Math.random() < targetRatio;
        var color, shape, action;
        
        if (rules.colors.length === 1) {
            color = rules.colors[0];
            shape = rules.shapes[0];
        } else if (isTarget) {
            // Pick a "go" stimulus
            color = 'red';
            shape = rules.shapes[Math.floor(Math.random() * rules.shapes.length)];
        } else {
            // Pick a "no-go" or alternative stimulus
            var noGoColors = rules.colors.filter(function(c) { return c !== 'red'; });
            color = noGoColors[Math.floor(Math.random() * noGoColors.length)];
            shape = rules.shapes[Math.floor(Math.random() * rules.shapes.length)];
        }
        
        action = rules.actions[color + '_' + shape] || 'tap';
        
        // Vary size within range
        var minS = rules.size[0], maxS = rules.size[1];
        var size = minS + Math.floor(Math.random() * (maxS - minS + 1));
        
        // Speed decay: stimuli get faster in second half
        var isi = rules.isi;
        var dur = rules.stimDuration;
        if (rules.speedDecay && i > count * 0.5) {
            var decay = 1 - ((i - count*0.5) / (count*0.5)) * 0.3;
            isi = Math.max(300, Math.floor(isi * decay));
            dur = Math.max(600, Math.floor(dur * decay));
        }
        
        // Random position (avoid edges)
        var margin = size + 20;
        var arenaW = window.innerWidth - margin * 2;
        var arenaH = (window.innerHeight - 56) - margin * 2;
        var x = margin + Math.floor(Math.random() * arenaW);
        var y = margin + Math.floor(Math.random() * arenaH);
        
        // Audio conflict (level 6): sometimes play conflicting sound
        var audioSignal = null;
        if (rules.audioConflict) {
            if (action === 'inhibit') {
                // No-go stimulus, but play "go" sound sometimes (conflict)
                audioSignal = Math.random() < 0.3 ? 'go' : 'nogo';
            } else {
                audioSignal = Math.random() < 0.2 ? 'nogo' : 'go';
            }
        }
        
        seq.push({
            index: i, color: color, shape: shape, action: action,
            size: size, x: x, y: y, isi: isi, duration: dur,
            audioSignal: audioSignal,
            isTarget: action !== 'inhibit',
            appearedAt: null, respondedAt: null, response: null, correct: null
        });
    }
    return seq;
}

// ======================== STIMULUS PRESENTATION ========================
function presentNextStimulus() {
    if (STATE.phase !== 'playing') return;
    if (STATE.stimIndex >= STATE.stimuli.length) {
        endLevel();
        return;
    }
    
    var stim = STATE.stimuli[STATE.stimIndex];
    STATE.currentStim = stim;
    
    // Create DOM element
    var el = document.createElement('div');
    el.className = 'stimulus ' + stim.shape;
    el.style.cssText = 'width:' + stim.size + 'px;height:' + stim.size + 'px;' +
        'left:' + stim.x + 'px;top:' + stim.y + 'px;' +
        'background:' + COLORS[stim.color].hex + ';' +
        '--stim-rgb:' + COLORS[stim.color].rgb + ';' +
        'animation:stimAppear 0.12s ease-out;';
    el.id = 'stim-' + stim.index;
    
    // Click handler V4 — ventana temporal propia, NO dblclick nativo.
    //
    // Por que: el listener nativo 'click' dispara ANTES que 'dblclick'. En
    // targets que requieren doble click (action='double'), el primer click
    // llegaba a handleResponse('tap') y marcaba error antes de que el paciente
    // pudiera dar el segundo. Bug detectado por Gonzalo en Nivel 5 (Velocidad).
    //
    // Nueva logica:
    //   - Click en target que espera 'tap' o 'left'/'right': evalua inmediato.
    //   - Click en target que espera 'double': NO evalua, abre ventana de 350ms
    //     esperando el segundo click. Si llega en la ventana -> 'double'.
    //     Si no llega -> 'tap' (fallo: solo hizo un click cuando eran dos).
    //   - Click en target que espera 'inhibit': evalua inmediato (es error de
    //     todas formas, responder a un no-go siempre falla).
    el.addEventListener('click', function(e) {
        // Acceso al stim actual mediante STATE.currentStim (lo setea presentNextStimulus)
        var currentStim = STATE.currentStim;
        if (!currentStim || currentStim.respondedAt) return;

        var expectedAction = currentStim.action;

        // Caso 1: accion esperada es 'double' -> ventana de espera.
        if (expectedAction === 'double') {
            if (!currentStim._firstClickAt) {
                // Primer click sobre un target double. NO EVALUAR AUN.
                currentStim._firstClickAt = performance.now();
                currentStim._firstClickEvent = {
                    clientX: e.clientX, clientY: e.clientY
                };
                // Feedback visual opcional: marca que registramos el primer click
                el.style.filter = 'brightness(1.3)';
                // Timer: si no llega segundo click en 350ms, evalua como tap
                currentStim._dblTimeout = setTimeout(function() {
                    if (currentStim.respondedAt) return;
                    // No llego el segundo click: evalua como tap (error, era double)
                    handleResponse('tap', currentStim._firstClickEvent);
                }, 350);
                return;
            } else {
                // Segundo click dentro de la ventana -> es double OK
                clearTimeout(currentStim._dblTimeout);
                handleResponse('double', e);
                return;
            }
        }

        // Caso 2: accion esperada es 'tap' (o 'left'/'right' lateralizado)
        // -> evalua inmediato, pero tratamos doble clicks accidentales como tap.
        handleResponse('tap', e);
    });
    // dblclick nativo conservado como safety net por si el navegador lo dispara
    // y el primer click no se registro (casos raros). Si ya respondimos via la
    // ventana propia, handleResponse retorna early.
    el.addEventListener('dblclick', function(e) { handleResponse('double', e); });
    
    document.getElementById('arena').appendChild(el);
    stim.appearedAt = performance.now();
    
    // Play audio if multimodal
    if (stim.audioSignal === 'go') { playTone(1200, 0.08, 'sine'); }
    else if (stim.audioSignal === 'nogo') { playTone(200, 0.15, 'sawtooth'); }
    
    // Stimulus timeout (missed)
    STATE.stimTimeout = setTimeout(function() {
        var el = document.getElementById('stim-' + stim.index);
        if (el && !stim.respondedAt) {
            stim.respondedAt = performance.now();
            stim.response = 'none';
            stim.correct = !stim.isTarget; // Correct to NOT respond to no-go
            if (stim.isTarget) {
                // Omission error
                el.style.animation = 'stimMiss 0.3s ease-out forwards';
                setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
            } else {
                // Correct rejection
                el.style.animation = 'stimMiss 0.2s ease-out forwards';
                setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 200);
                STATE.score += 5;
            }
        }
        STATE.stimIndex++;
        STATE.nextTimeout = setTimeout(presentNextStimulus, stim.isi * 0.3);
    }, stim.duration);
}

// ======================== RESPONSE HANDLER ========================
function handleResponse(type, e) {
    if (STATE.phase !== 'playing' || !STATE.currentStim) return;
    
    var stim = STATE.currentStim;
    if (stim.respondedAt) return; // Already responded
    
    stim.respondedAt = performance.now();
    stim.response = type;
    var rt = stim.respondedAt - stim.appearedAt;
    
    // Motor metrics: click precision (precision_deposito = distance from stimulus center)
    var stimCenterX = stim.x + stim.size/2;
    var stimCenterY = stim.y + stim.size/2 + 56; // +56 for header height
    var clickOffsetX = e.clientX - stimCenterX;
    var clickOffsetY = e.clientY - stimCenterY;
    var clickDistance = Math.sqrt(clickOffsetX*clickOffsetX + clickOffsetY*clickOffsetY);
    stim.clickDistance = Math.round(clickDistance * 10) / 10;
    stim.clickOffsetX = Math.round(clickOffsetX);
    stim.clickOffsetY = Math.round(clickOffsetY);
    
    // Check lateralized responses
    var lv = LEVELS[STATE.level];
    if (lv.rules.alternation) {
        // Alternancia forzada (Nivel 3): paciente debe alternar colores.
        // Primer click fija color "arrancador". Siguiente debe ser el OTRO color.
        // Dos seguidos del mismo color = error de comision (perseveracion).
        stim.response = 'tap';
        if (STATE.alternationLastColor === undefined || STATE.alternationLastColor === null) {
            // Primer click: establece el color inicial. Siempre correct.
            STATE.alternationLastColor = stim.color;
            STATE.alternationFirstColor = stim.color;
            STATE.alternationBreaks = 0;
            stim.correct = true;
            stim.alternationRole = 'first';
        } else if (stim.color === STATE.alternationLastColor) {
            // Mismo color que el anterior: ERROR (no alterno)
            stim.correct = false;
            stim.alternationRole = 'break';
            STATE.alternationBreaks = (STATE.alternationBreaks || 0) + 1;
            // Actualizamos igual para no castigar el siguiente
            STATE.alternationLastColor = stim.color;
        } else {
            // Color distinto: alterno correctamente
            stim.correct = true;
            stim.alternationRole = 'alternate';
            STATE.alternationLastColor = stim.color;
        }
    } else if (lv.rules.lateralized) {
        // In lateralized mode, check left/right via click position
        var screenMid = window.innerWidth / 2;
        var side = e.clientX < screenMid ? 'left' : 'right';
        stim.response = side;
        stim.correct = (stim.action === side);
    } else if (stim.action === 'inhibit') {
        // Should not have responded
        stim.correct = false;
    } else if (stim.action === 'double' && type !== 'double') {
        stim.correct = false;
    } else if (stim.action === 'tap' && type === 'tap') {
        stim.correct = true;
    } else if (stim.action === 'double' && type === 'double') {
        stim.correct = true;
    } else {
        stim.correct = (stim.action === type);
    }
    
    // Audio conflict override (level 6)
    if (stim.audioSignal === 'nogo' && stim.isTarget) {
        // Stimulus was go but sound said no-go — responding is still correct
        // but we track the conflict in metrics
        stim.audioConflict = true;
    }
    
    // Visual feedback
    var el = document.getElementById('stim-' + stim.index);
    if (el) {
        if (stim.correct) {
            el.style.animation = 'stimHit 0.2s ease-out forwards';
            STATE.score += Math.max(5, Math.round(50 - rt/20));
            playHit();
            showFeedback('+' + Math.max(5, Math.round(50 - rt/20)), '#22c55e');
        } else {
            el.style.borderColor = 'var(--danger)';
            el.style.animation = 'stimMiss 0.3s ease-out forwards';
            STATE.score = Math.max(0, STATE.score - 10);
            stim.action === 'inhibit' ? playWrong() : playMiss();
            showFeedback(stim.action === 'inhibit' ? 'No tocar' : 'Error', 'var(--danger)');
        }
        setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
    }
    
    clearTimeout(STATE.stimTimeout);
    document.getElementById('score-display').textContent = STATE.score;
    
    STATE.stimIndex++;
    STATE.nextTimeout = setTimeout(presentNextStimulus, stim.isi);
}

// ======================== LATERALIZATION BUTTONS ========================
// For level 3+, show left/right buttons on mobile
// On desktop, left half = left, right half = right click areas

// ======================== HELPERS ========================
function showCountdown(n, cb) {
    if (n <= 0) { cb(); return; }
    var fb = document.createElement('div');
    fb.className = 'feedback';
    fb.style.color = 'white';
    fb.textContent = n;
    document.body.appendChild(fb);
    setTimeout(function() { if (fb.parentNode) fb.parentNode.removeChild(fb); }, 500);
    setTimeout(function() { showCountdown(n-1, cb); }, 800);
}

function showFeedback(text, color) {
    var fb = document.createElement('div');
    fb.className = 'feedback';
    fb.style.color = color;
    fb.textContent = text;
    document.body.appendChild(fb);
    setTimeout(function() { if (fb.parentNode) fb.parentNode.removeChild(fb); }, 500);

// ======================== MOTOR NIVEL 7 — LLUVIA DE AUTOS ========================
// Los autos bajan por la pantalla. El primer click define el color objetivo.
// Desde ese momento: click en ese color = punto + se va. Otro color = penalidad.
// Métrica clave: ¿qué color eligió? ¿cuánto tardó en establecer la regla?
// Correlato con AFEC2 Proyectivo: el color elegido es el primer objeto afectivo.

var CAR_RAIN = {
    active: false,
    rule_color: null,         // null hasta el primer click
    rule_set_at: null,        // ms desde inicio cuando eligió el color
    cars: [],
    spawned: 0,
    hits: 0,
    misses: 0,
    wrong_clicks: 0,
    score: 0,
    raf: null,
    spawn_iv: null,
    end_to: null,
    start_ts: null
};

// SVG de auto top-view — geométrico, sin marca
function carSVG(color, size) {
    var h = COLORS[color] ? COLORS[color].hex : '#888';
    var s = size;
    return '<svg width="' + s + '" height="' + Math.round(s*1.7) + '" viewBox="0 0 40 68" xmlns="http://www.w3.org/2000/svg">' +
        // Carrocería
        '<rect x="4" y="10" width="32" height="48" rx="8" fill="' + h + '" opacity="0.95"/>' +
        // Techo
        '<rect x="9" y="16" width="22" height="20" rx="5" fill="' + h + '" opacity="0.7"/>' +
        // Parabrisas
        '<rect x="10" y="17" width="20" height="8" rx="3" fill="rgba(180,220,255,0.5)"/>' +
        // Faros delanteros
        '<rect x="6" y="10" width="8" height="5" rx="2" fill="#fff" opacity="0.9"/>' +
        '<rect x="26" y="10" width="8" height="5" rx="2" fill="#fff" opacity="0.9"/>' +
        // Luces traseras
        '<rect x="6" y="53" width="8" height="5" rx="2" fill="#ff3333" opacity="0.85"/>' +
        '<rect x="26" y="53" width="8" height="5" rx="2" fill="#ff3333" opacity="0.85"/>' +
        // Ruedas
        '<rect x="0" y="14" width="7" height="12" rx="3" fill="#222"/>' +
        '<rect x="33" y="14" width="7" height="12" rx="3" fill="#222"/>' +
        '<rect x="0" y="42" width="7" height="12" rx="3" fill="#222"/>' +
        '<rect x="33" y="42" width="7" height="12" rx="3" fill="#222"/>' +
    '</svg>';
}

function startCarRain(lv) {
    var arena = document.getElementById('arena');
    arena.innerHTML = '';
    CAR_RAIN.active = true;
    CAR_RAIN.rule_color = null;
    CAR_RAIN.rule_set_at = null;
    CAR_RAIN.cars = [];
    CAR_RAIN.spawned = 0;
    CAR_RAIN.hits = 0;
    CAR_RAIN.misses = 0;
    CAR_RAIN.wrong_clicks = 0;
    CAR_RAIN.score = 0;
    CAR_RAIN.start_ts = performance.now();

    // Hint de primer click
    showFirstClickHint('Tu primer click sobre un auto define el color.<br>Solo esos autos sumarán puntos.');

    // Badge de regla (oculto hasta que elija)
    var badge = document.getElementById('rule-badge');
    if (!badge) {
        badge = document.createElement('div');
        badge.id = 'rule-badge';
        document.body.appendChild(badge);
    }
    badge.className = 'rule-badge';
    badge.style.display = 'none';

    // Spawn de autos
    var rules = lv.rules;
    CAR_RAIN.spawn_iv = setInterval(function() {
        if (!CAR_RAIN.active) return;
        spawnCar(rules);
    }, rules.spawnInterval);

    // Loop de animación
    function loop() {
        if (!CAR_RAIN.active) return;
        moveCars();
        CAR_RAIN.raf = requestAnimationFrame(loop);
    }
    CAR_RAIN.raf = requestAnimationFrame(loop);

    // Tiempo límite
    CAR_RAIN.end_to = setTimeout(function() {
        endCarRain(lv);
    }, rules.duration);
}

function spawnCar(rules) {
    var color = rules.colors[Math.floor(Math.random() * rules.colors.length)];
    var size  = rules.size;
    var arenaW = window.innerWidth;
    var x = 20 + Math.floor(Math.random() * (arenaW - size - 40));
    var speed = rules.speed.min + Math.random() * (rules.speed.max - rules.speed.min);

    var el = document.createElement('div');
    el.className = 'car-rain-item';
    el.style.cssText = 'left:' + x + 'px;top:-80px;width:' + size + 'px;';
    el.innerHTML = carSVG(color, size);
    el.dataset.color = color;
    el.dataset.y = -80;
    el.dataset.speed = speed.toFixed(2);
    el.dataset.id = CAR_RAIN.spawned++;

    el.addEventListener('click', function(e) {
        e.stopPropagation();
        handleCarClick(el, color);
    });
    el.addEventListener('touchend', function(e) {
        e.preventDefault();
        e.stopPropagation();
        handleCarClick(el, color);
    }, { passive: false });

    document.getElementById('arena').appendChild(el);
    CAR_RAIN.cars.push(el);
}

function moveCars() {
    var toRemove = [];
    var screenH = window.innerHeight;
    CAR_RAIN.cars.forEach(function(el) {
        if (!el.parentNode) { toRemove.push(el); return; }
        var y = parseFloat(el.dataset.y) + parseFloat(el.dataset.speed);
        el.dataset.y = y;
        el.style.top = y + 'px';
        if (y > screenH + 80) {
            // Auto que pasó sin ser clickeado
            if (CAR_RAIN.rule_color && el.dataset.color === CAR_RAIN.rule_color) {
                CAR_RAIN.misses++;
            }
            el.remove();
            toRemove.push(el);
        }
    });
    CAR_RAIN.cars = CAR_RAIN.cars.filter(function(el) {
        return toRemove.indexOf(el) === -1;
    });
}

function handleCarClick(el, color) {
    if (!CAR_RAIN.active) return;
    var sessionMs = Math.round(performance.now() - CAR_RAIN.start_ts);

    if (CAR_RAIN.rule_color === null) {
        // PRIMER CLICK — establece la regla
        CAR_RAIN.rule_color = color;
        CAR_RAIN.rule_set_at = sessionMs;
        hideFirstClickHint();
        showRuleBadge(color, 'Marcá todos los ' + COLORS[color].label);
        playTone(880, 0.12, 'sine');
        // Feedback visual
        el.classList.add('scored');
        CAR_RAIN.hits++;
        CAR_RAIN.score++;
        updateScore(CAR_RAIN.score);
        setTimeout(function() { if (el.parentNode) el.remove(); }, 300);
        CAR_RAIN.cars = CAR_RAIN.cars.filter(function(c){ return c !== el; });
        // Reportar hit al agente media
        if (typeof window.ZykosMediaAgent !== 'undefined') window.ZykosMediaAgent.reportGameEvent('hit');
    } else if (color === CAR_RAIN.rule_color) {
        // HIT — color correcto
        el.classList.add('scored');
        CAR_RAIN.hits++;
        CAR_RAIN.score++;
        updateScore(CAR_RAIN.score);
        playTone(1100, 0.08, 'sine');
        setTimeout(function() { if (el.parentNode) el.remove(); }, 280);
        CAR_RAIN.cars = CAR_RAIN.cars.filter(function(c){ return c !== el; });
        if (typeof window.ZykosMediaAgent !== 'undefined') window.ZykosMediaAgent.reportGameEvent('hit');
    } else {
        // ERROR — color incorrecto
        el.classList.add('wrong');
        CAR_RAIN.wrong_clicks++;
        CAR_RAIN.score = Math.max(0, CAR_RAIN.score - 1);
        updateScore(CAR_RAIN.score);
        playTone(220, 0.12, 'sawtooth');
        setTimeout(function() { if (el.parentNode) el.remove(); }, 300);
        CAR_RAIN.cars = CAR_RAIN.cars.filter(function(c){ return c !== el; });
        if (typeof window.ZykosMediaAgent !== 'undefined') window.ZykosMediaAgent.reportGameEvent('error');
    }
}

function endCarRain(lv) {
    CAR_RAIN.active = false;
    if (CAR_RAIN.raf) cancelAnimationFrame(CAR_RAIN.raf);
    if (CAR_RAIN.spawn_iv) clearInterval(CAR_RAIN.spawn_iv);
    if (CAR_RAIN.end_to) clearTimeout(CAR_RAIN.end_to);
    var badge = document.getElementById('rule-badge');
    if (badge) badge.style.display = 'none';
    // Limpiar autos en pantalla
    document.getElementById('arena').innerHTML = '';
    // Métricas específicas del nivel
    STATE.carRainMetrics = {
        chosen_color:     CAR_RAIN.rule_color,
        rule_set_at_ms:   CAR_RAIN.rule_set_at,
        hits:             CAR_RAIN.hits,
        misses:           CAR_RAIN.misses,
        wrong_clicks:     CAR_RAIN.wrong_clicks,
        score:            CAR_RAIN.score,
        target_ratio:     CAR_RAIN.hits > 0
            ? +(CAR_RAIN.hits / (CAR_RAIN.hits + CAR_RAIN.misses + CAR_RAIN.wrong_clicks)).toFixed(3)
            : 0
    };
    endLevel();
}

function startChooseTarget(lv) {

function spawnObject(rules) {
    var color = rules.colors[Math.floor(Math.random() * rules.colors.length)];
    var shape = rules.shapes[Math.floor(Math.random() * rules.shapes.length)];
    var size  = rules.size.min + Math.floor(Math.random() * (rules.size.max - rules.size.min));
    var arenaW = window.innerWidth;
    var arenaH = window.innerHeight;
    // Posición inicial en el borde
    var side = Math.floor(Math.random() * 4);
    var x, y, dx, dy;
    var speed = rules.speed.min + Math.random() * (rules.speed.max - rules.speed.min);
    if (side === 0) { x = Math.random()*arenaW; y = -size; dx = (Math.random()-0.5)*1.5; dy = speed; }
    else if (side === 1) { x = arenaW+size; y = Math.random()*arenaH; dx = -speed; dy = (Math.random()-0.5)*1.5; }
    else if (side === 2) { x = Math.random()*arenaW; y = arenaH+size; dx = (Math.random()-0.5)*1.5; dy = -speed; }
    else { x = -size; y = Math.random()*arenaH; dx = speed; dy = (Math.random()-0.5)*1.5; }

    var el = document.createElement('div');
    el.className = 'stimulus ' + shape;
    el.style.cssText = 'position:absolute;width:' + size + 'px;height:' + size + 'px;' +
        'left:' + x + 'px;top:' + y + 'px;' +
        'background:' + COLORS[color].hex + ';' +
        'cursor:pointer;transition:transform 0.06s;';
    el.dataset.color = color;
    el.dataset.shape = shape;
    el.dataset.x = x;
    el.dataset.y = y;
    el.dataset.dx = dx.toFixed(3);
    el.dataset.dy = dy.toFixed(3);
    el.dataset.id = CHOOSE_TARGET.spawned++;

    el.addEventListener('click', function(e) {
        e.stopPropagation();
        handleObjectClick(el, color, shape);
    });
    el.addEventListener('touchend', function(e) {
        e.preventDefault();
        e.stopPropagation();
        handleObjectClick(el, color, shape);
    }, { passive: false });

    document.getElementById('arena').appendChild(el);
    CHOOSE_TARGET.objects.push(el);
}

function moveObjects() {
    var arenaW = window.innerWidth;
    var arenaH = window.innerHeight;
    var toRemove = [];
    CHOOSE_TARGET.objects.forEach(function(el) {
        if (!el.parentNode) { toRemove.push(el); return; }
        var x = parseFloat(el.dataset.x) + parseFloat(el.dataset.dx);
        var y = parseFloat(el.dataset.y) + parseFloat(el.dataset.dy);
        el.dataset.x = x;
        el.dataset.y = y;
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
        var size = parseFloat(el.style.width);
        if (x < -size*2 || x > arenaW+size*2 || y < -size*2 || y > arenaH+size*2) {
            if (CHOOSE_TARGET.rule_color && CHOOSE_TARGET.rule_shape &&
                el.dataset.color === CHOOSE_TARGET.rule_color &&
                el.dataset.shape === CHOOSE_TARGET.rule_shape) {
                CHOOSE_TARGET.misses++;
            }
            el.remove();
            toRemove.push(el);
        }
    });
    CHOOSE_TARGET.objects = CHOOSE_TARGET.objects.filter(function(el) {
        return toRemove.indexOf(el) === -1;
    });
}

function handleObjectClick(el, color, shape) {
    if (!CHOOSE_TARGET.active) return;
    var sessionMs = Math.round(performance.now() - CHOOSE_TARGET.start_ts);

    if (CHOOSE_TARGET.rule_color === null) {
        // PRIMER CLICK — establece color + elemento
        CHOOSE_TARGET.rule_color = color;
        CHOOSE_TARGET.rule_shape = shape;
        CHOOSE_TARGET.rule_set_at = sessionMs;

        playTone(880, 0.12, 'sine');
        el.style.transform = 'scale(1.3)';
        CHOOSE_TARGET.hits++;
        CHOOSE_TARGET.score++;
        updateScore(CHOOSE_TARGET.score);
        setTimeout(function() { if (el.parentNode) el.remove(); }, 250);
        CHOOSE_TARGET.objects = CHOOSE_TARGET.objects.filter(function(o){ return o !== el; });
        if (typeof window.ZykosMediaAgent !== 'undefined') window.ZykosMediaAgent.reportGameEvent('hit');
    } else if (color === CHOOSE_TARGET.rule_color && shape === CHOOSE_TARGET.rule_shape) {
        // HIT exacto
        CHOOSE_TARGET.hits++;
        CHOOSE_TARGET.score++;
        updateScore(CHOOSE_TARGET.score);
        playTone(1100, 0.08, 'sine');
        el.style.transform = 'scale(1.25)';
        setTimeout(function() { if (el.parentNode) el.remove(); }, 250);
        CHOOSE_TARGET.objects = CHOOSE_TARGET.objects.filter(function(o){ return o !== el; });
        if (typeof window.ZykosMediaAgent !== 'undefined') window.ZykosMediaAgent.reportGameEvent('hit');
    } else if (color === CHOOSE_TARGET.rule_color || shape === CHOOSE_TARGET.rule_shape) {
        // PARCIAL — mismo color o misma forma pero no ambos
        CHOOSE_TARGET.wrong_clicks++;
        CHOOSE_TARGET.score = Math.max(0, CHOOSE_TARGET.score - 1);
        updateScore(CHOOSE_TARGET.score);
        playTone(380, 0.1, 'triangle');
        el.style.opacity = '0.3';
        setTimeout(function() { if (el.parentNode) el.remove(); }, 350);
        CHOOSE_TARGET.objects = CHOOSE_TARGET.objects.filter(function(o){ return o !== el; });
        if (typeof window.ZykosMediaAgent !== 'undefined') window.ZykosMediaAgent.reportGameEvent('error');
    } else {
        // ERROR total
        CHOOSE_TARGET.wrong_clicks++;
        CHOOSE_TARGET.score = Math.max(0, CHOOSE_TARGET.score - 2);
        updateScore(CHOOSE_TARGET.score);
        playTone(180, 0.14, 'sawtooth');
        el.style.opacity = '0.15';
        setTimeout(function() { if (el.parentNode) el.remove(); }, 300);
        CHOOSE_TARGET.objects = CHOOSE_TARGET.objects.filter(function(o){ return o !== el; });
        if (typeof window.ZykosMediaAgent !== 'undefined') window.ZykosMediaAgent.reportGameEvent('error');
    }
}

// ======================== END LEVEL ========================
function endLevel() {
    STATE.phase = 'results';
    clearInterval(STATE.timerInterval);
    clearTimeout(STATE.stimTimeout);
    clearTimeout(STATE.nextTimeout);

    var lv = LEVELS[STATE.level];
    var duration = (performance.now() - STATE.startTime) / 1000;

    // Beacon: llegamos al endLevel. Si esto aparece pero save_attempted no,
    // el problema esta entre endLevel y saveMetrics (mode branching, throw, etc)
    try {
        var dniE = window.ZYKOS_DNI || new URLSearchParams(location.search).get('dni');
        if (sb && dniE) {
            sb.from('zykos_game_metrics').insert({
                patient_dni: dniE,
                game_slug: 'reflejos',
                metric_type: 'level_completed_reached',
                metric_value: Math.round(duration),
                metric_data: {
                    level: lv.id, level_name: lv.name,
                    mode: lv.rules && lv.rules.mode,
                    duration_seconds: Math.round(duration),
                    n_stimuli_processed: (STATE.stimuli || []).length,
                    t: new Date().toISOString()
                }
            }).then(function(){}, function(){});
        }
    } catch (e) {}

    // Niveles 7 y 8 — métricas propias, no CPT
    var mode = lv.rules && lv.rules.mode;
    if (mode === 'car_rain' && STATE.carRainMetrics) {
        var m7 = STATE.carRainMetrics;
        var metrics7 = {
            level: lv.id, level_name: lv.name, mode: 'car_rain',
            // Dato afectivo/proyectivo: el color elegido como primer objeto
            chosen_color:       m7.chosen_color,
            rule_set_at_ms:     m7.rule_set_at_ms,
            // SDT simplificado
            hits:               m7.hits,
            errores_omision:    m7.misses,
            errores_comision:   m7.wrong_clicks,
            hit_rate:           m7.target_ratio,
            score:              m7.score,
            duration_seconds:   Math.round(duration),
            constructs:         lv.constructs
        };
        if (typeof ZykosBootstrap !== 'undefined' && ZykosBootstrap.isBooted()) {
            ZykosBootstrap.end().catch(function(e) { console.warn('[reflejos] bootstrap.end failed:', e && e.message); });
        }
        saveMetrics(metrics7).then(function(art) { showResults(metrics7, lv, art); });
        return;
    }
    if (mode === 'choose_target' && STATE.chooseTargetMetrics) {
        var m8 = STATE.chooseTargetMetrics;
        var metrics8 = {
            level: lv.id, level_name: lv.name, mode: 'choose_target',
            // Dato proyectivo + ejecutivo: qué dupla eligió y cuánto tardó
            chosen_color:       m8.chosen_color,
            chosen_shape:       m8.chosen_shape,
            rule_set_at_ms:     m8.rule_set_at_ms,
            hits:               m8.hits,
            errores_omision:    m8.misses,
            errores_comision:   m8.wrong_clicks,
            score:              m8.score,
            duration_seconds:   Math.round(duration),
            constructs:         lv.constructs
        };
        if (typeof ZykosBootstrap !== 'undefined' && ZykosBootstrap.isBooted()) {
            ZykosBootstrap.end().catch(function(e) { console.warn('[reflejos] bootstrap.end failed:', e && e.message); });
        }
        saveMetrics(metrics8).then(function(art) { showResults(metrics8, lv, art); });
        return;
    }

    var stims = STATE.stimuli;

    // === COMPUTE CLINICAL METRICS (CPT estándar niveles 1-6) ===
    var targets = stims.filter(function(s) { return s.isTarget; });
    var nonTargets = stims.filter(function(s) { return !s.isTarget; });
    
    var hits = targets.filter(function(s) { return s.correct; });
    var omissions = targets.filter(function(s) { return s.response === 'none'; });
    var commissions = nonTargets.filter(function(s) { return s.response !== 'none' && !s.correct; });
    var correctRejections = nonTargets.filter(function(s) { return s.correct; });
    
    var hitRate = targets.length > 0 ? hits.length / targets.length : 0;
    var falseAlarmRate = nonTargets.length > 0 ? commissions.length / nonTargets.length : 0;
    
    // Reaction times (only hits)
    var rts = hits.map(function(s) { return s.respondedAt - s.appearedAt; });
    var rtMean = rts.length > 0 ? rts.reduce(function(a,b){return a+b;},0) / rts.length : 0;
    var rtSD = 0;
    if (rts.length > 1) {
        var sqDiffs = rts.map(function(v) { return Math.pow(v - rtMean, 2); });
        rtSD = Math.sqrt(sqDiffs.reduce(function(a,b){return a+b;},0) / (rts.length - 1));
    }
    var rtCV = rtMean > 0 ? rtSD / rtMean : 0;
    
    // d-prime (Signal Detection Theory)
    // Corrección loglineal de Hautus (1995) — maneja hit rate = 1.0 y FAR = 0.0
    // Formula: HR_adj = (hits + 0.5) / (targets + 1)
    //          FAR_adj = (falseAlarms + 0.5) / (nonTargets + 1)
    // Esto evita z-scores infinitos sin el clipping arbitrario de la corrección simple
    var nTargets    = hits.length + omissions.length;
    var nNonTargets = nonTargets.length;
    var nHits       = hits.length;
    var nFA         = commissions.length;
    var adjHR  = nTargets    > 0 ? (nHits + 0.5) / (nTargets    + 1) : 0.5;
    var adjFAR = nNonTargets > 0 ? (nFA   + 0.5) / (nNonTargets + 1) : 0.5;
    var zHR  = normInv(adjHR);
    var zFAR = normInv(adjFAR);
    var dPrime   = zHR - zFAR;
    var criterion = -0.5 * (zHR + zFAR);
    
    // Vigilance decrement (1st half vs 2nd half RT)
    var firstHalfRTs = [], secondHalfRTs = [];
    hits.forEach(function(s) {
        var rt = s.respondedAt - s.appearedAt;
        if (s.index < STATE.halfwayIndex) firstHalfRTs.push(rt);
        else secondHalfRTs.push(rt);
    });
    var rt1H = firstHalfRTs.length > 0 ? firstHalfRTs.reduce(function(a,b){return a+b;},0)/firstHalfRTs.length : 0;
    var rt2H = secondHalfRTs.length > 0 ? secondHalfRTs.reduce(function(a,b){return a+b;},0)/secondHalfRTs.length : 0;
    var vigilanceDecrement = rt1H > 0 ? rt2H / rt1H : 1;
    
    // Perseverations (same response repeated rapidly < 150ms)
    var perseverations = 0;
    for (var i = 1; i < stims.length; i++) {
        if (stims[i].respondedAt && stims[i-1].respondedAt) {
            if (stims[i].respondedAt - stims[i-1].respondedAt < 150) perseverations++;
        }
    }
    
    // Motor metrics: precision_deposito y jitter
    var clickDistances = stims.filter(function(s) { return s.clickDistance !== undefined; }).map(function(s) { return s.clickDistance; });
    var meanDismetria = clickDistances.length > 0 ? clickDistances.reduce(function(a,b){return a+b;},0) / clickDistances.length : 0;
    var precisionSD = 0;
    if (clickDistances.length > 1) {
        var dSqDiffs = clickDistances.map(function(v) { return Math.pow(v - meanDismetria, 2); });
        precisionSD = Math.sqrt(dSqDiffs.reduce(function(a,b){return a+b;},0) / (clickDistances.length - 1));
    }
    var jitterIndex = meanDismetria > 0 ? precisionSD / meanDismetria : 0; // CV of click precision
    
    // Path efficiency: for double-clicks, measure time between clicks
    var doubleClickTimes = stims.filter(function(s) { return s.response === 'double' && s.correct; }).map(function(s) { return s.respondedAt - s.appearedAt; });
    var avgDoubleClickTime = doubleClickTimes.length > 0 ? doubleClickTimes.reduce(function(a,b){return a+b;},0) / doubleClickTimes.length : 0;
    
    // Lateralization differential (for level 3+)
    var leftRTs = stims.filter(function(s) { return s.response === 'left' && s.correct; }).map(function(s) { return s.respondedAt - s.appearedAt; });
    var rightRTs = stims.filter(function(s) { return s.response === 'right' && s.correct; }).map(function(s) { return s.respondedAt - s.appearedAt; });
    var rtLeft = leftRTs.length > 0 ? leftRTs.reduce(function(a,b){return a+b;},0)/leftRTs.length : 0;
    var rtRight = rightRTs.length > 0 ? rightRTs.reduce(function(a,b){return a+b;},0)/rightRTs.length : 0;
    var lateralDiff = rtLeft > 0 && rtRight > 0 ? Math.abs(rtLeft - rtRight) : 0;

    var metrics = {
        level: lv.id, level_name: lv.name,
        total_stimuli: stims.length, target_count: targets.length, nontarget_count: nonTargets.length,
        hits: hits.length, omissions: omissions.length, commissions: commissions.length,
        correct_rejections: correctRejections.length,
        hit_rate: Math.round(hitRate * 1000) / 1000,
        false_alarm_rate: Math.round(falseAlarmRate * 1000) / 1000,
        d_prime: Math.round(dPrime * 100) / 100,
        criterion: Math.round(criterion * 100) / 100,
        rt_mean_ms: Math.round(rtMean),
        rt_sd_ms: Math.round(rtSD),
        rt_cv: Math.round(rtCV * 1000) / 1000,
        rt_1st_half_ms: Math.round(rt1H),
        rt_2nd_half_ms: Math.round(rt2H),
        vigilance_decrement: Math.round(vigilanceDecrement * 100) / 100,
        perseverations: perseverations,
        score: STATE.score,
        duration_seconds: Math.round(duration),
        precision_deposito_px: Math.round(meanDismetria * 10) / 10,
        precision_deposito_sd_px: Math.round(precisionSD * 10) / 10,
        jitter_reposo_px: Math.round(jitterIndex * 1000) / 1000,
        avg_double_click_ms: Math.round(avgDoubleClickTime),
        rt_left_ms: Math.round(rtLeft),
        rt_right_ms: Math.round(rtRight),
        lateral_differential_ms: Math.round(lateralDiff),
        constructs: lv.constructs
    };

    // Metricas de alternancia (solo nivel 3 Alternancia Azul-Rojo)
    if (lv.rules && lv.rules.alternation) {
        var validAlt = stims.filter(function(s){ return s.response !== null; });
        var alternateEvents = validAlt.filter(function(s){ return s.alternationRole === 'alternate'; }).length;
        var breakEvents = validAlt.filter(function(s){ return s.alternationRole === 'break'; }).length;
        var totalDecisions = alternateEvents + breakEvents; // excluye el primer click
        metrics.alternancia_breaks_count = breakEvents;
        metrics.alternancia_correct_pct = totalDecisions > 0 ? Math.round((alternateEvents / totalDecisions) * 1000) / 10 : null;
        metrics.alternancia_first_color = STATE.alternationFirstColor;
        // Perseveracion: breaks seguidos son perseveracion motora por color
        metrics.perseveracion_count_alt = breakEvents;
        // NO sobreescribimos metrics.commissions/omissions pre-existentes.
        // Registramos tambien como comisiones adicionales para el umbral Art XIII.
        metrics.errores_comision = (metrics.errores_comision || metrics.commissions || 0) + breakEvents;
    }

    // V4 wiring: cierra ZYKOS engine + corsario (escribe session_biomet + flush raw_stream)
    if (typeof ZykosBootstrap !== 'undefined' && ZykosBootstrap.isBooted()) {
        ZykosBootstrap.end().catch(function(e) { console.warn('[reflejos] bootstrap.end failed:', e && e.message); });
    }
    // Save to Supabase y aplicar regla Art XIII
    saveMetrics(metrics).then(function(art) { showResults(metrics, lv, art); });
}

// ======================== SAVE METRICS ========================
async function saveMetrics(metrics) {
    var artXiiiResult = null;
    var saveStartMs = performance.now();
    var dni = window.ZYKOS_DNI || new URLSearchParams(location.search).get('dni');

    // Beacon: intento de guardar, con el contexto exacto del guard.
    // Si el save aborta, queda la huella de por que.
    function saveBeacon(stage, extra) {
        try {
            if (sb && dni) {
                sb.from('zykos_game_metrics').insert({
                    patient_dni: dni,
                    game_slug: 'reflejos',
                    metric_type: 'save_' + stage,
                    metric_value: null,
                    metric_data: Object.assign({
                        level: metrics && metrics.level,
                        t: new Date().toISOString(),
                        elapsed_ms: Math.round(performance.now() - saveStartMs)
                    }, extra || {})
                }).then(function(){}, function(){});
            }
        } catch (e) { /* silent */ }
    }

    saveBeacon('attempted', { has_sb: !!sb, has_dni: !!dni });

    if (!sb) {
        console.warn('[reflejos] saveMetrics: sb is null, aborting save');
        saveBeacon('aborted', { reason: 'sb_null' });
        return artXiiiResult;
    }
    if (!dni) {
        console.warn('[reflejos] saveMetrics: no dni available, aborting save');
        saveBeacon('aborted', { reason: 'no_dni' });
        return artXiiiResult;
    }

    try {
        // DNI-NO-ID (audit #114): no usamos user_id. DNI unica identificacion.

        // Inyectar consigna_read_time_ms si esta disponible
        if (STATE.consignaReadTimeMs && metrics) {
            metrics.consigna_read_time_ms = STATE.consignaReadTimeMs;
        }

        var payload = {
            patient_dni: dni,
            game_slug: GAME_SLUG,
            metric_type: 'session_summary',
            metric_data: metrics
        };

        if (typeof ZykosEvidence !== 'undefined') {
            try {
                payload = await ZykosEvidence.prepare(payload);
            } catch (evErr) {
                console.warn('[reflejos] ZykosEvidence.prepare failed:', evErr && evErr.message);
                saveBeacon('evidence_prepare_failed', { error: (evErr && evErr.message) || 'unknown' });
                // Continuamos sin evidence hash antes que perder el save
            }
        }

        var ins1 = await sb.from('zykos_game_metrics').insert(payload);
        if (ins1 && ins1.error) {
            console.error('[reflejos] summary insert error:', ins1.error);
            saveBeacon('summary_insert_failed', { error: ins1.error.message });
            // Seguimos intentando trial_data y art XIII
        } else {
            saveBeacon('summary_succeeded', {});
        }

        // Save individual trial data for deep analysis
        var ins2 = await sb.from('zykos_game_metrics').insert({
            patient_dni: dni,
            game_slug: GAME_SLUG,
            metric_type: 'trial_data_level_' + metrics.level,
            metric_data: { trials: STATE.stimuli.map(function(s) {
                return { i:s.index, c:s.color, sh:s.shape, act:s.action, rt:s.respondedAt?Math.round(s.respondedAt-s.appearedAt):null, resp:s.response, ok:s.correct, sz:s.size, audio:s.audioSignal, dist:s.clickDistance||null, offX:s.clickOffsetX||0, offY:s.clickOffsetY||0, altRole:s.alternationRole||null };
            })}
        });
        if (ins2 && ins2.error) {
            saveBeacon('trial_data_failed', { error: ins2.error.message });
        }

        // Art XIII — registrar intento canonico.
        var nErrors  = (metrics.omissions || metrics.errores_omision || 0) + (metrics.commissions || metrics.errores_comision || 0);
        var nActions = metrics.total_stimuli || (metrics.hits + (metrics.omissions||0) + (metrics.commissions||0) + (metrics.correct_rejections||0)) || 0;
        var completed = nActions > 0;
        var r = await sb.rpc('zykos_register_level_attempt', {
            p_dni: dni, p_game_slug: GAME_SLUG, p_level: metrics.level,
            p_completed: completed, p_n_errors: nErrors, p_n_actions: nActions
        });
        if (r.error) {
            console.warn('[reflejos] register_level_attempt error:', r.error.message);
            saveBeacon('art_xiii_failed', { error: r.error.message });
        } else {
            artXiiiResult = r.data;
            saveBeacon('completed', { art_xiii_passed: r.data && r.data.passed });
        }

        // Alerta: 3 intentos consecutivos fallidos.
        // Por ahora solo loguea; la Edge Function zykos-stuck-alert queda pendiente (audit id=92).
        if (artXiiiResult && artXiiiResult.should_send_alert) {
            console.warn('[reflejos] Art XIII alert:', artXiiiResult.alert_reason);
        }
    } catch(e) {
        console.error('[reflejos] Save error:', e);
        saveBeacon('exception', { error: e && e.message, stack: e && e.stack && e.stack.substring(0, 400) });
    }

    // ROKOLA wiring (audit #115): notificar al shell padre
    try {
      if (typeof RokolaClient !== 'undefined' && RokolaClient.isInsideRokola()) {
        RokolaClient.notifyCompleted({
          completed: (metrics && (metrics.total_stimuli || 0) > 0),
          score: (metrics && metrics.score) || 0,
          level: metrics && metrics.level
        });
      }
    } catch(e) { console.warn('[reflejos] RokolaClient.notifyCompleted:', e && e.message); }

    return artXiiiResult;
}

// ======================== SHOW RESULTS ========================
function showResults(m, lv, artXiii) {
    // Art XIII: si el backend respondio, su veredicto manda (umbral canonico 0.49).
    // Si no hay respuesta (RPC sin DNI, offline, etc.), fallback al umbral legacy interno.
    var passed;
    if (artXiii && typeof artXiii.passed === 'boolean') {
        passed = artXiii.passed;
    } else {
        passed = m.hit_rate >= 0.6 && m.commissions <= m.total_stimuli * 0.3;
    }
    // hasNext ahora solo es true si hay siguiente nivel segun la secuencia canonica.
    // El backend informa next_level; si no hay, es el nivel final.
    var hasNext = artXiii ? (artXiii.next_level != null && !artXiii.is_final_level) : (STATE.level < LEVELS.length - 1);
    // Guardar next_level canonico en STATE para que nextLevel() lo use.
    STATE.nextLevelId = (artXiii && artXiii.next_level != null) ? artXiii.next_level : null;
    STATE.isFinalLevel = artXiii ? !!artXiii.is_final_level : false;
    
    var rtClass = m.rt_mean_ms < 400 ? 'good' : m.rt_mean_ms < 600 ? 'warn' : 'bad';
    var hrClass = m.hit_rate >= 0.8 ? 'good' : m.hit_rate >= 0.6 ? 'warn' : 'bad';
    var dpClass = m.d_prime >= 2 ? 'good' : m.d_prime >= 1 ? 'warn' : 'bad';
    var vigClass = m.vigilance_decrement <= 1.1 ? 'good' : m.vigilance_decrement <= 1.3 ? 'warn' : 'bad';
    
    var html = '<h1>' + (passed ? 'Nivel Completado' : 'Nivel Finalizado') + '</h1>' +
        '<h2>' + lv.name + '</h2>' +
        '<div class="metrics-grid">' +
        '<div class="metric-card ' + hrClass + '"><div class="mv">' + Math.round(m.hit_rate*100) + '%</div><div class="ml">Aciertos</div></div>' +
        '<div class="metric-card ' + rtClass + '"><div class="mv">' + m.rt_mean_ms + '</div><div class="ml">RT medio (ms)</div></div>' +
        '<div class="metric-card ' + dpClass + '"><div class="mv">' + m.d_prime + '</div><div class="ml">d\' (discriminabilidad)</div></div>' +
        '<div class="metric-card"><div class="mv">' + m.omissions + '</div><div class="ml">Omisiones</div></div>' +
        '<div class="metric-card"><div class="mv">' + m.commissions + '</div><div class="ml">Comisiones</div></div>' +
        '<div class="metric-card ' + vigClass + '"><div class="mv">' + m.vigilance_decrement + '</div><div class="ml">Decaimiento</div></div>' +
        '<div class="metric-card"><div class="mv">' + m.rt_cv + '</div><div class="ml">Variabilidad RT</div></div>' +
        '<div class="metric-card"><div class="mv">' + m.perseverations + '</div><div class="ml">Perseveraciones</div></div>' +
        '<div class="metric-card"><div class="mv">' + m.score + '</div><div class="ml">Puntuación</div></div>' +
        '<div class="metric-card"><div class="mv">' + m.precision_deposito_px + '</div><div class="ml">Precisión depósito (px)</div></div>' +
        '<div class="metric-card"><div class="mv">' + m.jitter_reposo_px + '</div><div class="ml">Jitter reposo</div></div>' +
        (m.lateral_differential_ms > 0 ? '<div class="metric-card"><div class="mv">' + m.lateral_differential_ms + '</div><div class="ml">Dif. Lateral (ms)</div></div>' : '') +
        '</div>' +
        '<div style="display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap">' +
        '<button class="btn btn-secondary btn-sm" onclick="retryLevel()">Reintentar</button>';
    
    if (passed && hasNext) {
        html += '<button class="btn btn-primary btn-sm" onclick="nextLevel()">Siguiente Nivel →</button>';
    }
    
    html += '<button class="btn btn-secondary btn-sm" onclick="exitGame()">Salir</button></div>';
    
    document.getElementById('results-card').innerHTML = html;
    document.getElementById('results-screen').style.display = 'flex';
}

function retryLevel() {
    document.getElementById('results-screen').style.display = 'none';
    // Clean arena
    var arena = document.getElementById('arena');
    var stims = arena.querySelectorAll('.stimulus');
    stims.forEach(function(s) { s.remove(); });
    startLevel();
}

function nextLevel() {
    // Bloqueo demo: no pasar del nivel máximo permitido
    if (window._DEMO_MAX_LEVEL && STATE.level + 1 >= window._DEMO_MAX_LEVEL) {
        window.location.href = window._DEMO_RETURN || '/demo/';
        return;
    }
    document.getElementById('results-screen').style.display = 'none';
    var arena = document.getElementById('arena');
    var stims = arena.querySelectorAll('.stimulus');
    stims.forEach(function(s) { s.remove(); });
    // Art XIII: si hay next_level canonico del backend, saltar a ese id (respetando saltos declarados en zykos_level_sequences).
    // Fallback: incremento lineal del indice en LEVELS[].
    if (STATE.nextLevelId != null) {
        var targetIdx = -1;
        for (var i = 0; i < LEVELS.length; i++) {
            if (LEVELS[i].id === STATE.nextLevelId) { targetIdx = i; break; }
        }
        if (targetIdx >= 0) { STATE.level = targetIdx; }
        else { STATE.level++; }
    } else {
        STATE.level++;
    }
    startLevel();
}

function exitGame() {
    window.location.href = '/games/portal/';
}

// ======================== NORMAL INVERSE (z-score) ========================
function normInv(p) {
    // Rational approximation for normal inverse CDF
    if (p <= 0) return -4; if (p >= 1) return 4;
    if (p < 0.5) return -normInv(1 - p);
    var t = Math.sqrt(-2 * Math.log(1 - p));
    var c0 = 2.515517, c1 = 0.802853, c2 = 0.010328;
    var d1 = 1.432788, d2 = 0.189269, d3 = 0.001308;
    return t - (c0 + c1*t + c2*t*t) / (1 + d1*t + d2*t*t + d3*t*t*t);
}
