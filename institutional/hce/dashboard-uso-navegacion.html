<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uso y Navegación - Portal HDD</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #262626;
      --text: #fafafa;
      --muted: #a1a1a1;
      --primary: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
      min-height: 100vh;
    }
    
    .header {
      margin-bottom: 2rem;
    }
    
    .header h1 {
      font-size: 2rem;
      margin-bottom: .5rem;
    }
    
    .header p {
      color: var(--muted);
      font-size: .95rem;
    }
    
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .section-title {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      color: #fff;
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .metric-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
    }
    
    .metric-label {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    
    .metric-value {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: .3rem;
    }
    
    .metric-detail {
      font-size: .75rem;
      color: var(--muted);
    }
    
    .table-wrapper {
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    
    thead {
      border-bottom: 1px solid var(--border);
    }
    
    th {
      padding: .8rem;
      text-align: left;
      color: var(--muted);
      font-weight: 500;
    }
    
    td {
      padding: .8rem;
      border-bottom: 1px solid var(--border);
    }
    
    .timeline-item {
      padding: .8rem;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }
    
    .timeline-item:last-child {
      border-bottom: none;
    }
    
    .timeline-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: .3rem;
    }
    
    .timeline-type {
      font-weight: 600;
    }
    
    .timeline-time {
      color: var(--muted);
      font-size: .75rem;
    }
    
    .timeline-detail {
      color: var(--muted);
      font-size: .75rem;
    }
    
    .heatmap {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: .5rem;
      margin-top: 1rem;
    }
    
    .heatmap-cell {
      aspect-ratio: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      cursor: pointer;
      transition: all .2s;
    }
    
    .heatmap-cell:hover {
      border-color: var(--primary);
      transform: scale(1.05);
    }
    
    .heatmap-cell.active {
      background: var(--primary);
      border-color: var(--primary);
    }
    
    .badge {
      display: inline-block;
      padding: .25rem .5rem;
      border-radius: 4px;
      font-size: .7rem;
      font-weight: 500;
    }
    
    .badge-success { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .badge-warning { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .badge-danger { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    
    .sequence-visual {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: .5rem;
      margin-top: 1rem;
    }
    
    .sequence-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .5rem;
      text-align: center;
      font-size: .7rem;
    }
    
    .sequence-box .day-name {
      color: var(--muted);
      font-size: .65rem;
      margin-bottom: .25rem;
    }
    
    .sequence-box .period {
      margin: .25rem 0;
      font-size: .6rem;
    }
    
    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin: 0 1px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Uso y Navegación del Portal</h1>
  <p>Patrones temporales, preferencias de acceso y estrategias de organización</p>
</div>

<div id="patient-selector" class="section">
  <div class="section-title">Seleccionar Paciente</div>
  <select id="patient-select" style="width: 100%; padding: .75rem; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; font-size: .95rem;">
    <option value="">Cargando pacientes...</option>
  </select>
</div>

<div id="content" style="display: none;">
  
  <!-- PATRÓN DE USO DEL PORTAL -->
  <div class="section">
    <div class="section-title">Patrón de Uso del Portal</div>
    <div class="metrics-grid" id="login-metrics"></div>
    <div id="temporal-heatmap"></div>
  </div>
  
  <!-- PROGRESO EN JUEGOS -->
  <div class="section">
    <div class="section-title">Progreso y Preferencias en Juegos</div>
    <div class="table-wrapper" id="game-progress-table"></div>
  </div>
  
  <!-- PATRÓN DE SECUENCIA (PILL-ORGANIZER) -->
  <div class="section">
    <div class="section-title">Patrón de Secuencia en Medicación (Pill-Organizer)</div>
    <div id="sequence-analysis"></div>
    <div id="sequence-visual"></div>
  </div>
  
  <!-- REGISTRO DE INTERACCIONES -->
  <div class="section">
    <div class="section-title">Registro de Interacciones (Últimas 20)</div>
    <div id="interactions-timeline"></div>
  </div>
  
</div>

<script type="module">
import { getSupabaseClient } from '/js/supabase-config.js';

let supabaseClient = null;
let currentPatientDni = null;

document.addEventListener('DOMContentLoaded', async () => {
  supabaseClient = getSupabaseClient();
  await loadPatients();
  
  document.getElementById('patient-select').addEventListener('change', async (e) => {
    currentPatientDni = e.target.value;
    if (currentPatientDni) {
      await loadPatientData(currentPatientDni);
      document.getElementById('content').style.display = 'block';
    } else {
      document.getElementById('content').style.display = 'none';
    }
  });
});

// CARGAR LISTA DE PACIENTES
async function loadPatients() {
  const { data: patients, error } = await supabaseClient
    .from('hdd_patients')
    .select('dni, full_name')
    .eq('status', 'active')
    .order('full_name');
  
  if (error) {
    console.error('Error loading patients:', error);
    return;
  }
  
  const select = document.getElementById('patient-select');
  select.innerHTML = '<option value="">Seleccionar paciente...</option>';
  patients.forEach(p => {
    const option = document.createElement('option');
    option.value = p.dni;
    option.textContent = `${p.full_name} (${p.dni})`;
    select.appendChild(option);
  });
}

// CARGAR DATOS DEL PACIENTE
async function loadPatientData(patientDni) {
  const { data: patient } = await supabaseClient
    .from('hdd_patients')
    .select('id')
    .eq('dni', patientDni)
    .single();
  
  if (!patient) return;
  
  const patientId = patient.id;
  
  // Login tracking
  const { data: logins } = await supabaseClient
    .from('hdd_login_tracking')
    .select('*')
    .eq('patient_id', patientId)
    .order('login_at', { ascending: false })
    .limit(30);
  
  // Game progress
  const { data: progress } = await supabaseClient
    .from('hdd_game_progress')
    .select('*, hdd_games(name, slug)')
    .eq('patient_id', patientId);
  
  // Interaction log
  const { data: interactions } = await supabaseClient
    .from('hdd_interaction_log')
    .select('*')
    .eq('patient_id', patientId)
    .order('created_at', { ascending: false })
    .limit(20);
  
  // Game metrics para secuencia pill-organizer
  const { data: pillMetrics } = await supabaseClient
    .from('hdd_game_metrics')
    .select('*')
    .eq('patient_dni', patientDni)
    .eq('game_slug', 'pill-organizer')
    .order('session_date', { ascending: false });
  
  renderLoginMetrics(logins || []);
  renderGameProgressTable(progress || []);
  renderSequenceAnalysis(pillMetrics || []);
  renderInteractionsTimeline(interactions || []);
}

// RENDERIZAR MÉTRICAS DE LOGIN
function renderLoginMetrics(logins) {
  const analysis = analyzeLoginPattern(logins);
  
  const html = `
    <div class="metric-card">
      <div class="metric-label">Total Sesiones</div>
      <div class="metric-value">${logins.length}</div>
      <div class="metric-detail">Últimas 30 registradas</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Duración Promedio</div>
      <div class="metric-value">${analysis.avgDuration} min</div>
      <div class="metric-detail">Por sesión</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Horario Preferido</div>
      <div class="metric-value">${analysis.preferredTimeRange}</div>
      <div class="metric-detail">${analysis.timeRangePercentage}% de ingresos</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Día Preferido</div>
      <div class="metric-value">${analysis.preferredDay}</div>
      <div class="metric-detail">${analysis.dayPercentage}% de ingresos</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Consistencia</div>
      <div class="metric-value">${(analysis.consistency * 100).toFixed(0)}%</div>
      <div class="metric-detail"><span class="badge ${analysis.consistency > 0.7 ? 'badge-success' : analysis.consistency > 0.4 ? 'badge-warning' : 'badge-danger'}">${analysis.consistency > 0.7 ? 'Alta' : analysis.consistency > 0.4 ? 'Media' : 'Baja'}</span></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Último Ingreso</div>
      <div class="metric-value">${analysis.lastLogin}</div>
      <div class="metric-detail">Hace ${analysis.daysSinceLastLogin} días</div>
    </div>
  `;
  
  document.getElementById('login-metrics').innerHTML = html;
  
  // Heatmap temporal
  renderTemporalHeatmap(logins);
}

// ANALIZAR PATRÓN DE LOGIN
function analyzeLoginPattern(logins) {
  if (!logins || logins.length === 0) {
    return {
      avgDuration: 0,
      preferredTimeRange: 'Sin datos',
      timeRangePercentage: 0,
      preferredDay: 'Sin datos',
      dayPercentage: 0,
      consistency: 0,
      lastLogin: 'Nunca',
      daysSinceLastLogin: 999
    };
  }
  
  // Duración promedio
  const durations = logins.filter(l => l.session_duration_minutes).map(l => l.session_duration_minutes);
  const avgDuration = durations.length > 0 ? Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) : 0;
  
  // Horario preferido
  const timeRanges = { mañana: 0, tarde: 0, noche: 0, madrugada: 0 };
  logins.forEach(l => {
    const hour = new Date(l.login_at).getHours();
    if (hour >= 6 && hour < 12) timeRanges.mañana++;
    else if (hour >= 12 && hour < 18) timeRanges.tarde++;
    else if (hour >= 18 && hour < 24) timeRanges.noche++;
    else timeRanges.madrugada++;
  });
  const preferredTimeRange = Object.keys(timeRanges).reduce((a, b) => timeRanges[a] > timeRanges[b] ? a : b);
  const timeRangePercentage = Math.round((timeRanges[preferredTimeRange] / logins.length) * 100);
  
  // Día preferido
  const days = { lun: 0, mar: 0, mie: 0, jue: 0, vie: 0, sab: 0, dom: 0 };
  const dayNames = ['dom', 'lun', 'mar', 'mie', 'jue', 'vie', 'sab'];
  logins.forEach(l => {
    const dayIndex = new Date(l.login_at).getDay();
    days[dayNames[dayIndex]]++;
  });
  const preferredDay = Object.keys(days).reduce((a, b) => days[a] > days[b] ? a : b);
  const dayPercentage = Math.round((days[preferredDay] / logins.length) * 100);
  
  // Consistencia (desviación estándar de intervalos entre logins)
  const intervals = [];
  for (let i = 1; i < Math.min(logins.length, 10); i++) {
    const diff = (new Date(logins[i-1].login_at) - new Date(logins[i].login_at)) / (1000 * 60 * 60 * 24);
    intervals.push(diff);
  }
  const avgInterval = intervals.length > 0 ? intervals.reduce((a, b) => a + b, 0) / intervals.length : 0;
  const variance = intervals.length > 0 ? intervals.reduce((sum, val) => sum + Math.pow(val - avgInterval, 2), 0) / intervals.length : 0;
  const consistency = avgInterval > 0 ? Math.max(0, 1 - (Math.sqrt(variance) / avgInterval)) : 0;
  
  // Último login
  const lastLoginDate = new Date(logins[0].login_at);
  const daysSince = Math.floor((new Date() - lastLoginDate) / (1000 * 60 * 60 * 24));
  
  return {
    avgDuration,
    preferredTimeRange,
    timeRangePercentage,
    preferredDay,
    dayPercentage,
    consistency,
    lastLogin: lastLoginDate.toLocaleDateString('es-AR'),
    daysSinceLastLogin: daysSince
  };
}

// RENDERIZAR HEATMAP TEMPORAL
function renderTemporalHeatmap(logins) {
  const dayNames = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
  const dayCounts = [0, 0, 0, 0, 0, 0, 0];
  
  logins.forEach(l => {
    const dayIndex = new Date(l.login_at).getDay();
    const mappedIndex = dayIndex === 0 ? 6 : dayIndex - 1; // DOM=6, LUN=0
    dayCounts[mappedIndex]++;
  });
  
  const maxCount = Math.max(...dayCounts);
  
  const html = `
    <div style="margin-top: 1.5rem;">
      <div style="font-size: .9rem; margin-bottom: .5rem; color: var(--muted);">Distribución Semanal</div>
      <div class="heatmap">
        ${dayNames.map((day, i) => `
          <div class="heatmap-cell ${dayCounts[i] === maxCount && maxCount > 0 ? 'active' : ''}" title="${day}: ${dayCounts[i]} ingresos">
            <div>
              <div style="font-size: .65rem; color: var(--muted);">${day}</div>
              <div style="font-weight: 600; margin-top: .25rem;">${dayCounts[i]}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  
  document.getElementById('temporal-heatmap').innerHTML = html;
}

// RENDERIZAR TABLA DE PROGRESO EN JUEGOS
function renderGameProgressTable(progress) {
  if (progress.length === 0) {
    document.getElementById('game-progress-table').innerHTML = '<div style="color: var(--muted); padding: 1rem;">Sin progreso en juegos</div>';
    return;
  }
  
  const html = `
    <table>
      <thead>
        <tr>
          <th>Juego</th>
          <th>Sesiones</th>
          <th>Tiempo Total</th>
          <th>Mejor Score</th>
          <th>Score Promedio</th>
          <th>Última Vez</th>
        </tr>
      </thead>
      <tbody>
        ${progress.map(p => `
          <tr>
            <td><strong>${p.hdd_games?.name || 'Desconocido'}</strong></td>
            <td>${p.total_sessions || 0}</td>
            <td>${Math.round((p.total_time_seconds || 0) / 60)} min</td>
            <td>${p.best_score || 0}</td>
            <td>${p.average_score ? p.average_score.toFixed(1) : '0'}</td>
            <td><span style="color: var(--muted); font-size: .8rem;">${p.last_played_at ? new Date(p.last_played_at).toLocaleDateString('es-AR') : 'Nunca'}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  
  document.getElementById('game-progress-table').innerHTML = html;
}

// RENDERIZAR ANÁLISIS DE SECUENCIA
function renderSequenceAnalysis(pillMetrics) {
  const analysis = analyzeSequencePattern(pillMetrics);
  
  const html = `
    <div style="background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.3); border-radius: 6px; padding: 1rem; margin-bottom: 1rem;">
      <strong>Marco Clínico (Luria/Lezak):</strong> ${analysis.description}
    </div>
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Estrategia Detectada</div>
        <div class="metric-value" style="font-size: 1.25rem;">${analysis.strategy}</div>
        <div class="metric-detail">${analysis.strategyLabel}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Consistencia</div>
        <div class="metric-value">${analysis.consistency}%</div>
        <div class="metric-detail"><span class="badge ${analysis.consistency > 80 ? 'badge-warning' : analysis.consistency > 50 ? 'badge-success' : 'badge-danger'}">${analysis.consistencyLabel}</span></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Cambios de Estrategia</div>
        <div class="metric-value">${analysis.switches}</div>
        <div class="metric-detail">${analysis.switchesLabel}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Sesiones Analizadas</div>
        <div class="metric-value">${pillMetrics.length}</div>
        <div class="metric-detail">Pill-organizer</div>
      </div>
    </div>
  `;
  
  document.getElementById('sequence-analysis').innerHTML = html;
  
  // Visualización de secuencia (última sesión)
  if (pillMetrics.length > 0 && pillMetrics[0].metric_data) {
    renderSequenceVisualization(pillMetrics[0].metric_data);
  }
}

// ANALIZAR PATRÓN DE SECUENCIA
function analyzeSequencePattern(pillMetrics) {
  if (pillMetrics.length === 0) {
    return {
      strategy: 'Sin datos',
      strategyLabel: 'No hay sesiones de pill-organizer',
      consistency: 0,
      consistencyLabel: 'N/A',
      switches: 0,
      switchesLabel: 'N/A',
      description: 'No se detectaron sesiones del juego Organizador de Medicación.'
    };
  }
  
  // TODO: Implementar análisis real de secuencia cuando tengamos movimientos individuales
  // Por ahora retornamos análisis básico
  
  return {
    strategy: 'Análisis pendiente',
    strategyLabel: 'Requiere datos de movimientos individuales',
    consistency: 0,
    consistencyLabel: 'Requiere implementación',
    switches: 0,
    switchesLabel: 'Requiere implementación',
    description: 'El análisis de estrategia (medicamento completo vs. horario completo vs. mixto) requiere captura de movimientos individuales (from_compartment/to_compartment) que actualmente no están siendo guardados en metric_data.'
  };
}

// RENDERIZAR VISUALIZACIÓN DE SECUENCIA
function renderSequenceVisualization(metricData) {
  // TODO: Implementar visualización cuando tengamos datos reales
  document.getElementById('sequence-visual').innerHTML = `
    <div style="color: var(--muted); padding: 1rem; text-align: center;">
      Visualización de secuencia pendiente de implementación
    </div>
  `;
}

// RENDERIZAR TIMELINE DE INTERACCIONES
function renderInteractionsTimeline(interactions) {
  if (interactions.length === 0) {
    document.getElementById('interactions-timeline').innerHTML = '<div style="color: var(--muted); padding: 1rem;">Sin interacciones registradas</div>';
    return;
  }
  
  const html = interactions.map(i => `
    <div class="timeline-item">
      <div class="timeline-header">
        <div class="timeline-type">${i.interaction_type}</div>
        <div class="timeline-time">${new Date(i.created_at).toLocaleString('es-AR')}</div>
      </div>
      ${i.details ? `<div class="timeline-detail">${JSON.stringify(i.details).substring(0, 100)}...</div>` : ''}
    </div>
  `).join('');
  
  document.getElementById('interactions-timeline').innerHTML = html;
}

</script>

</body>
</html>
