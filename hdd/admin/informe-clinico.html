<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe Clinico - ZYKOS GAMER</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1e;--sf:#111827;--sf2:#1a2234;--bd:rgba(255,255,255,.08);--tx:#e2e8f0;--mt:rgba(255,255,255,.4);--ac:#60a5fa;--gn:#34d399;--yl:#fbbf24;--rd:#f87171;--pp:#a78bfa;--or:#fb923c}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.hd{background:var(--sf);border-bottom:1px solid var(--bd);padding:.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.hd h1{font-size:1rem;color:var(--tx);font-weight:600}
.bk{color:var(--mt);text-decoration:none;font-size:.8rem;padding:.4rem .8rem;border:1px solid var(--bd);border-radius:6px}
.mn{max-width:1300px;margin:0 auto;padding:1.25rem}
select{background:var(--sf2);color:var(--tx);border:1px solid var(--bd);padding:.5rem .8rem;border-radius:6px;font-size:.85rem;min-width:260px}
.empty{text-align:center;padding:2.5rem;color:var(--mt);font-size:.9rem}
.composites{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.8rem;margin-bottom:1.25rem}
.comp{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:1rem;cursor:pointer;transition:border-color .2s}
.comp:hover{border-color:rgba(255,255,255,.15)}
.comp .domain{font-size:.65rem;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem}
.comp .tscore{font-size:1.8rem;font-weight:700;line-height:1}
.comp .label{font-size:.7rem;margin-top:.3rem;font-weight:500}
.comp .trend{font-size:.65rem;color:var(--mt);margin-top:.15rem}
.comp .bar{height:4px;background:var(--sf2);border-radius:2px;margin-top:.4rem;overflow:hidden}
.comp .bar-fill{height:100%;border-radius:2px}
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:10px;margin-bottom:.8rem;overflow:hidden}
.sec-hd{padding:.8rem 1.2rem;display:flex;align-items:center;gap:.6rem;cursor:pointer;user-select:none}
.sec-hd:hover{background:rgba(255,255,255,.015)}
.sec-hd h2{font-size:.88rem;flex:1;font-weight:600}
.sec-hd .arr{color:var(--mt);font-size:.6rem;transition:transform .2s}
.sec.open .sec-hd .arr{transform:rotate(180deg)}
.sec-bd{max-height:0;overflow:hidden;transition:max-height .4s ease}
.sec.open .sec-bd{max-height:20000px}
.sub{padding:1rem 1.2rem;border-top:1px solid var(--bd)}
.sub h3{font-size:.7rem;color:var(--mt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.6rem}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.5rem}
.mc{background:var(--sf2);border:1px solid var(--bd);border-radius:5px;padding:.6rem;position:relative}
.mc .l{font-size:.58rem;color:var(--mt);text-transform:uppercase;letter-spacing:.3px;margin-bottom:.15rem}
.mc .v{font-size:1.1rem;font-weight:700;color:#fff}
.mc .s{font-size:.58rem;color:var(--mt);margin-top:.1rem}
.mc .cor{font-size:.52rem;color:rgba(255,255,255,.55);margin-top:.25rem;line-height:1.35;border-top:1px solid rgba(255,255,255,.06);padding-top:.25rem;font-style:italic}
.mc.key{border-left:3px solid var(--ac);background:rgba(96,165,250,.04)}
.mc.key .l{color:var(--ac)}
.mc.alert-red{border-left:3px solid var(--rd);background:rgba(248,113,113,.06)}
.mc.alert-red .v{color:var(--rd)}
.mc.alert-yellow{border-left:3px solid var(--yl);background:rgba(251,191,36,.05)}
.mc.alert-yellow .v{color:var(--yl)}
.mc.alert-green{border-left:3px solid var(--gn);background:rgba(52,211,153,.05)}
.mc.alert-green .v{color:var(--gn)}
.mc .tag{position:absolute;top:3px;right:5px;font-size:.42rem;text-transform:uppercase;letter-spacing:.5px;padding:1px 4px;border-radius:2px;font-weight:600}
.mc .tag.clave{background:rgba(96,165,250,.15);color:var(--ac)}
.mc .tag.bandera{background:rgba(248,113,113,.15);color:var(--rd)}
.mc .tag.mejora{background:rgba(52,211,153,.15);color:var(--gn)}
.ch{margin-top:.8rem;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:.6rem}
.ch canvas{max-height:200px}
.al{padding:.4rem .6rem;background:var(--sf2);border-radius:5px;margin-bottom:.3rem;font-size:.75rem;display:flex;gap:.5rem;border-left:3px solid var(--mt)}
.al.high{border-left-color:var(--rd)}.al.positive{border-left-color:var(--gn)}.al.medium{border-left-color:var(--yl)}
.bl-bar{background:var(--sf2);height:5px;border-radius:3px;overflow:hidden;display:inline-block;width:60px;vertical-align:middle}
.bl-fill{height:100%;border-radius:3px}
.spin{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto .4rem}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){.composites{grid-template-columns:repeat(2,1fr)}.mg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="hd"><h1>Informe Clinico Digital</h1><a href="/" class="bk">Volver al Panel</a></div>
<div class="mn">
  <div style="background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:.8rem 1.2rem;margin-bottom:1rem;display:flex;gap:.8rem;align-items:center;flex-wrap:wrap">
    <label style="font-size:.8rem;color:var(--mt)">Paciente:</label>
    <select id="ps" onchange="load()"><option value="">Cargando...</option></select>
    <span id="bl" style="font-size:.72rem"></span>
  </div>
  <div id="ld" class="empty"><div class="spin"></div>Inicializando...</div>
  <div id="em" class="empty" style="display:none">Seleccione un paciente</div>
  <div id="composites" class="composites" style="display:none"></div>
  <div id="alerts" style="display:none;margin-bottom:1rem"></div>
  <div id="sections" style="display:none"></div>
</div>
<script>
let sb,allM=[],allMood=[],charts={},baselineN=0;
const BASELINE_MIN=5,BASELINE_FULL=10;
const AACN=[{min:70,l:'Exceptionally High',c:'#818cf8'},{min:63,l:'Above Average',c:'#60a5fa'},{min:57,l:'High Average',c:'#34d399'},{min:43,l:'Average',c:'#e2e8f0'},{min:37,l:'Low Average',c:'#fbbf24'},{min:30,l:'Below Average',c:'#fb923c'},{min:0,l:'Exceptionally Low',c:'#f87171'}];
function aacn(t){return AACN.find(a=>t>=a.min)||AACN[6]}
function mean(a){return a.length?a.reduce((s,v)=>s+v,0)/a.length:null}
function sd(a){const m=mean(a);return a.length>1?Math.sqrt(a.reduce((s,v)=>s+Math.pow(v-m,2),0)/(a.length-1)):0}
function LS(m,slug,type){return m.find(x=>x.game_slug===slug&&x.metric_type===type)?.metric_data||null}
function LLevel(m,slug){const t=[...new Set(m.filter(x=>x.game_slug===slug&&x.metric_type.startsWith('level_')).map(x=>x.metric_type))];return t.length?LS(m,slug,t[0]):null}
function AS(m,slug,type){return m.filter(x=>x.game_slug===slug&&x.metric_type===type)}
function toT(raw){if(raw==null)return null;var z=(raw-0.5)/0.2;return Math.round(Math.max(20,Math.min(80,50+10*z)))}
// extractMetricHistory: extraer valores historicos de una metrica del paciente
// Busca en allM (todas las sesiones) el valor que corresponde a este label
function extractMetricHistory(label) {
  // Mapear labels a paths en metric_data
  var MAP = {
    'Planificacion': ['planificacion_ratio'],
    'Escaneo': ['escaneo_sistematico'],
    'Accuracy': ['accuracy_pct','accuracy'],
    'Eficacia': ['eficacia_objetivo'],
    'Economia': ['economia_cognitiva'],
    'Err Comision': ['errores_comision','commission_errors'],
    'Impulsividad': ['impulsividad_compra'],
    'Self Correction': ['self_correction_ratio'],
    'Flexibilidad': ['flexibilidad_cognitiva'],
    'Err Omision': ['errores_omision'],
    'Mean RT': ['mean_rt_ms'],
    'Reaction': ['reaction_time_ms'],
    'Decision': ['mean_decision_time_ms'],
    'Decision Var': ['decision_variability_sd'],
    'RT CV': ['rt_cv'],
    'Decaimiento': ['decaimiento_vigilancia'],
    'Tremor Index': ['tremor_index'],
    'Tremor Avg': ['tremor_avg'],
    'Reposo': ['tremor_reposo'],
    'Inicio': ['tremor_inicio'],
    'Terminal': ['tremor_terminal'],
    'Mov Eff': ['movement_efficiency'],
    'Memory Span': ['memory_span'],
    "d'": ['d_prime'],
    'Mem Trabajo': ['memoria_trabajo_ratio'],
    'MPR': ['simulated_mpr'],
    'Drop Precision': ['drop_precision'],
    'Drop Offset': ['drop_offset_mean_px'],
    'Neatness': ['neatness_score'],
    'Clumsiness': ['motor_clumsiness_score']
  };
  var keys = MAP[label];
  if (!keys) return [];
  var vals = [];
  allM.forEach(function(m) {
    if (!m.metric_data || m.metric_type === 'pill_placement' || m.metric_type === 'color_eleccion' || m.metric_type.indexOf('event_') === 0) return;
    for (var i = 0; i < keys.length; i++) {
      var v = m.metric_data[keys[i]];
      if (v != null && typeof v === 'number' && isFinite(v)) { vals.push(v); return; }
    }
  });
  return vals;
}

// RCI simplificado (Chelune 1993): |valor - media_baseline| / (SD * sqrt(2))
// Retorna: { rci, direction, significant }
function computeRCI(currentValue, history) {
  if (!history || history.length < BASELINE_MIN) return null;
  var m = mean(history);
  var s = sd(history);
  if (s === 0) s = 0.001; // evitar division por cero
  var se_diff = s * Math.sqrt(2);
  var rci = (currentValue - m) / se_diff;
  return { rci: parseFloat(rci.toFixed(2)), mean: parseFloat(m.toFixed(2)), sd: parseFloat(s.toFixed(2)), direction: rci > 0 ? 'aumento' : 'disminucion', significant: Math.abs(rci) > 1.96 };
}

function mc(label,value,sub){if(value===undefined||value===null)return'';var d=typeof value==='number'?(Number.isInteger(value)?value:value.toFixed(2)):String(value);var k=CK[label];if(!k)return'<div class="mc"><div class="l">'+label+'</div><div class="v">'+d+'</div>'+(sub?'<div class="s">'+sub+'</div>':'')+'</div>';
  var cls='mc key',tag='clave',num=typeof value==='number'?value:parseFloat(value);
  var rciInfo=null,rciText='';
  if(!isNaN(num)&&baselineN>=BASELINE_MIN){
    var hist=extractMetricHistory(label);
    if(hist.length>=BASELINE_MIN){
      rciInfo=computeRCI(num,hist);
      if(rciInfo&&rciInfo.significant){
        // Determinar si el cambio es clinicamente malo segun la direccion de la metrica
        var isBad=false;
        if(k.dir==='gt'&&rciInfo.rci>1.96)isBad=true;  // metrica donde alto=malo y subio
        else if(k.dir==='lt'&&rciInfo.rci<-1.96)isBad=true;  // metrica donde bajo=malo y bajo
        else if(!k.dir)isBad=Math.abs(rciInfo.rci)>1.96; // sin direccion, cualquier cambio grande
        if(isBad){cls='mc alert-red';tag='bandera'}
        else{cls='mc alert-green';tag='mejora'}
      }
      rciText=' RCI='+rciInfo.rci+' (media='+rciInfo.mean+' SD='+rciInfo.sd+')';
      if(rciInfo.significant)rciText+=' *cambio significativo*';
    }
  }
  var blNote=baselineN<BASELINE_MIN?' (acumulando baseline — '+baselineN+'/'+BASELINE_MIN+')':'';
  return'<div class="'+cls+'"><div class="tag '+tag+'">'+(tag==='bandera'?'Alerta':tag==='mejora'?'Mejora':'Clave')+'</div><div class="l">'+label+'</div><div class="v">'+d+'</div>'+(sub?'<div class="s">'+sub+blNote+'</div>':'')+(k.cor?'<div class="cor">'+k.cor+(rciText?' | '+rciText:'')+(baselineN<BASELINE_MIN?' | Sin baseline individual aun.':'')+'</div>':'')+'</div>'}

var CK={
'Planificacion':{dir:'lt',cor:'Ratio plan ideal vs ejecutado'},
'Escaneo':{dir:'lt',cor:'Cobertura sistematica del entorno'},
'Accuracy':{dir:'lt',cor:'Precision global de la tarea'},
'Eficacia':{dir:'lt',cor:'Objetivos logrados vs totales'},
'Economia':{dir:'lt',cor:'Acciones utiles / totales'},
'Err Comision':{dir:'gt',cor:'Selecciones incorrectas — marcador de impulsividad (Miyake)'},
'Impulsividad':{dir:'gt',cor:'Items no requeridos — desinhibicion frontal'},
'Self Correction':{dir:'lt',cor:'Autocorreccion de errores — bajo sugiere anosognosia ejecutiva'},
'Flexibilidad':{dir:'lt',cor:'Adaptacion ante cambios — baja = rigidez cognitiva (shifting, Miyake)'},
'Err Omision':{dir:'gt',cor:'Items omitidos — inatenci\u00f3n o bradipsiquia'},
'Err Pattern':{cor:'Patron ante error: se_frena / persevera / corrige_adapta / abandona'},
'Com/Om Ratio':{dir:'gt',cor:'>2 predominio impulsivo, <0.5 predominio inatento, 0.5-2 mixto'},
'Mean RT':{dir:'gt',cor:'Tiempo de reaccion — aumento sugiere enlentecimiento'},
'Reaction':{dir:'gt',cor:'Latencia hasta accion'},
'Decision':{dir:'gt',cor:'Tiempo de decision'},
'Decision Var':{dir:'gt',cor:'SD de tiempos de decision — variabilidad intraindividual (IIV)'},
'RT CV':{dir:'gt',cor:'Coeficiente de variacion RT — irregularidad atencional'},
'Decaimiento':{dir:'gt',cor:'Ratio RT 2da/1ra mitad — fatiga de vigilancia'},
'Fatiga LM':{dir:'gt',cor:'Indice de fatiga — agotamiento de recursos atencionales'},
'Tremor Index':{dir:'gt',cor:'Jitter durante movimiento'},
'Tremor Avg':{dir:'gt',cor:'Tremor promedio (px)'},
'Reposo':{dir:'gt',cor:'Tremor en reposo — signo parkinsoniano'},
'Inicio':{dir:'gt',cor:'Tremor al inicio del movimiento — intencional'},
'Terminal':{dir:'gt',cor:'Tremor terminal — dismetria cerebelosa'},
'Mov Eff':{dir:'lt',cor:'Eficiencia de trayectoria'},
'Dysmetria':{dir:'gt',cor:'Ratio de dismetria'},
'Clumsiness':{dir:'gt',cor:'Torpeza motora'},
'Rigidez':{dir:'gt',cor:'1 - CV velocidad — baja variabilidad = patron rigido'},
'Cogwheel':{dir:'gt',cor:'Oscilaciones tipo rueda dentada'},
'Memory Span':{dir:'lt',cor:'Items retenidos en memoria de trabajo'},
"d'":{dir:'lt',cor:'Sensibilidad discriminativa (SDT)'},
'Mem Trabajo':{dir:'lt',cor:'Ratio de memoria de trabajo'},
'MPR':{dir:'lt',cor:'Medication Possession Ratio simulado'},
'Hesit Count':{dir:'gt',cor:'Pausas activas >1.5s — indecision o bloqueo'},
'Comm Err':{dir:'gt',cor:'Errores de comision'},
'Omis Err':{dir:'gt',cor:'Errores de omision'},
'Coverage':{cor:'Patron espacial: lineas/espiral/caotico'},
'Neatness':{dir:'lt',cor:'Prolijidad del recorrido'},
'Meticulosidad':{dir:'lt',cor:'Exhaustividad vs velocidad'},
'Planif LM':{dir:'lt',cor:'Eficiencia del plan en lawn-mower'},
'Fatiga':{dir:'gt',cor:'Ratio enlentecimiento 2da/1ra mitad'},
'Speed Var':{dir:'gt',cor:'Variabilidad de velocidad motora'},
'Espasticidad':{dir:'gt',cor:'Indice clasp-knife — hipertonia piramidal'},
'Abstraccion':{dir:'lt',cor:'Categorizacion abstracta'},
'Budget Use':{dir:'gt',cor:'Uso de presupuesto %'},
'Recall':{cor:'Recuerdo episodico de receta'},
'Completion':{dir:'lt',cor:'% sesiones completadas'},
'Abandonos':{dir:'gt',cor:'Cierres prematuros'},
'Mov Mean':{dir:'gt',cor:'Tremor promedio inter-movimiento'},
'Mov Max':{dir:'gt',cor:'Peor tremor registrado'},
'Dir Changes':{dir:'gt',cor:'Cambios de direccion'},
'Rapid Rev':{dir:'gt',cor:'Reversiones rapidas — vacilacion motora'},
'Dur p90':{dir:'gt',cor:'Percentil 90 duracion — bradicinesia'},
'Hit Rate':{dir:'lt',cor:'Tasa de aciertos'},
'FA Rate':{dir:'gt',cor:'Tasa de falsas alarmas'},
'Select Changes':{dir:'gt',cor:'Cambios de seleccion — vacilacion'},
'Drop Precision':{dir:'lt',cor:'Precision del soltar (1=centro, 0=borde)'},
'Drop Offset':{dir:'gt',cor:'Distancia al centro del casillero (px)'},
'Drop Offset SD':{dir:'gt',cor:'Variabilidad del offset de drop'}
}

var DOMAINS={
  ejecutiva:{name:'Funcion Ejecutiva',desc:'Planificacion, inhibicion, flexibilidad',
    ex:function(m){var sm=LS(m,'super-market','session_summary'),po=LS(m,'pill-organizer','session_summary'),mm=LLevel(m,'medication-memory'),nc=LS(m,'neuro-chef-v2','biometric_level_1');
      return[sm?sm.planificacion_ratio:null,sm&&sm.escaneo_sistematico!=null?sm.escaneo_sistematico/100:null,sm?sm.flexibilidad_cognitiva:null,sm?sm.self_correction_ratio:null,po&&po.accuracy_pct!=null?po.accuracy_pct/100:null,mm&&mm.accuracy!=null?mm.accuracy/100:null,nc&&nc.d_prime!=null?Math.min(1,Math.max(0,(nc.d_prime+1)/5)):null].filter(function(v){return v!=null})}},
  atencion:{name:'Atencion y Velocidad',desc:'RT, latencias, vigilancia, fatiga',
    ex:function(m){var rts=[LS(m,'super-market','session_summary'),LS(m,'pill-organizer','session_summary'),LS(m,'neuro-chef-v2','biometric_level_1'),LLevel(m,'medication-memory')].map(function(d){return d?d.mean_rt_ms||d.reaction_time_ms||d.mean_decision_time_ms:null}).filter(function(v){return v!=null});
      return rts.map(function(rt){return Math.max(0,Math.min(1,1-(rt/15000)))})}},
  praxis:{name:'Praxis y Coordinacion',desc:'Tremor, dismetria, eficiencia motora',
    ex:function(m){var po=LS(m,'pill-organizer','session_summary'),nc=LS(m,'neuro-chef-v2','biometric_level_1'),mvs=m.filter(function(x){return x.metric_type==='pill_placement'});
      var v=[];if(po&&po.movement_efficiency!=null)v.push(po.movement_efficiency);if(po&&po.tremor_index!=null)v.push(Math.max(0,1-((po.tremor_index-1)/5)));if(nc&&nc.tremor_avg!=null&&nc.tremor_avg>0)v.push(Math.max(0,1-(nc.tremor_avg/100)));
      if(mvs.length>0){var ef=mvs.map(function(x){return x.metric_data?x.metric_data.pathEfficiency:null}).filter(function(x){return x!=null});if(ef.length)v.push(mean(ef))}return v}},
  memoria:{name:'Memoria y Aprendizaje',desc:'Trabajo, recall, SDT, abstraccion',
    ex:function(m){var mm=LLevel(m,'medication-memory'),sm=LS(m,'super-market','session_summary'),nc=LS(m,'neuro-chef-v2','biometric_level_1');
      var v=[];if(mm&&mm.accuracy!=null)v.push(mm.accuracy/100);if(mm&&mm.memory_span!=null)v.push(Math.min(1,mm.memory_span/10));if(sm&&sm.memoria_trabajo_ratio!=null)v.push(sm.memoria_trabajo_ratio);if(sm&&sm.abstraccion_ratio!=null)v.push(sm.abstraccion_ratio);if(nc&&nc.d_prime!=null)v.push(Math.min(1,Math.max(0,(nc.d_prime+1)/5)));
      if(sm&&sm.action_log&&Array.isArray(sm.action_log)){var r=sm.action_log.find(function(a){return a.type==='recipe_recall'});if(r)v.push(r.correct?1:0)}return v}},
  emocional:{name:'Patron Emocional',desc:'Adherencia, engagement, animo-motor',
    ex:function(m){var s=m.filter(function(x){return x.metric_type==='session_summary'||x.metric_type.indexOf('level_')===0||x.metric_type.indexOf('biometric_')===0});var c=s.filter(function(x){return x.metric_data&&x.metric_data.completed===true}).length;return s.length?[c/s.length]:[]}}
};

document.addEventListener('DOMContentLoaded',function(){
  sb=getSupabaseClient();if(!sb){document.getElementById('ld').innerHTML='<p style="color:var(--rd)">Sin conexion</p>';return}
  sb.from('hdd_patients').select('dni,full_name,status,is_test').order('full_name').then(function(res){
    var sel=document.getElementById('ps');sel.innerHTML='<option value="">Seleccionar paciente...</option>';
    (res.data||[]).forEach(function(p){var o=document.createElement('option');o.value=p.dni;o.textContent=p.full_name+(p.is_test?' (TEST)':'')+' — DNI: '+p.dni;sel.appendChild(o)});
    document.getElementById('ld').style.display='none';document.getElementById('em').style.display='block';
  });
});

function load(){
  var dni=document.getElementById('ps').value;if(!dni)return;
  ['em','composites','alerts','sections'].forEach(function(id){document.getElementById(id).style.display='none'});
  document.getElementById('ld').style.display='block';document.getElementById('ld').innerHTML='<div class="spin"></div>Cargando biomarcadores...';
  Promise.all([
    sb.from('hdd_game_metrics').select('*').eq('patient_dni',dni).order('created_at',{ascending:false}),
    sb.from('hdd_mood_entries').select('*').eq('patient_dni',dni).order('created_at',{ascending:false})
  ]).then(function(results){
    if(results[0].error)throw results[0].error;
    allM=results[0].data||[];allMood=results[1].data||[];
    if(!allM.length){document.getElementById('ld').style.display='none';document.getElementById('em').style.display='block';document.getElementById('em').textContent='Sin datos.';return}
    Object.values(charts).forEach(function(c){c.destroy()});charts={};
    renderBaseline();renderComposites();renderAlerts();renderSections();
    document.getElementById('ld').style.display='none';
  }).catch(function(e){document.getElementById('ld').innerHTML='<p style="color:var(--rd)">Error: '+e.message+'</p>'});
}

function renderComposites(){
  var el=document.getElementById('composites'),html='';
  Object.keys(DOMAINS).forEach(function(key){
    var dom=DOMAINS[key],vals=dom.ex(allM),raw=vals.length?mean(vals):null,t=toT(raw);
    var a=t?aacn(t):{l:'Sin datos',c:'var(--mt)'};var pct=t?Math.round(((t-20)/60)*100):0;
