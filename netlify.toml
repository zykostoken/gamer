[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://images.unsplash.com https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co"

[[redirects]]
  from = "/dashboard"
  to = "/hdd/admin/informe-clinico.html"
  status = 301

[[redirects]]
  from = "/informe"
  to = "/hdd/admin/informe-clinico.html"
  status = 301

[[redirects]]
  from = "/portal"
  to = "/games/portal/"
  status = 301

[[redirects]]
  from = "/portal/*"
  to = "/games/portal/:splat"
  status = 301
