    <script src="/games/shared/biomet.js"></script>
    <script>window.onerror=function(m,s,l,c,e){document.title='ERROR';var d=document.createElement('div');d.style.cssText='position:fixed;top:0;left:0;right:0;background:red;color:white;padding:16px;z-index:99999;font-size:14px';d.textContent='JS Error: '+m+' (line '+l+')';document.body.appendChild(d);console.error('[daily-routine]',m,s,l,e);};</script>
    <style>
        :root {
            --bg: #0a0f1e; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
            --text: #e2e8f0; --text-dim: rgba(255,255,255,0.5); --accent: #7c3aed; --accent-glow: rgba(124,58,237,0.4);
            --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --blue: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }

        header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .header-left a { color: var(--text-dim); text-decoration: none; font-size: 0.75rem; }
        .header-left h1 { font-size: 1rem; font-weight: 700; margin-top: 2px; }
        #timer-display { font-size: 1.4rem; font-family: monospace; font-weight: 700; color: var(--accent); }
        #patient-display { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; text-align: right; }

        /* Progress */
        #progress-wrap {
            background: var(--surface); padding: 8px 20px;
            display: flex; align-items: center; gap: 10px;
        }
        #progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
        #progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 3px; transition: width .4s; width: 0%; }
        #progress-label { font-size: 0.7rem; color: var(--text-dim); white-space: nowrap; }

        /* Start screen */
        #start-screen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 50px); padding: 24px; }
        .start-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 36px; max-width: 460px; width: 100%; text-align: center;
        }
        .start-card h2 { font-size: 1.6rem; margin-bottom: 8px; }
        .start-card p { color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; font-size: 0.9rem; }
        .btn-primary {
            display: inline-block; padding: 14px 44px;
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            border: none; border-radius: 14px; color: #fff;
            font-size: 1.05rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 20px var(--accent-glow); transition: all .2s;
        }
        .btn-primary:hover { transform: translateY(-2px); }

        /* Scene container */
        #game-area { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }

        .scene-header {
            text-align: center; margin-bottom: 16px;
        }
        .scene-icon { font-size: 2.5rem; margin-bottom: 6px; }
        .scene-name { font-size: 1.1rem; font-weight: 700; }
        .scene-desc { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; line-height: 1.4; }

        /* Room visual */
        .room {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 16px; margin-bottom: 12px;
        }

        /* Action items grid */
        .items-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }
        .action-item {
            background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 14px 10px;
            text-align: center; cursor: pointer; transition: all .25s;
            position: relative; user-select: none;
        }
        .action-item:hover { border-color: rgba(255,255,255,0.25); transform: scale(1.03); }
        .action-item:active { transform: scale(0.97); }
        .action-item .item-emoji { font-size: 2rem; margin-bottom: 6px; display: block; }
        .action-item .item-label { font-size: 0.72rem; font-weight: 600; line-height: 1.3; }
        .action-item .item-order {
            position: absolute; top: 6px; left: 6px;
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--accent); color: #fff;
            font-size: 0.6rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .2s;
        }
        .action-item.done { border-color: var(--green); background: rgba(34,197,94,0.08); opacity: 0.7; pointer-events: none; }
        .action-item.done .item-order { opacity: 1; background: var(--green); }
        .action-item.error { border-color: var(--red); background: rgba(239,68,68,0.08); }
        .action-item.warning { border-color: var(--yellow); background: rgba(245,158,11,0.08); }

        /* Feedback toast */
        .feedback {
            text-align: center; padding: 10px; margin-bottom: 10px;
            border-radius: 10px; font-size: 0.8rem; font-weight: 600;
            animation: fadeUp .3s ease; min-height: 40px;
        }
        .feedback.good { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
        .feedback.bad { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
        .feedback.info { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
        .feedback.warn { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }

        /* Navigation */
        .scene-nav {
            display: flex; gap: 10px; justify-content: center; margin-top: 12px;
        }
        .btn-nav {
            padding: 12px 28px; border-radius: 12px; border: none;
            font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all .2s;
        }
        .btn-nav.next {
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: #fff; box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn-nav.skip {
            background: rgba(255,255,255,0.06); color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .btn-nav:hover { transform: translateY(-1px); }

        /* Action log sidebar */
        .action-log {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; margin-top: 10px;
        }
        .action-log h4 { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
        .log-entry { font-size: 0.72rem; padding: 3px 0; color: rgba(255,255,255,0.6); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .log-entry:last-child { border: none; }
        .log-entry .log-icon { margin-right: 4px; }

        /* Results */
        #results { display: none; padding: 24px; }
        .results-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 28px; max-width: 550px; margin: 0 auto; text-align: center;
        }
        .score-circle {
            width: 110px; height: 110px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; font-size: 2.2rem; font-weight: 800;
        }
        .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.8rem; }
        .result-row:last-child { border: none; }
        .result-section { margin: 16px 0 8px; font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; text-align: left; }
        .clinical-flag { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 8px 12px; margin-top: 12px; text-align: left; }
        .clinical-flag .flag-title { font-size: 0.7rem; font-weight: 700; color: #f87171; margin-bottom: 4px; }
        .clinical-flag .flag-item { font-size: 0.72rem; color: rgba(255,255,255,0.6); padding: 2px 0; }
        .btn-replay { display: inline-block; margin-top: 16px; padding: 10px 28px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeUp .25s ease forwards; }
    </style>
</head>

        ],

        nextAlt: { condition: 'control_remoto', label: 'Ir al sillón →', nextScene: 'sillon' },

    },
    {
        id: 'sillon',
        name: 'Sillón',
        icon: '🛋️',
        description: 'Te sentaste en el sillón con el control remoto. ¿Qué mirás?',
        items: [
            { id: 'noticieros', label: 'Noticieros', emoji: '📰', type: 'neutral', points: 5, feedback: 'Estás viendo las noticias del día.' },
            { id: 'pelicula', label: 'Película / Serie', emoji: '🎬', type: 'neutral', points: 0, feedback: 'Empezaste a ver una película...' },
            { id: 'levantarse', label: 'Apagar TV y salir', emoji: '🚶', type: 'positive', points: 10, feedback: 'Decidiste salir. Buena decisión.' },

// ================================================================
// GAME STATE
// ================================================================
const state = {
    patientDni: 'DEMO',
    startTime: null,
    timerInterval: null,
    currentSceneIdx: 0,
    // Track ALL actions globally
    actionLog: [],          // { sceneId, itemId, timestamp, correct, warning }
    sceneActions: {},       // sceneId → Set of done item IDs
    skippedScenes: [],      // scene IDs where player skipped
    clinicalFlags: [],      // text flags for clinical review
    sequenceErrors: 0,
    totalPoints: 0,
    maxPossiblePoints: 0,
    hesitations: 0,
    lastActionTime: null,
    missedEssentials: [],
    visitedSillon: false,
};

// ================================================================
// INIT
// ================================================================
function beginGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-area').style.display = 'block';
    document.getElementById('progress-wrap').style.display = 'flex';

    const params = new URLSearchParams(window.location.search);
    state.patientDni = params.get('dni') || params.get('patient_id')
        || (function(){try{return localStorage.getItem('hdd_patient_id')||sessionStorage.getItem('hdd_patient_id')}catch(e){return null}})()
        || 'DEMO';
    document.getElementById('patient-display').textContent = state.patientDni;

    state.startTime = Date.now();
    state.timerInterval = setInterval(updateTimer, 1000);

    // Calc max possible points
    SCENES.forEach(s => {
        s.items.forEach(it => { if (it.points > 0) state.maxPossiblePoints += it.points; });
    });

    if (typeof biomet !== 'undefined') {
        biomet.start({ patientId: state.patientDni, gameSlug: 'daily-routine' });
    }

    renderScene(0);
}

function updateTimer() {
    const el = document.getElementById('timer-display');
    if (!el || !state.startTime) return;
    const s = Math.floor((Date.now() - state.startTime) / 1000);
    el.textContent = String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function updateProgress() {
    const total = SCENES.length;
    const current = state.currentSceneIdx;
    const pct = Math.min(100, (current / total) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    const scene = SCENES[current];
    document.getElementById('progress-label').textContent = scene ? scene.name : 'Fin';
}

// ================================================================
// SCENE RENDERER
// ================================================================
function renderScene(idx) {
    state.currentSceneIdx = idx;
    const scene = SCENES[idx];
    if (!scene) { finishGame(); return; }

    // Init scene actions tracker
    if (!state.sceneActions[scene.id]) state.sceneActions[scene.id] = new Set();

    updateProgress();

    const area = document.getElementById('game-area');
    area.innerHTML = '';

    // Header
    const header = document.createElement('div');
    header.className = 'scene-header animate-in';
    header.innerHTML = `
        <div class="scene-icon">${scene.icon}</div>
        <div class="scene-name">${scene.name}</div>
        <div class="scene-desc">${scene.description}</div>
    `;
    area.appendChild(header);

    // Feedback area
    const fb = document.createElement('div');
    fb.id = 'scene-feedback';
    area.appendChild(fb);

    // Room with items
    const room = document.createElement('div');
    room.className = 'room animate-in';
    const grid = document.createElement('div');
    grid.className = 'items-grid';
    grid.id = 'items-grid';

    scene.items.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'action-item';
        el.id = 'item-' + item.id;
        el.dataset.id = item.id;
        el.style.animationDelay = (i * 0.05) + 's';

        // If already done (revisiting), mark it
        if (state.sceneActions[scene.id].has(item.id)) {
            el.classList.add('done');
        }

        const orderEl = document.createElement('div');
        orderEl.className = 'item-order';
        orderEl.id = 'order-' + item.id;
        el.appendChild(orderEl);

        const emoji = document.createElement('span');
        emoji.className = 'item-emoji';
        emoji.textContent = item.emoji;
        el.appendChild(emoji);

        const label = document.createElement('div');
        label.className = 'item-label';
        label.textContent = item.label;
        el.appendChild(label);

        el.addEventListener('click', function() {
            handleAction(scene, item);
        });

        grid.appendChild(el);
    });

    room.appendChild(grid);
    area.appendChild(room);

    // Navigation
    const nav = document.createElement('div');
    nav.className = 'scene-nav animate-in';

    if (scene.skipLabel) {
        const skipBtn = document.createElement('button');
        skipBtn.className = 'btn-nav skip';
        skipBtn.textContent = scene.skipLabel;
        skipBtn.onclick = () => skipScene(scene);
        nav.appendChild(skipBtn);
    }

    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-nav next';
    nextBtn.id = 'btn-next-scene';
    nextBtn.textContent = scene.nextLabel || 'Continuar →';
    nextBtn.onclick = () => advanceScene(scene);
    nav.appendChild(nextBtn);

    area.appendChild(nav);

    // Action log
    const logDiv = document.createElement('div');
    logDiv.className = 'action-log animate-in';
    logDiv.innerHTML = '<h4>Lo que hiciste</h4>';
    const logList = document.createElement('div');
    logList.id = 'action-log-list';

    // Show actions already done in this scene
    const doneInScene = state.actionLog.filter(a => a.sceneId === scene.id);
    doneInScene.forEach(a => {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const item = scene.items.find(it => it.id === a.itemId);
        entry.innerHTML = '<span class="log-icon">' + (a.correct ? '✓' : a.warning ? '⚠' : '✗') + '</span> ' + (item ? item.label : a.itemId);
        logList.appendChild(entry);
    });

    if (doneInScene.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'log-entry';
        empty.textContent = 'Todavía no hiciste nada...';
        empty.id = 'log-empty';
        logList.appendChild(empty);
    }

    logDiv.appendChild(logList);
    area.appendChild(logDiv);
}

// ================================================================
// ACTION HANDLER
// ================================================================
function handleAction(scene, item) {
    const done = state.sceneActions[scene.id];
    if (done.has(item.id)) return; // Already done

    const now = Date.now();
    if (state.lastActionTime && now - state.lastActionTime > 5000) state.hesitations++;
    state.lastActionTime = now;

    let correct = true;
    let warning = null;

    // Check requires
    if (item.requires && item.requires.length > 0) {
        const missing = item.requires.filter(req => !done.has(req));
        if (missing.length > 0) {
            // Check for sequence warnings
            const warnKey = item.id;
            if (scene.sequenceWarnings && scene.sequenceWarnings[warnKey]) {
                const sw = scene.sequenceWarnings[warnKey];
                if (!done.has(sw.without)) {
                    warning = sw.msg;
                }
            }
            if (!warning) {
                const missingItem = scene.items.find(it => it.id === missing[0]);
                warning = 'Primero deberías: ' + (missingItem ? missingItem.label : missing[0]);
            }
            state.sequenceErrors++;
            correct = false;
            showFeedback(warning, 'warn');

            // Still allow the action (tracks the error)
        }
    }

    // Check distractor
    if (item.type === 'distractor') {
        correct = false;
        showFeedback(item.feedback, 'warn');
    } else if (warning) {
        // Already showed warning
    } else {
        showFeedback(item.feedback, 'good');
    }

    // Mark done
    done.add(item.id);
    state.totalPoints += item.points;

    // Visual update
    const el = document.getElementById('item-' + item.id);
    if (el) {
        el.classList.add(correct ? 'done' : (warning ? 'warning' : 'error'));
        const orderEl = document.getElementById('order-' + item.id);
        if (orderEl) {
            orderEl.textContent = done.size;
            orderEl.style.opacity = '1';
            if (!correct) orderEl.style.background = warning ? 'var(--yellow)' : 'var(--red)';
        }
        setTimeout(() => {
            el.classList.add('done');
            el.classList.remove('warning', 'error');
        }, 800);
    }

    // Log action
    const logEntry = {
        sceneId: scene.id,
        itemId: item.id,
        timestamp: now - state.startTime,
        correct: correct,
        warning: warning,
        points: item.points,
    };
    state.actionLog.push(logEntry);

    // Update action log display
    const logList = document.getElementById('action-log-list');
    if (logList) {
        const emptyEl = document.getElementById('log-empty');
        if (emptyEl) emptyEl.remove();

        const entry = document.createElement('div');
        entry.className = 'log-entry animate-in';
        entry.innerHTML = '<span class="log-icon">' + (correct ? '✓' : '⚠') + '</span> ' + item.label;
        logList.appendChild(entry);
    }

    // Biomet tracking
    if (typeof biomet !== 'undefined') {
        biomet.recordAction({
            type: 'scene_action',
            target_id: scene.id + '/' + item.id,
            correct: correct,
            is_comision: item.type === 'distractor',
            achieved_objective: null,
            plan_correct: !warning,
        });
    }

    // Special: vestibulo control_remoto changes nav
    if (scene.id === 'vestibulo' && item.id === 'control_remoto') {
        state.visitedSillon = true;
        const nextBtn = document.getElementById('btn-next-scene');
        if (nextBtn && scene.nextAlt) {
            nextBtn.textContent = scene.nextAlt.label;
        }
    }
}

function showFeedback(msg, type) {
    const fb = document.getElementById('scene-feedback');
    if (!fb) return;
    fb.innerHTML = '<div class="feedback ' + type + ' animate-in">' + msg + '</div>';
    setTimeout(() => { if (fb.firstChild) fb.firstChild.style.opacity = '0.5'; }, 2500);
}

// ================================================================
// NAVIGATION
// ================================================================
function skipScene(scene) {
    state.skippedScenes.push(scene.id);
    if (scene.skipFlag) {
        state.clinicalFlags.push(scene.skipFlag);
    }
    showFeedback(scene.skipFlag || 'Escena salteada', 'bad');
    setTimeout(() => advanceToNext(scene), 600);
}

function advanceScene(scene) {
    // Check for missed essentials (vestibulo)
    if (scene.id === 'vestibulo') {
        const done = state.sceneActions[scene.id] || new Set();
        const essentials = scene.items.filter(it => it.type === 'essential');
        const missed = essentials.filter(it => !done.has(it.id));
        if (missed.length > 0) {
            state.missedEssentials = missed.map(it => it.label);
            state.clinicalFlags.push('Salió sin: ' + missed.map(it => it.label).join(', '));
        }

        // If grabbed control remoto, go to sillon
        if (state.visitedSillon) {
            renderScene(SCENES.findIndex(s => s.id === 'sillon'));
            return;
        }
    }

    // Check if nothing was done in scene
    const done = state.sceneActions[scene.id] || new Set();
    if (done.size === 0 && scene.skipFlag) {
        state.skippedScenes.push(scene.id);
        state.clinicalFlags.push(scene.skipFlag);
    }

    advanceToNext(scene);
}

function advanceToNext(scene) {
    const currentIdx = SCENES.findIndex(s => s.id === scene.id);
    let nextIdx = currentIdx + 1;

    // Skip sillon if not triggered
    if (nextIdx < SCENES.length && SCENES[nextIdx].id === 'sillon' && !state.visitedSillon) {
        nextIdx++;
    }

    if (nextIdx >= SCENES.length) {
        finishGame();
    } else {
        renderScene(nextIdx);
    }
}

// ================================================================
// SCORING & RESULTS
// ================================================================
function finishGame() {
    clearInterval(state.timerInterval);
    document.getElementById('game-area').style.display = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    const totalTime = Math.floor((Date.now() - state.startTime) / 1000);
    const totalActions = state.actionLog.length;
    const correctActions = state.actionLog.filter(a => a.correct).length;

    // Scene-by-scene analysis
    const sceneScores = {};
    SCENES.forEach(scene => {
        const done = state.sceneActions[scene.id] || new Set();
        const possible = scene.items.filter(it => it.points > 0);
        const completed = possible.filter(it => done.has(it.id));
        sceneScores[scene.id] = {
            name: scene.name,
            done: completed.length,
            total: possible.length,
            pct: possible.length > 0 ? Math.round((completed.length / possible.length) * 100) : 0,
            skipped: state.skippedScenes.includes(scene.id),
        };
    });

    // Overall score (0-100)
    const completionScore = state.maxPossiblePoints > 0 ? (state.totalPoints / state.maxPossiblePoints) * 60 : 0;
    const sequenceScore = totalActions > 0 ? ((correctActions / totalActions) * 25) : 25;
    const flagPenalty = Math.min(15, state.clinicalFlags.length * 5);
    const finalScore = Math.max(0, Math.min(100, Math.round(completionScore + sequenceScore - flagPenalty)));

    // Cognitive domains
    const secuenciacion = totalActions > 0 ? Math.round((correctActions / totalActions) * 100) : 0;
    const planificacion = Math.round(100 - (state.skippedScenes.length / SCENES.length) * 100);
    const juicio = Math.round(100 - (state.clinicalFlags.length * 15));
    const autonomia = Math.round(Object.values(sceneScores).reduce((sum, s) => sum + s.pct, 0) / Object.keys(sceneScores).length);

    // Build results HTML
    let sceneSummary = '';
    Object.values(sceneScores).forEach(s => {
        if (s.total === 0) return;
        const color = s.skipped ? '#f87171' : (s.pct >= 80 ? '#4ade80' : s.pct >= 50 ? '#fbbf24' : '#f87171');
        sceneSummary += `<div class="result-row">
            <span>${s.name}</span>
            <span style="color:${color};font-weight:700">${s.skipped ? 'Salteada' : s.done + '/' + s.total}</span>
        </div>`;
    });

    let flagsHTML = '';
    if (state.clinicalFlags.length > 0) {
        flagsHTML = '<div class="clinical-flag"><div class="flag-title">Observaciones clínicas</div>';
        state.clinicalFlags.forEach(f => {
            flagsHTML += '<div class="flag-item">• ' + f + '</div>';
        });
        flagsHTML += '</div>';
    }

    document.getElementById('results').innerHTML = `
        <div class="results-card animate-in">
            <div class="score-circle">${finalScore}</div>
            <h2 style="margin-bottom:4px;">Día completado</h2>
            <p style="color:var(--text-dim);font-size:0.8rem;margin-bottom:16px;">
                ${totalActions} acciones en ${Math.floor(totalTime/60)}m ${totalTime%60}s
            </p>

            <div class="result-section">Por habitación</div>
            ${sceneSummary}

            <div class="result-section">Dominios cognitivos</div>
            <div class="result-row"><span>Secuenciación</span><span style="color:#a78bfa;font-weight:700">${secuenciacion}%</span></div>
            <div class="result-row"><span>Planificación</span><span style="color:#a78bfa;font-weight:700">${Math.max(0, planificacion)}%</span></div>
            <div class="result-row"><span>Juicio</span><span style="color:#a78bfa;font-weight:700">${Math.max(0, juicio)}%</span></div>
            <div class="result-row"><span>Autonomía (AVD)</span><span style="color:#a78bfa;font-weight:700">${autonomia}%</span></div>
            <div class="result-row"><span>Errores de secuencia</span><span style="color:${state.sequenceErrors > 0 ? '#fbbf24' : '#4ade80'}">${state.sequenceErrors}</span></div>
            <div class="result-row"><span>Hesitaciones (&gt;5s)</span><span style="color:var(--text-dim)">${state.hesitations}</span></div>

            ${flagsHTML}

            <button class="btn-replay" onclick="location.reload()">Jugar de nuevo</button>
        </div>
    `;

    // Save metrics
    const metrics = {
        final_score: finalScore,
        total_actions: totalActions,
        correct_actions: correctActions,
        sequence_errors: state.sequenceErrors,
        hesitations: state.hesitations,
        duration_seconds: totalTime,
        skipped_scenes: state.skippedScenes,
        clinical_flags: state.clinicalFlags,
        missed_essentials: state.missedEssentials,
        visited_sillon: state.visitedSillon,
        scene_scores: sceneScores,
        cognitive_domains: { secuenciacion, planificacion, juicio: Math.max(0, juicio), autonomia },
        action_log: state.actionLog,
    };

    let biometData = {};
    if (typeof biomet !== 'undefined') {
        biometData = biomet.save({ final_score: finalScore, sequence_score: secuenciacion });
    }

    saveResults(metrics, biometData);
    if (typeof showPostGameColorModal === 'function') showPostGameColorModal();
}

// ================================================================
// SAVE TO SUPABASE
// ================================================================
async function saveResults(metrics, biometData) {
    if (!sb) return;
    try {
        let dailyPatientId = null;
        try {
            const { data: pdata } = await sb.from('hdd_patients').select('id').eq('dni', state.patientDni).single();
            if (pdata) dailyPatientId = pdata.id;
        } catch(e) {}

        sb.from('hdd_game_metrics').insert({
            patient_dni: state.patientDni || null,
            game_slug: 'daily-routine',
            metric_type: 'session_summary',
            metric_value: metrics.final_score,
            metric_data: {
                ...metrics,
                biomet: biometData || {},
                game_name: 'Mi Rutina Diaria',
                version: 'v2-scenes',
                input_device: (navigator.maxTouchPoints > 0 && 'ontouchstart' in window) ? 'touch' : 'mouse',
                completed: true,
                duration_ms: Date.now() - (state.startTime || Date.now()),
                session_date: new Date().toISOString()
            }
        }).then(()=>{}).catch(()=>{});

        if (dailyPatientId) {
            fetch('/api/biometricas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    patient_id: dailyPatientId,
                    session_id: 'dailyroutine-' + Date.now(),
                    game_slug: 'daily-routine-v2',
                    biometric_data: { ...metrics, biomet: biometData || {}, game_name: 'Mi Rutina Diaria' }
                })
            }).catch(e => console.warn('[daily-routine] Bucket save fail:', e.message));
        }
    } catch(e) {}
}
